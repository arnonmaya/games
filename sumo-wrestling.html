<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumo Wrestling</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a00;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    color: #e8c97a;
    font-size: 1.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(232,201,122,0.5);
  }

  .subtitle { color: #a07040; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 10px; }

  .scoreboard {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .player-score {
    text-align: center;
    min-width: 80px;
    padding: 6px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .player-name { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .score-dots { display: flex; gap: 5px; justify-content: center; margin-top: 3px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid; transition: background 0.3s; }

  .round-info { color: #e8c97a; font-size: 0.8rem; letter-spacing: 2px; text-align: center; }

  .ps0 .player-name { color: #ff6b6b; }
  .ps0 .dot { border-color: #ff6b6b; }
  .ps0 .dot.filled { background: #ff6b6b; }

  .ps1 .player-name { color: #6bb5ff; }
  .ps1 .dot { border-color: #6bb5ff; }
  .ps1 .dot.filled { background: #6bb5ff; }

  .ps2 .player-name { color: #6bff9e; }
  .ps2 .dot { border-color: #6bff9e; }
  .ps2 .dot.filled { background: #6bff9e; }

  .ps3 .player-name { color: #ffcc44; }
  .ps3 .dot { border-color: #ffcc44; }
  .ps3 .dot.filled { background: #ffcc44; }

  canvas { display: block; }

  .controls-bar {
    margin-top: 10px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .ctrl-pill {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-align: center;
  }

  .ctrl-pill b { display: block; margin-bottom: 2px; font-size: 0.7rem; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .overlay-emoji { font-size: 3rem; margin-bottom: 8px; }
  .overlay-title {
    font-size: 2.2rem;
    font-weight: bold;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 30px currentColor;
  }
  .overlay-sub { color: #a09070; font-size: 0.82rem; letter-spacing: 2px; margin-bottom: 22px; text-align: center; padding: 0 20px; }

  .picker { margin-bottom: 18px; text-align: center; }
  .picker p { color: #c0a060; font-size: 0.78rem; letter-spacing: 2px; margin-bottom: 10px; }
  .picker-btns { display: flex; gap: 10px; justify-content: center; }
  .pnum {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 2px solid #806040;
    background: rgba(255,255,255,0.05);
    color: #e8c97a;
    font-size: 1.3rem;
    font-family: 'Georgia', serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .pnum:hover, .pnum.active { background: rgba(232,201,122,0.2); border-color: #e8c97a; transform: scale(1.1); }

  .btn {
    background: linear-gradient(135deg, #c8a040, #e8c97a);
    color: #1a0a00;
    border: none;
    padding: 11px 32px;
    font-size: 0.95rem;
    font-family: 'Georgia', serif;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    font-weight: bold;
    text-transform: uppercase;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 15px rgba(232,201,122,0.3);
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(232,201,122,0.5); }
</style>
</head>
<body>

<h1>⛩ Sumo Wrestling</h1>
<p class="subtitle">Push opponents beyond the ring line</p>

<div class="scoreboard" id="scoreboard"></div>
<canvas id="c" width="440" height="440"></canvas>
<div class="controls-bar" id="ctrlBar"></div>

<div class="overlay show" id="overlay">
  <div class="overlay-emoji" id="ovEmoji">⛩</div>
  <div class="overlay-title" id="ovTitle" style="color:#e8c97a">Sumo Wrestling</div>
  <div class="overlay-sub" id="ovSub">Push your opponents outside the ring line to score. First to 3 points wins!</div>
  <div class="picker" id="pickerDiv">
    <p>NUMBER OF PLAYERS</p>
    <div class="picker-btns">
      <button class="pnum" onclick="selectCount(1)">1</button>
      <button class="pnum active" onclick="selectCount(2)">2</button>
      <button class="pnum" onclick="selectCount(3)">3</button>
      <button class="pnum" onclick="selectCount(4)">4</button>
    </div>
  </div>
  <button class="btn" id="ovBtn">Start Game</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CX = 220, CY = 220;
const RING_R = 108;
const LINE_W = 5;
const PLAYER_R = 26;
const FRICTION = 0.84;
const SPEED = 0.20;
const PUSH_FORCE = 0.24;
const POINTS_TO_WIN = 3;

const CONFIGS = [
  { color: '#ff6b6b', shadow: '#ff000055', name: 'P1', keys: { up:'w',  down:'s',         left:'a',         right:'d'          }, label: 'W / A / S / D' },
  { color: '#6bb5ff', shadow: '#0055ff55', name: 'P2', keys: { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight' }, label: '↑ / ↓ / ← / →' },
  { color: '#6bff9e', shadow: '#00cc5555', name: 'P3', keys: { up:'i',  down:'k',         left:'j',         right:'l'          }, label: 'J / I / K / L' },
  { color: '#ffcc44', shadow: '#cc880055', name: 'P4', keys: { up:'t',  down:'g',         left:'f',         right:'h'          }, label: 'F / T / G / H' },
];

let numPlayers = 2;
let scores = [0,0,0,0];
let round = 1;
let gameActive = false;
let animId = null;
let players = [];
let heldKeys = {};
let flashTimer = 0, flashX = 0, flashY = 0;

document.addEventListener('keydown', e => {
  heldKeys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { heldKeys[e.key] = false; });

// ── Player count selection ──────────────────────────────────────
function selectCount(n) {
  numPlayers = n;
  document.querySelectorAll('.pnum').forEach((b,i) => b.classList.toggle('active', i+1===n));
}

// ── Start / reset ───────────────────────────────────────────────
document.getElementById('ovBtn').addEventListener('click', () => {
  const picker = document.getElementById('pickerDiv');
  if (picker.style.display !== 'none') {
    // First launch
    scores = [0,0,0,0]; round = 1;
    buildUI();
    hideOverlay();
    startRound();
  } else {
    hideOverlay();
    startRound();
  }
});

function buildUI() {
  // Scoreboard
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    if (i > 0) {
      const ri = document.createElement('div');
      ri.className = 'round-info'; ri.id = 'roundInfo';
      sb.appendChild(ri);
    }
    const div = document.createElement('div');
    div.className = `player-score ps${i}`; div.id = `pscore${i}`;
    div.innerHTML = `<div class="player-name">${CONFIGS[i].name}</div><div class="score-dots" id="sdots${i}"></div>`;
    sb.appendChild(div);
  }
  // Controls
  const cb = document.getElementById('ctrlBar');
  cb.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    const d = document.createElement('div');
    d.className = 'ctrl-pill';
    d.style.borderColor = CONFIGS[i].color + '55';
    d.style.color = CONFIGS[i].color;
    d.innerHTML = `<b>${CONFIGS[i].name}</b>${CONFIGS[i].label}`;
    cb.appendChild(d);
  }
  if (numPlayers === 1) {
    const d = document.createElement('div');
    d.className = 'ctrl-pill';
    d.style.borderColor = '#88888855';
    d.style.color = '#aaa';
    d.innerHTML = `<b>CPU</b>AI controlled`;
    cb.appendChild(d);
  }
  updateDots();
}

function updateDots() {
  for (let i = 0; i < numPlayers; i++) {
    const el = document.getElementById('sdots'+i);
    if (!el) continue;
    el.innerHTML = '';
    for (let j = 0; j < POINTS_TO_WIN; j++) {
      const d = document.createElement('div');
      d.className = 'dot' + (j < scores[i] ? ' filled' : '');
      el.appendChild(d);
    }
  }
  const ri = document.getElementById('roundInfo');
  if (ri) ri.textContent = 'Round ' + round;
}

function spawnPositions(total) {
  // Spread evenly around a circle inside the ring
  return Array.from({length: total}, (_,i) => {
    const a = (Math.PI*2/total)*i - Math.PI/2;
    const r = total === 2 ? 52 : 68;
    return { x: CX + Math.cos(a)*r, y: CY + Math.sin(a)*r };
  });
}

function resetPlayers() {
  const total = numPlayers === 1 ? 2 : numPlayers;
  const pos = spawnPositions(total);
  players = [];
  for (let i = 0; i < total; i++) {
    players.push({
      x: pos[i].x, y: pos[i].y,
      vx: 0, vy: 0,
      r: PLAYER_R,
      color: CONFIGS[i].color,
      shadow: CONFIGS[i].shadow,
      name: CONFIGS[i].name,
      keys: CONFIGS[i].keys,
      isAI: numPlayers === 1 && i > 0,
      eliminated: false,
      index: i,
      pushing: false,
    });
  }
}

function startRound() {
  resetPlayers();
  updateDots();
  gameActive = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

// ── Sand texture ─────────────────────────────────────────────────
let sandImg;
(function makeSand() {
  const sc = document.createElement('canvas');
  sc.width = sc.height = 440;
  const sx = sc.getContext('2d');
  sx.fillStyle = '#c8a060';
  sx.beginPath(); sx.arc(CX,CY,RING_R,0,Math.PI*2); sx.fill();
  for (let i=0;i<900;i++) {
    const a=Math.random()*Math.PI*2, r=Math.random()*RING_R;
    sx.fillStyle=`rgba(${Math.random()>.5?'170,120,50':'210,165,75'},${0.12+Math.random()*0.22})`;
    const sz=1+Math.random()*2;
    sx.fillRect(CX+Math.cos(a)*r, CY+Math.sin(a)*r, sz, sz);
  }
  sandImg = sc;
})();

// ── Crowd (pre-rendered) ──────────────────────────────────────────
let crowdImg;
const CROWD_COLORS = [
  '#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4',
  '#ff5722','#607d8b','#795548','#cddc39','#ff9800',
];
(function makeCrowd() {
  const cc = document.createElement('canvas');
  cc.width = cc.height = 440;
  const cx2 = cc.getContext('2d');

  // Stadium floor outside ring
  const floorGrad = cx2.createRadialGradient(CX,CY,RING_R,CX,CY,220);
  floorGrad.addColorStop(0,'#2a1505');
  floorGrad.addColorStop(1,'#0f0602');
  cx2.fillStyle = floorGrad;
  cx2.fillRect(0,0,440,440);

  // Wide empty floor between ring and crowd
  const rng = (min,max) => min+Math.random()*(max-min);
  const CROWD_INNER = RING_R + 72;  // big gap — crowd starts far from ring
  const OUTER = 215;

  // Clay/wood floor between ring and crowd
  const floorRing = cx2.createRadialGradient(CX,CY,RING_R+2,CX,CY,CROWD_INNER);
  floorRing.addColorStop(0,'#3a1e08');
  floorRing.addColorStop(0.5,'#2e1506');
  floorRing.addColorStop(1,'#1e0d03');
  cx2.save();
  cx2.beginPath();
  cx2.arc(CX,CY,CROWD_INNER,0,Math.PI*2);
  cx2.arc(CX,CY,RING_R,0,Math.PI*2,true); // hole in middle
  cx2.fillStyle = floorRing;
  cx2.fill();
  cx2.restore();

  // Subtle floor planks/lines radiating outward
  for (let a=0; a<Math.PI*2; a+=Math.PI/18) {
    cx2.strokeStyle='rgba(0,0,0,0.18)';
    cx2.lineWidth=1;
    cx2.beginPath();
    cx2.moveTo(CX+Math.cos(a)*(RING_R+4), CY+Math.sin(a)*(RING_R+4));
    cx2.lineTo(CX+Math.cos(a)*(CROWD_INNER-2), CY+Math.sin(a)*(CROWD_INNER-2));
    cx2.stroke();
  }

  // Crowd seated in tight rings from CROWD_INNER outward
  for (let ring = 0; ring < 5; ring++) {
    const frac = ring / 4;
    const radius = CROWD_INNER + frac*(OUTER-CROWD_INNER);
    const personR = 5.5 - frac*1.8;
    const circumference = 2*Math.PI*radius;
    const count = Math.floor(circumference / (personR*2.2));
    const angleOffset = Math.random()*Math.PI*2;

    for (let i=0; i<count; i++) {
      const angle = angleOffset + (Math.PI*2/count)*i;
      const jitterR = rng(-personR*0.5, personR*0.5);
      const px = CX + Math.cos(angle)*(radius+jitterR);
      const py = CY + Math.sin(angle)*(radius+jitterR);
      const col = CROWD_COLORS[Math.floor(Math.random()*CROWD_COLORS.length)];
      const brightness = 0.45 + frac*0.3;

      // Body
      cx2.fillStyle = adjustBrightness(col, brightness*0.7);
      cx2.beginPath(); cx2.ellipse(px, py+personR*0.8, personR*0.7, personR*1.1, 0, 0, Math.PI*2); cx2.fill();

      // Head
      cx2.fillStyle = pickSkin(brightness);
      cx2.beginPath(); cx2.arc(px, py-personR*0.4, personR*0.7, 0, Math.PI*2); cx2.fill();

      // Raised arms
      if (Math.random() < 0.3) {
        cx2.strokeStyle = adjustBrightness(col, brightness*0.6);
        cx2.lineWidth = personR*0.32;
        cx2.lineCap = 'round';
        cx2.beginPath();
        cx2.moveTo(px-personR*0.6, py+personR*0.2);
        cx2.lineTo(px-personR*1.1, py-personR*0.8);
        cx2.moveTo(px+personR*0.6, py+personR*0.2);
        cx2.lineTo(px+personR*1.1, py-personR*0.8);
        cx2.stroke();
      }
    }
  }

  // Vignette at edges
  const vig = cx2.createRadialGradient(CX,CY,CROWD_INNER,CX,CY,220);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.6)');
  cx2.fillStyle=vig;
  cx2.fillRect(0,0,440,440);

  crowdImg = cc;
})();

function adjustBrightness(hex, factor) {
  const [r,g,b] = hr(hex);
  return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
}
function pickSkin(brightness) {
  const skins=['#fde3c8','#f5c6a0','#d4956a','#a0623a','#7a3b1e'];
  const s=skins[Math.floor(Math.random()*skins.length)];
  return adjustBrightness(s, brightness);
}

// ── Update ───────────────────────────────────────────────────────
function getInput(p) {
  if (p.isAI) {
    // Simple AI: home in on nearest active opponent
    let target = null, best = Infinity;
    for (const o of players) {
      if (o===p||o.eliminated) continue;
      const d = hypot(p,o);
      if (d<best) { best=d; target=o; }
    }
    if (!target) return {dx:0,dy:0};
    const dx=target.x-p.x, dy=target.y-p.y, m=Math.sqrt(dx*dx+dy*dy)||1;
    return {dx:dx/m, dy:dy/m};
  }
  const k=p.keys;
  return {
    dx:(heldKeys[k.right]?1:0)-(heldKeys[k.left]?1:0),
    dy:(heldKeys[k.down] ?1:0)-(heldKeys[k.up]  ?1:0),
  };
}

function hypot(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

function update() {
  const alive = players.filter(p=>!p.eliminated);
  if (alive.length<2) return;

  // Movement
  for (const p of alive) {
    const inp = getInput(p);
    const m = Math.sqrt(inp.dx*inp.dx+inp.dy*inp.dy)||1;
    p.pushing = (inp.dx!==0||inp.dy!==0);
    if (p.pushing) { p.vx+=(inp.dx/m)*SPEED; p.vy+=(inp.dy/m)*SPEED; }
    p.vx*=FRICTION; p.vy*=FRICTION;
    p.x+=p.vx; p.y+=p.vy;
  }

  // Collisions between players
  for (let i=0;i<alive.length;i++) {
    for (let j=i+1;j<alive.length;j++) {
      const a=alive[i], b=alive[j];
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy);
      const md=a.r+b.r;
      if (d<md&&d>0) {
        const nx=dx/d, ny=dy/d, ov=md-d;
        a.x-=nx*ov*0.5; a.y-=ny*ov*0.5;
        b.x+=nx*ov*0.5; b.y+=ny*ov*0.5;
        const rvx=a.vx-b.vx, rvy=a.vy-b.vy, dot=rvx*nx+rvy*ny;
        if (dot>0) {
          const imp=dot*PUSH_FORCE;
          a.vx-=nx*imp*2; a.vy-=ny*imp*2;
          b.vx+=nx*imp*2; b.vy+=ny*imp*2;
          flashTimer=10; flashX=(a.x+b.x)/2; flashY=(a.y+b.y)/2;
          cheerTimer=15;
        }
      }
    }
  }

  // Elimination: player centre crosses beyond ring line
  let newlyElim = [];
  for (const p of alive) {
    const dx=p.x-CX, dy=p.y-CY;
    if (Math.sqrt(dx*dx+dy*dy) > RING_R) {
      p.eliminated=true; p.vx=0; p.vy=0;
      cheerTimer=30;
      newlyElim.push(p);
    }
  }

  flashTimer=Math.max(0,flashTimer-1);

  // Round over?
  const remaining=players.filter(p=>!p.eliminated);
  if (remaining.length<=1) {
    gameActive=false;
    const winner=remaining[0]||null;
    if (winner && winner.index < numPlayers) scores[winner.index]++;
    updateDots();
    setTimeout(()=>endRound(winner), 500);
  }
}

function endRound(winner) {
  round++;
  // Check for match winner
  let matchWinner=-1;
  for (let i=0;i<numPlayers;i++) if(scores[i]>=POINTS_TO_WIN){matchWinner=i;break;}

  if (matchWinner>=0) {
    document.getElementById('pickerDiv').style.display='none';
    showOverlay(
      `${CONFIGS[matchWinner].name} Wins!`,
      `Match champion — ${POINTS_TO_WIN} points reached!`,
      '🏆', CONFIGS[matchWinner].color,
      'Play Again'
    );
    document.getElementById('ovBtn').onclick=()=>{
      scores=[0,0,0,0]; round=1; updateDots();
      hideOverlay(); startRound();
    };
  } else {
    document.getElementById('pickerDiv').style.display='none';
    const sub = winner
      ? `${winner.name} scores! First to ${POINTS_TO_WIN} points wins the match.`
      : `Double elimination — no point this round!`;
    showOverlay(
      winner ? `${winner.name} Scores!` : 'Draw!',
      sub,
      winner ? '👊' : '🤝',
      winner ? CONFIGS[winner.index].color : '#e8c97a',
      'Next Round'
    );
    document.getElementById('ovBtn').onclick=()=>{ hideOverlay(); startRound(); };
  }
}

function showOverlay(title, sub, emoji, color, btnLabel) {
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovTitle').style.color=color;
  document.getElementById('ovSub').textContent=sub;
  document.getElementById('ovEmoji').textContent=emoji;
  document.getElementById('ovBtn').textContent=btnLabel;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay(){ document.getElementById('overlay').classList.remove('show'); }

// ── Draw ─────────────────────────────────────────────────────────
function drawArena() {
  // Crowd background
  ctx.drawImage(crowdImg, 0, 0);

  // Raised platform / dohyō base shadow
  ctx.save();
  ctx.filter='blur(18px)';
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.arc(CX,CY+6,RING_R+12,0,Math.PI*2); ctx.fill();
  ctx.filter='none';
  ctx.restore();

  // Sand (clipped inside ring)
  ctx.save();
  ctx.beginPath(); ctx.arc(CX,CY,RING_R,0,Math.PI*2); ctx.clip();
  ctx.drawImage(sandImg,0,0);
  ctx.restore();

  // Center decorations
  ctx.strokeStyle='rgba(80,40,0,0.28)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(CX,CY,14,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX-RING_R*0.82,CY); ctx.lineTo(CX+RING_R*0.82,CY); ctx.stroke();

  // Boundary rope — one thin line
  ctx.strokeStyle='#4a1800';
  ctx.lineWidth=LINE_W;
  ctx.beginPath(); ctx.arc(CX,CY,RING_R,0,Math.PI*2); ctx.stroke();

  // Rope highlight
  ctx.strokeStyle='rgba(160,80,20,0.55)';
  ctx.lineWidth=1.8;
  ctx.setLineDash([12,6]);
  ctx.beginPath(); ctx.arc(CX,CY,RING_R,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlayer(p) {
  ctx.save();
  if (p.eliminated) ctx.globalAlpha=0.22;

  // Drop shadow
  ctx.save();
  ctx.filter='blur(5px)';
  ctx.fillStyle=p.shadow;
  ctx.beginPath();
  ctx.ellipse(p.x+3, p.y+5, p.r, p.r*0.55, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Body
  const g=ctx.createRadialGradient(p.x-p.r*.3,p.y-p.r*.3,p.r*.1,p.x,p.y,p.r);
  g.addColorStop(0,lighten(p.color,.45));
  g.addColorStop(1,darken(p.color,.35));
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();

  // Belt
  ctx.strokeStyle=darken(p.color,.5); ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(p.x,p.y+3,p.r*.6,Math.PI*.1,Math.PI*.9); ctx.stroke();

  // Face
  ctx.fillStyle='#ffe0c0';
  ctx.beginPath(); ctx.arc(p.x,p.y-2,6,0,Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle='#222';
  if (p.pushing) {
    ctx.beginPath();
    ctx.arc(p.x-2,p.y-2.5,1.4,0,Math.PI*2);
    ctx.arc(p.x+2,p.y-2.5,1.4,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#222'; ctx.lineWidth=.9;
    ctx.beginPath();
    ctx.moveTo(p.x-3.2,p.y-5); ctx.lineTo(p.x-.4,p.y-4.2);
    ctx.moveTo(p.x+3.2,p.y-5); ctx.lineTo(p.x+.4,p.y-4.2);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(p.x-2,p.y-2.5,1.1,0,Math.PI*2);
    ctx.arc(p.x+2,p.y-2.5,1.1,0,Math.PI*2);
    ctx.fill();
  }

  // Label
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.font='bold 7px Georgia';
  ctx.textAlign='center';
  ctx.fillText(p.name, p.x, p.y+p.r+9);

  ctx.restore();
}

let cheerTimer = 0;

function draw() {
  ctx.clearRect(0,0,440,440);
  drawArena();

  // Crowd cheer flash
  if (cheerTimer > 0) {
    ctx.save();
    ctx.globalAlpha = (cheerTimer/15)*0.18;
    ctx.fillStyle = '#fff8e0';
    ctx.fillRect(0,0,440,440);
    ctx.restore();
    cheerTimer--;
  }

  if (flashTimer>0) {
    ctx.save();
    ctx.globalAlpha=(flashTimer/10)*.32;
    const fg=ctx.createRadialGradient(flashX,flashY,0,flashX,flashY,25);
    fg.addColorStop(0,'#fff'); fg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.arc(flashX,flashY,25,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  players.forEach(drawPlayer);
}

function loop() {
  if (gameActive) update();
  draw();
  animId=requestAnimationFrame(loop);
}

function lighten(hex,amt=.4){const[r,g,b]=hr(hex);return`rgb(${Math.min(255,r+r*amt)},${Math.min(255,g+g*amt)},${Math.min(255,b+b*amt)})`;}
function darken(hex,amt=.3){const[r,g,b]=hr(hex);return`rgb(${r*(1-amt)},${g*(1-amt)},${b*(1-amt)})`;}
function hr(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

// Idle preview
resetPlayers();
loop();
</script>
