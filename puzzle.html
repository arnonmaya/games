<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picture Puzzle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0e0e10;--surface:#1a1a1e;--surface2:#242428;
    --border:rgba(255,255,255,0.08);--accent:#c8a96e;--accent2:#7eb8c8;
    --text:#f0ede8;--muted:rgba(240,237,232,0.45);--success:#6fcf97;
    --piece-border:rgba(255,255,255,0.12);--slot-dash:rgba(200,169,110,0.25);
  }
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem;gap:.4rem;}
  h1{font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,4vw,2rem);letter-spacing:.02em;color:var(--accent);font-weight:400;}
  .subtitle{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
  .stats{display:flex;gap:1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.35rem 1rem;}
  .stat{text-align:center;}
  .sv{font-size:13px;font-weight:500;color:var(--text);}
  .sl{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
  .game-area{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
  .board-and-tray{display:flex;gap:14px;align-items:flex-start;}
  .side-panel{display:flex;flex-direction:column;gap:10px;min-width:120px;}
  .panel-label{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
  #prev{display:block;border-radius:8px;border:1px solid var(--border);transition:opacity .3s;}
  #board{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .slot{position:absolute;box-sizing:border-box;border:1.5px dashed var(--slot-dash);transition:background .15s,border-color .15s;cursor:pointer;}
  .slot:hover{background:rgba(200,169,110,.07);border-color:rgba(200,169,110,.5);}
  .slot.filled{border:none;cursor:default;pointer-events:none;}
  .slot canvas{display:block;position:absolute;top:0;left:0;}
  #tray-wrap{flex-shrink:0;}
  #tray{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:8px;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow-y:auto;overflow-x:hidden;align-content:start;}
  #tray::-webkit-scrollbar{width:4px;}
  #tray::-webkit-scrollbar-track{background:transparent;}
  #tray::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
  .piece{cursor:pointer;border-radius:4px;border:2px solid var(--piece-border);overflow:hidden;transition:border-color .15s,transform .1s;flex-shrink:0;}
  .piece:hover{border-color:var(--accent2);transform:scale(1.05);}
  .piece.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,169,110,.3);transform:scale(1.05);}
  .piece canvas{display:block;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center;}
  button{font-family:'DM Mono',monospace;font-size:12px;padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:var(--surface2);color:var(--text);cursor:pointer;letter-spacing:.05em;transition:background .15s,border-color .15s,transform .1s;}
  button:hover{background:var(--surface);border-color:var(--accent);}
  button:active{transform:scale(.97);}
  .diff-btn{font-size:11px;padding:5px 12px;color:var(--muted);}
  .diff-btn.on{color:var(--accent);border-color:rgba(200,169,110,.5);background:rgba(200,169,110,.08);}
  .win-msg{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--success);min-height:1.5rem;text-align:center;font-weight:400;}
  .hint{font-size:11px;color:var(--muted);letter-spacing:.06em;text-align:center;}
  .correct-glow{outline:2px solid rgba(111,207,151,.75);}
  .cat-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .cat-btn{font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.06em;transition:all .15s;}
  .cat-btn:hover{border-color:var(--accent2);color:var(--accent2);}
  .cat-btn.on{background:rgba(126,184,200,.15);border-color:var(--accent2);color:var(--accent2);}
  .img-picker{display:flex;flex-wrap:nowrap;gap:5px;justify-content:flex-start;max-width:800px;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;}
  .img-picker::-webkit-scrollbar{height:3px;}
  .img-picker::-webkit-scrollbar-track{background:transparent;}
  .img-picker::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
  .img-btn{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.06em;transition:all .15s;}
  .img-btn:hover{border-color:var(--accent);color:var(--accent);}
  .img-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,.1);}

  /* Home button */
  .home-btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:12px;padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:var(--surface2);color:var(--text);cursor:pointer;letter-spacing:.05em;text-decoration:none;transition:background .15s,border-color .15s,transform .1s;}
  .lang-btn{font-family:'DM Mono',monospace;font-size:12px;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(200,169,110,.4);background:transparent;color:var(--accent);cursor:pointer;letter-spacing:.08em;font-weight:500;transition:all .15s;}
  .lang-btn:hover{background:rgba(200,169,110,.12);}
  body.rtl{direction:rtl;}
  body.rtl .img-picker{justify-content:flex-end;}
  body.rtl .board-and-tray{flex-direction:row-reverse;}
  .home-btn:hover{background:var(--surface);border-color:var(--accent);}
  .home-btn:active{transform:scale(.97);}
  /* Music toggle */
  .music-btn{font-size:16px;padding:6px 12px;min-width:36px;}
  /* Touch controls - only shown on touch devices */
  #touch-controls{display:none;position:fixed;bottom:24px;right:20px;z-index:100;flex-direction:column;align-items:center;gap:10px;}
  #touch-controls.visible{display:flex;}
  .touch-row{display:flex;gap:10px;align-items:center;}
  .touch-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(200,169,110,.5);background:rgba(26,26,30,.85);backdrop-filter:blur(8px);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .12s,transform .1s;box-shadow:0 2px 12px rgba(0,0,0,.4);}
  .touch-btn:active{background:rgba(200,169,110,.2);transform:scale(.93);}
  .touch-btn.touch-select{background:rgba(200,169,110,.15);border-color:var(--accent);}
  /* Keyboard hint */
  .kb-hint{font-size:10px;color:var(--muted);text-align:center;letter-spacing:.06em;}
</style>
</head>
<body>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;">
  <a href="https://arnonmaya.github.io/games/" class="home-btn" id="home-link">🏠 Back to Home Page</a>
  <button class="lang-btn" id="lang-btn" onclick="toggleLang()">עב</button>
  <button class="music-btn" id="music-btn" onclick="toggleMusic()" title="Toggle music">🎵</button>
</div>
<h1 id="t-title">Picture Puzzle</h1>
<p class="subtitle" id="t-subtitle">Assemble the fragments</p>



<div class="cat-tabs" id="cat-tabs"></div>
<div class="img-picker" id="img-picker"></div>

<div class="game-area">
  <div class="side-panel">
    <div class="panel-label" id="t-ref">Reference</div>
    <canvas id="prev" width="110" height="110"></canvas>
  </div>
  <div class="board-and-tray">
    <div>
      <div class="panel-label" id="t-board" style="margin-bottom:5px;">Board — select a piece, then click a slot</div>
      <div id="board"></div>
    </div>
    <div id="tray-wrap">
      <div class="panel-label" id="t-pieces" style="margin-bottom:5px;">Pieces</div>
      <div id="tray"></div>
    </div>
  </div>
</div>

<div class="win-msg" id="wm"></div>
<div class="hint" id="ht">Select a piece from the tray, then click a slot on the board.</div>

<div class="controls">
  <button onclick="ng()" id="t-newgame">↺ New game</button>
  <button onclick="togPrev()" id="t-preview">◑ Toggle preview</button>
  <div style="display:flex;gap:5px;">
    <button class="diff-btn" onclick="setN(3)">3×3</button>
    <button class="diff-btn on" onclick="setN(4)">4×4</button>
    <button class="diff-btn" onclick="setN(5)">5×5</button>
  </div>
</div>
<p class="kb-hint" id="kb-hint" style="display:none;"></p>

<div id="touch-controls">
  <div class="touch-row">
    <div class="touch-btn" id="tc-left" title="Previous piece">◀</div>
    <div class="touch-btn touch-select" id="tc-select" title="Select / Place piece">✓</div>
    <div class="touch-btn" id="tc-right" title="Next piece">▶</div>
  </div>
  <div class="touch-row">
    <div class="touch-btn" id="tc-new" title="New game">↺</div>
    <div class="touch-btn" id="tc-prev" title="Toggle preview">◑</div>
    <div class="touch-btn" id="tc-music" title="Toggle music">🎵</div>
  </div>
</div>

<script>
// ── Scenes ────────────────────────────────────────────────────────────
const SCENES = [
  {name:'Mountain Lake', cat:'Nature',   fn:drawMountain},
  {name:'Forest Path',   cat:'Nature',   fn:drawForest},
  {name:'Ocean Night',   cat:'Nature',   fn:drawOcean},
  {name:'Desert Dunes',  cat:'Nature',   fn:drawDesert},
  {name:'Snowy Valley',  cat:'Nature',   fn:drawSnow},
  {name:'Autumn Park',   cat:'Nature',   fn:drawAutumn},
  {name:'Tropical Beach',cat:'Nature',   fn:drawBeach},
  {name:'Waterfall',     cat:'Nature',   fn:drawWaterfall},
  {name:'Volcano',       cat:'Nature',   fn:drawVolcano},
  {name:'Night City',    cat:'Cities',   fn:drawCity},
  {name:'Rainy Street',  cat:'Cities',   fn:drawRainy},
  {name:'Harbor Dusk',   cat:'Cities',   fn:drawHarbor},
  {name:'Ancient Ruins', cat:'Cities',   fn:drawRuins},
  {name:'Japanese Temple',cat:'Cities',  fn:drawTemple},
  {name:'Lighthouse',    cat:'Cities',   fn:drawLighthouse},
  {name:'Hot Air Balloons',cat:'Cities', fn:drawBalloons},
  {name:'Starfield',     cat:'Space',    fn:drawStars},
  {name:'Nebula',        cat:'Space',    fn:drawNebula},
  {name:'Aurora',        cat:'Space',    fn:drawAurora},
  {name:'Alien Planet',  cat:'Space',    fn:drawAlien},
  {name:'Solar System',  cat:'Space',    fn:drawSolar},
  {name:'Black Hole',    cat:'Space',    fn:drawBlackHole},
  {name:'Koi Pond',      cat:'Animals',  fn:drawKoi},
  {name:'Arctic Scene',  cat:'Animals',  fn:drawArctic},
  {name:'Jungle',        cat:'Animals',  fn:drawJungle},
  {name:'Savanna',       cat:'Animals',  fn:drawSavanna},
  {name:'Coral Reef',    cat:'Animals',  fn:drawReef},
  {name:'Bird Migration',cat:'Animals',  fn:drawBirds},
];

// ── State ─────────────────────────────────────────────────────────────
let N=4,SZ=90,sel=null,moves=0,secs=0,tInt=null,going=false;
let bState=[],pieces=[],imgIdx=0,showPrev=true,curCat='Nature';
const CS=360;
let mc,mx;

// ── Helper primitives ─────────────────────────────────────────────────
function tri(c,x1,y1,x2,y2,x3,y3){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.lineTo(x3,y3);c.fill();}
function circle(c,x,y,r){c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();}
function pineTree(c,x,base,tw,th){
  c.beginPath();c.moveTo(x,base-th);c.lineTo(x-tw,base);c.lineTo(x+tw,base);c.fill();
  c.beginPath();c.moveTo(x,base-th*.6);c.lineTo(x-tw*1.4,base-th*.2);c.lineTo(x+tw*1.4,base-th*.2);c.fill();
}
function bigTree(c,x,base,tw,th){
  const col=c.fillStyle;
  c.fillStyle='rgba(0,0,0,.5)';c.fillRect(x-tw*.3,base-th*.22,tw*.6,th*.26);c.fillStyle=col;
  c.beginPath();c.moveTo(x,base-th);c.lineTo(x-tw,base-th*.52);c.lineTo(x+tw,base-th*.52);c.fill();
  c.beginPath();c.moveTo(x,base-th*.62);c.lineTo(x-tw*1.45,base-th*.2);c.lineTo(x+tw*1.45,base-th*.2);c.fill();
  c.beginPath();c.moveTo(x,base-th*.28);c.lineTo(x-tw*1.8,base);c.lineTo(x+tw*1.8,base);c.fill();
}
function cloud(c,x,y,s){
  c.beginPath();c.arc(x,y,s,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*.9,y+s*.1,s*.75,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x-s*.8,y+s*.15,s*.7,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*.4,y-s*.5,s*.6,0,Math.PI*2);c.fill();
}
function cactus(c,x,base,w,h){
  c.fillRect(x-w*.5,base-h,w,h);
  c.fillRect(x-w*2,base-h*.6,w*1.5,w);c.fillRect(x-w*2,base-h*.6-w,w,h*.25);
  c.fillRect(x+w*.5,base-h*.5,w*1.5,w);c.fillRect(x+w*1.5,base-h*.5-w,w,h*.2);
}
function stars(c,w,h,n,maxY,alpha){
  c.fillStyle=`rgba(255,255,255,${alpha||0.8})`;
  for(let i=0;i<n;i++){circle(c,Math.random()*w,Math.random()*(maxY||h),.5+Math.random()*.8);}
}
function gradRect(c,x,y,w,h,stops){
  const g=c.createLinearGradient(x,y,x,y+h);
  stops.forEach(([p,col])=>g.addColorStop(p,col));
  c.fillStyle=g;c.fillRect(x,y,w,h);
}

// ── NATURE ────────────────────────────────────────────────────────────
function drawMountain(ctx,w,h){
  // Rich sky with gradient bands
  gradRect(ctx,0,0,w,h*.55,[[0,'#04152a'],[.3,'#0d3060'],[.7,'#2860a0'],[1,'#6ea8d4']]);
  // Many stars + milky way
  for(let i=0;i<80;i++){const sz=Math.random();ctx.fillStyle=`rgba(255,255,255,${.4+sz*.7})`;circle(ctx,Math.random()*w,Math.random()*h*.45,.4+sz*1.2);}
  // Moon
  ctx.fillStyle='#f8f0d8';circle(ctx,w*.15,h*.1,w*.03);
  ctx.fillStyle='rgba(248,240,216,.1)';circle(ctx,w*.15,h*.1,w*.06);
  // Far mountain (lightest)
  ctx.fillStyle='#1a3560';tri(ctx,-w*.1,h*.55,w*.15,h*.32,w*.45,h*.55);
  ctx.fillStyle='#1f3e6e';tri(ctx,w*.35,h*.55,w*.62,h*.28,w*.9,h*.55);
  // Mid mountain
  ctx.fillStyle='#2a2060';tri(ctx,-w*.05,h*.56,w*.22,h*.14,w*.48,h*.56);
  ctx.fillStyle='#3d34a0';tri(ctx,w*.17,h*.56,w*.5,h*.05,w*.83,h*.56);
  ctx.fillStyle='#2a2060';tri(ctx,w*.57,h*.56,w*.84,h*.17,w*1.05,h*.56);
  // Snow caps with blue shadow
  ctx.fillStyle='#c8d8f0';tri(ctx,w*.5,h*.05,w*.4,h*.2,w*.6,h*.2);
  ctx.fillStyle='#dde8f5';tri(ctx,w*.5,h*.05,w*.44,h*.18,w*.56,h*.18);
  ctx.fillStyle='#c0d0ec';tri(ctx,w*.84,h*.17,w*.77,h*.28,w*.91,h*.28);
  ctx.fillStyle='#dde8f5';tri(ctx,w*.84,h*.17,w*.79,h*.26,w*.89,h*.26);
  ctx.fillStyle='#c8d8f0';tri(ctx,w*.22,h*.14,w*.15,h*.25,w*.29,h*.25);
  // Glowing lake
  gradRect(ctx,0,h*.55,w,h*.45,[[0,'#4a90d0'],[.3,'#2a68a8'],[.7,'#0e3a70'],[1,'#04152a']]);
  // Reflection of mountains in lake
  ctx.save();ctx.globalAlpha=.22;ctx.scale(1,-1);ctx.translate(0,-h*1.1);
  ctx.fillStyle='#3d34a0';tri(ctx,w*.17,h*.56,w*.5,h*.05,w*.83,h*.56);
  ctx.restore();
  // Shimmer lines on lake
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1.5;
  for(let i=0;i<12;i++){ctx.beginPath();ctx.moveTo(w*(.04+i*.09),h*(.62+i*.008));ctx.lineTo(w*(.1+i*.09),h*(.62+i*.008));ctx.stroke();}
  // Pine tree row - varied heights and shades
  const treeShades=['#0a4a30','#0d5a38','#084020','#0f6040','#0a4a30'];
  for(let i=0;i<14;i++){
    ctx.fillStyle=treeShades[i%5];
    const tx=w*(-.02+i*.075),th=h*(.12+Math.sin(i*.8)*.04);
    pineTree(ctx,tx,h*.555,w*.022,th);
  }
  // Foreground dark rocks
  ctx.fillStyle='#0a0820';
  ctx.beginPath();ctx.ellipse(w*.08,h*.56,w*.06,h*.025,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(w*.88,h*.56,w*.05,h*.02,0,0,Math.PI*2);ctx.fill();
  // Shooting star
  ctx.strokeStyle='rgba(255,255,200,.7)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(w*.7,h*.08);ctx.lineTo(w*.82,h*.16);ctx.stroke();
}

function drawForest(ctx,w,h){
  // Golden sky at sunset
  gradRect(ctx,0,0,w,h*.38,[[0,'#0d1e38'],[.3,'#1a3a5c'],[.6,'#8a4020'],[.8,'#d06820'],[1,'#f0a030']]);
  // Sun disc
  ctx.fillStyle='#ffe060';circle(ctx,w*.5,h*.3,w*.06);
  ctx.fillStyle='rgba(255,200,60,.2)';circle(ctx,w*.5,h*.3,w*.12);
  ctx.fillStyle='rgba(255,180,40,.08)';circle(ctx,w*.5,h*.3,w*.2);
  // Horizon glow
  gradRect(ctx,0,h*.3,w,h*.08,[[0,'rgba(240,160,40,.3)'],[1,'rgba(0,0,0,0)']]);
  // Ground layers - rich greens
  gradRect(ctx,0,h*.65,w,h*.35,[[0,'#3a6018'],[.4,'#2a4e10'],[1,'#142808']]);
  // Dirt path with detail
  ctx.fillStyle='#8a6030';
  ctx.beginPath();ctx.moveTo(w*.41,h);ctx.lineTo(w*.47,h*.52);ctx.lineTo(w*.53,h*.52);ctx.lineTo(w*.59,h);ctx.fill();
  ctx.fillStyle='#a07840';
  ctx.beginPath();ctx.moveTo(w*.435,h);ctx.lineTo(w*.475,h*.58);ctx.lineTo(w*.525,h*.58);ctx.lineTo(w*.565,h);ctx.fill();
  // Path stones
  ctx.fillStyle='rgba(160,130,80,.5)';
  for(let i=0;i<8;i++){ctx.beginPath();ctx.ellipse(w*(.48+Math.sin(i)*.02),h*(.6+i*.05),5,3,Math.random()*.5,0,Math.PI*2);ctx.fill();}
  // Sunbeams through trees
  ctx.save();ctx.globalAlpha=.09;ctx.fillStyle='#ffd060';
  for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(w*.5,h*.3);ctx.lineTo(w*(i*.145),h*.7);ctx.lineTo(w*(i*.145+.08),h*.7);ctx.fill();}
  ctx.restore();
  // Mid-ground trees (varied greens)
  const mc2=['#1a5010','#205818','#166018','#1c5820','#145a14'];
  for(let i=0;i<14;i++){ctx.fillStyle=mc2[i%5];bigTree(ctx,w*(.02+i*.075),h*.65,w*.02,h*.32+Math.sin(i*.7)*h*.04);}
  // Foreground large dark trees (silhouette)
  for(let i=0;i<8;i++){ctx.fillStyle=`rgb(${8+i*2},${20+i*3},${8+i*2})`;bigTree(ctx,i*w*.15-w*.04,h*.82,w*.045,h*.52);}
  // Fireflies
  ctx.fillStyle='rgba(255,255,100,.7)';
  for(let i=0;i<12;i++)circle(ctx,w*(.1+Math.random()*.8),h*(.5+Math.random()*.3),1.2);
  // Ferns at base
  ctx.strokeStyle='#1a4a10';ctx.lineWidth=2;
  for(let i=0;i<10;i++){const fx=w*(.05+i*.1),fy=h*.65;ctx.beginPath();ctx.moveTo(fx,fy);ctx.quadraticCurveTo(fx+12*(i%2?1:-1),fy-14,fx+18*(i%2?1:-1),fy-8);ctx.stroke();}
}

function drawOcean(ctx,w,h){
  // Deep night sky
  gradRect(ctx,0,0,w,h*.5,[[0,'#010610'],[.4,'#041428'],[.8,'#0a2850'],[1,'#1a5078']]);
  for(let i=0;i<80;i++){const sz=Math.random();ctx.fillStyle=`rgba(255,255,255,${.3+sz*.8})`;circle(ctx,Math.random()*w,Math.random()*h*.42,.4+sz*1.2);}
  // Large moon
  ctx.fillStyle='#f8f0d8';circle(ctx,w*.5,h*.12,w*.045);
  ctx.fillStyle='rgba(248,240,216,.12)';circle(ctx,w*.5,h*.12,w*.09);
  ctx.fillStyle='rgba(248,240,216,.05)';circle(ctx,w*.5,h*.12,w*.15);
  // Moon craters
  ctx.fillStyle='rgba(180,165,130,.4)';circle(ctx,w*.51,h*.1,w*.01);circle(ctx,w*.485,h*.13,w*.008);
  // Moon light column on water
  const mr=ctx.createLinearGradient(0,h*.48,0,h);

  gradRect(ctx,0,h*.54,w,h*.1,[[0,'#1888b0'],[1,'#1060a0']]);

  gradRect(ctx,0,h*.48,w,h*.06,[[0,'#50d0e8'],[.5,'#30b8d0'],[1,'#20a0c0']]);

  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2;
  for(let i=0;i<4;i++){const y=h*(.49+i*.016);ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<=w;x+=25)ctx.quadraticCurveTo(x+12,y-4+i,x+25,y);ctx.stroke();}

  // Wet sand near water (darker)
  gradRect(ctx,0,h*.58,w,h*.04,[[0,'#c0a040'],[1,'#d8b848']]);

  function palm(px,py){

    ctx.strokeStyle='#6a4010';ctx.lineWidth=10;

    fronds.forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(px-w*.01,py-h*.28);ctx.quadraticCurveTo(px+dx*w*.12,py+dy*h*.25-h*.1,px+dx*w*.2,py+dy*h*.28-h*.06);ctx.stroke();});

  // Umbrella + person
  ctx.fillStyle='#e02020';ctx.beginPath();ctx.moveTo(w*.5,h*.62);ctx.arc(w*.5,h*.62,w*.05,Math.PI,0);ctx.fill();

function drawCity(ctx,w,h){
  // Deep purple-orange sunset sky
  gradRect(ctx,0,0,w,h*.62,[[0,'#04020e'],[.25,'#140830'],[.5,'#3a1060'],[.72,'#8a2848'],[.88,'#d04818'],[1,'#e87830']]);

  for(let i=0;i<35;i++){ctx.fillStyle=`rgba(255,255,200,${.3+Math.random()*.6})`;circle(ctx,Math.random()*w*.85,Math.random()*h*.45,.5+Math.random());}
  // City glow on horizon
  ctx.fillStyle='rgba(200,100,20,.12)';ctx.fillRect(0,h*.52,w,h*.12);
  // Building silhouettes - layered depth
  const bFar=[[0,.1,.38],[.08,.08,.32],[.15,.09,.44],[.23,.07,.28],[.3,.1,.4],[.38,.06,.25],[.44,.09,.42],[.52,.08,.35],[.59,.1,.3],[.67,.07,.38],[.73,.09,.36],[.82,.08,.26],[.88,.1,.4],[.94,.08,.32]];
  ctx.fillStyle='#180a28';bFar.forEach(([x,bw,bh])=>ctx.fillRect(w*x,h*(1-bh),w*bw,h*(bh-.36)));
  ctx.fillStyle='#0e0618';
  const bNear=[[0,.12,.48],[.1,.09,.42],[.18,.11,.56],[.27,.08,.38],[.33,.12,.52],[.43,.07,.32],[.49,.11,.54],[.58,.09,.44],[.65,.12,.38],[.75,.08,.50],[.82,.11,.46],[.9,.1,.42]];
  bNear.forEach(([x,bw,bh])=>ctx.fillRect(w*x,h*(1-bh),w*bw,h*(bh-.37)));
  // Antenna spires
  [[.2,h*(1-.56)]].forEach(([bx,top])=>{ctx.strokeStyle='#e87830';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(w*bx,top);ctx.lineTo(w*bx,top-h*.06);ctx.stroke();ctx.fillStyle='#ff4020';circle(ctx,w*bx,top-h*.06,2);});
  ctx.fillStyle='#06040f';ctx.fillRect(0,h*.63,w,h*.37);
  // Road + lanes
  ctx.strokeStyle='rgba(255,200,80,.18)';ctx.lineWidth=2;ctx.setLineDash([18,14]);ctx.beginPath();ctx.moveTo(0,h*.82);ctx.lineTo(w,h*.82);ctx.stroke();ctx.setLineDash([]);
  // Windows - warm and cool lights
  bNear.forEach(([x,bw,bh])=>{
    for(let wy=h*(1-bh)+5;wy<h*.6;wy+=9)
      for(let wx=w*x+3;wx<w*(x+bw)-3;wx+=8)
        if(Math.random()>.35){
          const t=Math.random();
          if(t>.7)ctx.fillStyle='rgba(100,180,255,.95)';
          else if(t>.4)ctx.fillStyle=`rgba(255,${155+Math.random()*60|0},40,.95)`;
          else ctx.fillStyle='rgba(255,240,180,.85)';
          ctx.fillRect(wx,wy,3,4);
        }
  });
  // Car headlights on road
  ctx.fillStyle='rgba(255,240,180,.8)';
  ctx.beginPath();ctx.ellipse(w*.3,h*.815,8,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(w*.7,h*.818,8,3,0,0,Math.PI*2);ctx.fill();
  // Reflection in wet road
  ctx.save();ctx.globalAlpha=.15;ctx.scale(1,-1);ctx.translate(0,-h*1.75);
  bNear.forEach(([x,bw,bh])=>ctx.fillRect(w*x,h*(1-bh),w*bw,h*(bh-.37)));ctx.restore();
  // Billboard
  ctx.fillStyle='#2a1040';ctx.fillRect(w*.38,h*(1-.54),w*.12,h*.06);
  ctx.fillStyle='rgba(255,200,50,.6)';ctx.fillRect(w*.39,h*(1-.535),w*.1,h*.045);

function drawHarbor(ctx,w,h){

  ctx.fillStyle='rgba(160,80,100,.4)';cloud(ctx,w*.38,h*.2,w*.05);cloud(ctx,w*.88,h*.18,w*.04);

  ctx.fillStyle='rgba(20,25,40,.7)';
  [[.0,.08,.25],[.07,.06,.2],[.12,.07,.3],[.2,.05,.18],[.28,.08,.26],[.35,.05,.15],[.55,.06,.22],[.62,.05,.18],[.7,.07,.28],[.78,.05,.2],[.84,.07,.25],[.9,.06,.2]].forEach(([x,bw,bh])=>ctx.fillRect(w*x,h*(.52-bh),w*bw,h*bh));

  ctx.fillStyle=or;ctx.fillRect(w*.28,h*.52,w*.4,h*.48);
  // Dock structure
  ctx.fillStyle='#4a2e10';ctx.fillRect(w*.25,h*.52,w*.18,h*.06);

  for(let i=0;i<7;i++){ctx.fillRect(w*(.26+i*.024),h*.58,w*.012,h*.1);}
  // Dock planks
  ctx.strokeStyle='rgba(100,60,20,.4)';ctx.lineWidth=1;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(w*.25,h*(.525+i*.01));ctx.lineTo(w*.43,h*(.525+i*.01));ctx.stroke();}
  // Boats with detail
  function sailboat(bx,by,bw2){
    ctx.fillStyle='#f0e8d0';ctx.beginPath();ctx.moveTo(bx-bw2,by);ctx.lineTo(bx+bw2,by);ctx.lineTo(bx+bw2*.7,by+bw2*.6);ctx.lineTo(bx-bw2*.7,by+bw2*.6);ctx.fill();

    ctx.fillStyle='rgba(200,50,30,.7)';ctx.beginPath();ctx.moveTo(bx,by-bw2*.8);ctx.lineTo(bx-bw2*.7,by-bw2*.3);ctx.lineTo(bx,by-bw2*.1);ctx.fill();
  }
  function motorboat(bx,by,bw2){
    ctx.fillStyle='#ddd8c0';ctx.beginPath();ctx.moveTo(bx-bw2*1.2,by);ctx.lineTo(bx+bw2*1.5,by-bw2*.1);ctx.lineTo(bx+bw2*1.3,by+bw2*.5);ctx.lineTo(bx-bw2,by+bw2*.5);ctx.fill();

function drawRuins(ctx,w,h){
  // Moonlit night sky
  gradRect(ctx,0,0,w,h*.52,[[0,'#020206'],[.3,'#06080e'],[.6,'#0c1020'],[1,'#162030']]);

  // Large moon with texture
  ctx.fillStyle='#e8e0c0';circle(ctx,w*.8,h*.12,w*.048);
  ctx.fillStyle='rgba(200,190,160,.3)';circle(ctx,w*.82,h*.11,w*.035);// shadow
  ctx.fillStyle='rgba(232,224,192,.15)';circle(ctx,w*.8,h*.12,w*.09);// halo
  // Ground - dry earth with grass patches
  gradRect(ctx,0,h*.62,w,h*.38,[[0,'#1a1a08'],[.4,'#121208'],[.8,'#0c0c04'],[1,'#060602']]);
  ctx.fillStyle='#1a2808';

  ctx.fillStyle='rgba(80,75,60,.4)';
  for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(w*(.46+Math.sin(i)*.04),h*(.66+i*.05),w*.04,h*.015,Math.random()*.3,0,Math.PI*2);ctx.fill();}
  // Columns - detailed marble
  const colData=[[.08,.42,.24,.42,.56],[.2,.42,.22,.28,.3],[.34,.44,.21],[.48,.42,.23],[.62,.43,.2],[.75,.42,.25],[.88,.44,.22]];
  [[.08,.56],[.18,.54],[.3,.56],[.45,.54],[.58,.55],[.72,.54],[.86,.56]].forEach(([cx,bh],ci)=>{
    const ht=h*(bh-.42+.15);
    // Column shaft with fluting (vertical lines)
    ctx.fillStyle='#5a5040';ctx.fillRect(w*cx-w*.02,h*(1-bh),w*.04,ht);
    ctx.strokeStyle='rgba(90,85,65,.5)';ctx.lineWidth=1;
    for(let fl=0;fl<3;fl++){ctx.beginPath();ctx.moveTo(w*cx-w*.016+fl*w*.012,h*(1-bh));ctx.lineTo(w*cx-w*.016+fl*w*.012,h*(1-bh)+ht);ctx.stroke();}
    // Capital (top)

    ctx.fillRect(w*cx-w*.032,h*(1-bh)-h*.04,w*.064,h*.015);
    // Base
    ctx.fillRect(w*cx-w*.026,h*(1-bh)+ht,w*.052,h*.018);
    // Moss
    ctx.fillStyle='rgba(40,60,20,.3)';ctx.beginPath();ctx.ellipse(w*cx,h*(1-bh)+ht*.6,w*.02,h*.01,0,0,Math.PI*2);ctx.fill();
  });
  // Broken lintel blocks
  ctx.fillStyle='#4a4030';ctx.fillRect(w*.06,h*.42,w*.3,h*.022);
  ctx.fillStyle='#3a3020';ctx.fillRect(w*.55,h*.41,w*.36,h*.022);
  // Fallen column section
  ctx.save();ctx.translate(w*.5,h*.68);ctx.rotate(.15);ctx.fillStyle='#5a5040';ctx.fillRect(-w*.08,-h*.02,w*.16,h*.04);ctx.restore();
  // Archway with detail
  ctx.fillStyle='#2e2818';ctx.beginPath();ctx.arc(w*.5,h*.56,w*.13,Math.PI,0);ctx.rect(w*.37,h*.56,w*.26,h*.08);ctx.fill();
  ctx.strokeStyle='#5a5040';ctx.lineWidth=6;ctx.beginPath();ctx.arc(w*.5,h*.56,w*.13,Math.PI,0);ctx.stroke();
  // Carved detail on arch
  ctx.strokeStyle='rgba(100,90,70,.4)';ctx.lineWidth=2;
  for(let i=0;i<5;i++){const a=Math.PI+i*Math.PI/4;ctx.beginPath();ctx.arc(w*.5,h*.56,w*.13,a,a+Math.PI/5);ctx.stroke();}
  // Ivy on columns
  ctx.strokeStyle='rgba(30,60,20,.5)';ctx.lineWidth=2;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(w*.08,h*.62);for(let y=h*.62;y>h*.46;y-=8)ctx.lineTo(w*.08+Math.sin(y*.2+i)*4,y);ctx.stroke();}
  // Moonlight glow on ground
  const mg=ctx.createRadialGradient(w*.8,h*.12,0,w*.8,h*.12,w*.4);
  mg.addColorStop(0,'rgba(232,220,180,.06)');mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg;ctx.fillRect(0,0,w,h);
}

function drawTemple(ctx,w,h){
  gradRect(ctx,0,0,w,h*.52,[[0,'#020208'],[.3,'#060c18'],[.6,'#0a1828'],[1,'#122038']]);
  for(let i=0;i<60;i++){ctx.fillStyle=`rgba(255,255,220,${.2+Math.random()*.7})`;circle(ctx,Math.random()*w,Math.random()*h*.46,.4+Math.random()*1.2);}

  gradRect(ctx,0,h*.5,w,h*.5,[[0,'#0e1e30'],[.4,'#081420'],[.8,'#040c14'],[1,'#020608']]);

  ctx.strokeStyle='rgba(180,170,140,.1)';ctx.lineWidth=1;
  for(let i=0;i<8;i++){const y=h*(.52+i*.06);ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<=w;x+=30)ctx.quadraticCurveTo(x+15,y-2,x+30,y);ctx.stroke();}
  // Cherry blossom trees both sides
  for(let side=0;side<2;side++){
    const tx=side===0?w*.08:w*.92;
    ctx.strokeStyle='#2a1008';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(tx,h*.5);ctx.quadraticCurveTo(tx+(side?-1:1)*w*.04,h*.35,tx+(side?-1:1)*w*.02,h*.2);ctx.stroke();
    ctx.strokeStyle='#3a1810';ctx.lineWidth=3;
    [[.3,.45],[.5,.32],[.7,.4],[.4,.28],[.6,.25]].forEach(([t,yt])=>{
      const bx=tx+(side?-t:t)*w*.08,by=h*yt;

    });
    // Blossoms
    ctx.fillStyle='rgba(220,120,150,.8)';
    for(let p=0;p<18;p++)circle(ctx,tx+(side?-1:1)*(5+Math.random()*w*.12),h*(.2+Math.random()*.3),3+Math.random()*4);
    ctx.fillStyle='rgba(255,180,200,.5)';
    for(let p=0;p<12;p++)circle(ctx,tx+(side?-1:1)*(3+Math.random()*w*.15),h*(.15+Math.random()*.35),2+Math.random()*3);
  }
  // Falling petals
  ctx.fillStyle='rgba(220,140,160,.6)';
  for(let i=0;i<20;i++)circle(ctx,Math.random()*w,Math.random()*h*.5,2+Math.random()*2);
  // Torii gate - bright red
  ctx.fillStyle='#d02010';
  ctx.fillRect(w*.28,h*.18,w*.44,h*.035);
  ctx.fillRect(w*.26,h*.14,w*.48,h*.025);
  ctx.fillRect(w*.34,h*.22,w*.04,h*.3);
  ctx.fillRect(w*.62,h*.22,w*.04,h*.3);
  // Torii crossbar ends decorated
  ctx.fillStyle='#b01808';ctx.fillRect(w*.26,h*.14,w*.05,h*.025);ctx.fillRect(w*.69,h*.14,w*.05,h*.025);
  // Gate reflection
  ctx.save();ctx.globalAlpha=.22;ctx.scale(1,-1);ctx.translate(0,-h);
  ctx.fillStyle='#d02010';ctx.fillRect(w*.28,h*.18,w*.44,h*.035);ctx.fillRect(w*.34,h*.22,w*.04,h*.3);ctx.fillRect(w*.62,h*.22,w*.04,h*.3);ctx.restore();
  // Temple in background (dark silhouette)
  ctx.fillStyle='#040810';
  ctx.fillRect(w*.12,h*.52,w*.76,h*.2);
  ctx.beginPath();ctx.moveTo(w*.06,h*.52);ctx.quadraticCurveTo(w*.5,h*.36,w*.94,h*.52);ctx.fill();
  ctx.fillRect(w*.2,h*.4,w*.6,h*.04);
  // Hanging lanterns
  ctx.fillStyle='rgba(255,160,40,.9)';
  for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(w*(.2+i*.13),h*.5,5,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,220,100,.4)';circle(ctx,w*(.2+i*.13),h*.5,10);ctx.fillStyle='rgba(255,160,40,.9)';}
}

function drawLighthouse(ctx,w,h){
  // Deep night ocean sky
  gradRect(ctx,0,0,w,h*.58,[[0,'#010408'],[.3,'#030810'],[.6,'#06121e'],[1,'#0c2030']]);

  ctx.save();ctx.globalAlpha=.08;ctx.fillStyle='#f8e060';
  ctx.beginPath();ctx.moveTo(w*.32,h*.18);ctx.lineTo(w,h*.35);ctx.lineTo(w,h*.22);ctx.fill();
  ctx.beginPath();ctx.moveTo(w*.32,h*.18);ctx.lineTo(0,h*.42);ctx.lineTo(0,h*.28);ctx.fill();
  ctx.restore();
  ctx.save();ctx.globalAlpha=.04;ctx.fillStyle='#f8e060';
  ctx.beginPath();ctx.moveTo(w*.32,h*.18);ctx.lineTo(w*.7,h);ctx.lineTo(w*.8,h);ctx.fill();ctx.restore();
  // Rocky cliff
  gradRect(ctx,0,h*.58,w,h*.42,[[0,'#1a2018'],[.5,'#101610'],[1,'#080c08']]);
  ctx.fillStyle='#1e2818';ctx.fillRect(0,h*.6,w*.42,h*.4);
  ctx.fillStyle='#141e10';ctx.fillRect(0,h*.68,w*.38,h*.32);
  // Rock texture on cliff
  ctx.strokeStyle='rgba(40,55,30,.4)';ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(0,h*(.62+i*.04));ctx.lineTo(w*.38,h*(.64+i*.04));ctx.stroke();}
  // Ocean
  gradRect(ctx,0,h*.58,w,h*.42,[[0,'#1848a0'],[.3,'#0c3070'],[.6,'#061840'],[1,'#020810']]);
  ctx.fillStyle='rgba(255,255,255,.15)';
  for(let i=0;i<8;i++){const y=h*(.6+i*.05);ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<=w;x+=22)ctx.quadraticCurveTo(x+11,y-4+i*.3,x+22,y);ctx.stroke(); /* was stroke on wrong thing */}
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1.5;
  for(let i=0;i<8;i++){const y=h*(.6+i*.05);ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<=w;x+=22)ctx.quadraticCurveTo(x+11,y-4+i*.3,x+22,y);ctx.stroke();}
  // Lighthouse tower - detailed
  gradRect(ctx,w*.24,h*.15,w*.16,h*.44,[[0,'#f0f0f0'],[.5,'#d8d8d8'],[1,'#c0c0c0']]);
  // Red stripe pattern
  ctx.fillStyle='#c01818';
  for(let s=0;s<4;s++)gradRect(ctx,w*.24,h*(.2+s*.09),w*.16,h*.04,[[0,'#d02020'],[1,'#a01010']]);
  // Window
  ctx.fillStyle='#4080c0';ctx.fillRect(w*.3,h*.38,w*.04,h*.05);
  ctx.strokeStyle='#808080';ctx.lineWidth=1;ctx.strokeRect(w*.3,h*.38,w*.04,h*.05);
  // Door arch
  ctx.fillStyle='#5a3820';ctx.beginPath();ctx.arc(w*.32,h*.58,w*.02,Math.PI,0);ctx.rect(w*.3,h*.58,w*.04,h*.04);ctx.fill();
  // Lantern room
  ctx.fillStyle='#a0a0a0';ctx.fillRect(w*.22,h*.14,w*.2,h*.04);
  ctx.fillStyle='#b0b0b0';ctx.beginPath();ctx.moveTo(w*.25,h*.14);ctx.lineTo(w*.32,h*.1);ctx.lineTo(w*.39,h*.14);ctx.fill();
  ctx.fillStyle='#f8e060';circle(ctx,w*.32,h*.16,w*.028);
  ctx.fillStyle='rgba(248,224,96,.2)';circle(ctx,w*.32,h*.16,w*.055);
  // Light halo
  const lhg=ctx.createRadialGradient(w*.32,h*.16,0,w*.32,h*.16,w*.12);
  lhg.addColorStop(0,'rgba(255,240,100,.3)');lhg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=lhg;ctx.fillRect(w*.18,h*.06,w*.28,h*.2);
  // Base platform
  ctx.fillStyle='#888';ctx.fillRect(w*.2,h*.58,w*.24,h*.04);
  // Path to lighthouse
  ctx.fillStyle='rgba(100,110,80,.5)';
  for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(w*(.28+i*.018),h*(.62+i*.03),6,4,0,0,Math.PI*2);ctx.fill();}
}

function drawBalloons(ctx,w,h){
  // Magical sunrise sky
  gradRect(ctx,0,0,w,h*.7,[[0,'#080318'],[.2,'#1a0830'],[.4,'#3a1050'],[.6,'#803060'],[.78,'#c05830'],[1,'#f09040']]);
  for(let i=0;i<50;i++){ctx.fillStyle=`rgba(255,${180+Math.random()*70|0},${50+Math.random()*80|0},${.2+Math.random()*.5})`;circle(ctx,Math.random()*w,Math.random()*h*.35,.4+Math.random()*.9);}
  ctx.fillStyle='rgba(255,200,80,.85)';circle(ctx,w*.85,h*.55,w*.048);
  ctx.fillStyle='rgba(255,180,60,.18)';circle(ctx,w*.85,h*.55,w*.09);
  // Wispy sunrise clouds
  ctx.fillStyle='rgba(200,100,80,.4)';cloud(ctx,w*.12,h*.28,w*.06);cloud(ctx,w*.55,h*.18,w*.07);
  ctx.fillStyle='rgba(180,80,60,.3)';cloud(ctx,w*.32,h*.14,w*.05);cloud(ctx,w*.75,h*.24,w*.04);
  // Rolling countryside
  ctx.fillStyle='#1a3210';
  ctx.beginPath();ctx.moveTo(0,h*.7);ctx.bezierCurveTo(w*.2,h*.6,w*.4,h*.65,w*.6,h*.7);ctx.bezierCurveTo(w*.75,h*.74,w*.88,h*.68,w,h*.7);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  ctx.fillStyle='#142a0c';
  ctx.beginPath();ctx.moveTo(0,h*.8);ctx.bezierCurveTo(w*.25,h*.72,w*.5,h*.78,w*.75,h*.75);ctx.bezierCurveTo(w*.85,h*.73,w*.95,h*.8,w,h*.78);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  // Tiny village
  ctx.fillStyle='#0e2008';
  [[.15,.72],[.22,.7],[.7,.73],[.78,.71]].forEach(([hx,hy])=>{ctx.fillRect(w*hx,h*hy,10,8);ctx.beginPath();ctx.moveTo(w*hx-2,h*hy);ctx.lineTo(w*hx+6,h*hy-7);ctx.lineTo(w*hx+14,h*hy);ctx.fill();});
  // Detailed hot air balloons
  function balloon(bx,by,col1,col2,col3,sz){
    // Panels
    for(let p=0;p<8;p++){
      const a1=p/8*Math.PI*2,a2=(p+1)/8*Math.PI*2;
      ctx.fillStyle=p%2===0?col1:col2;
      ctx.beginPath();ctx.moveTo(bx,by);ctx.arc(bx,by,sz*.62,a1,a2);ctx.fill();
    }
    // Equator band
    ctx.strokeStyle=col3;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(bx,by,sz*.62,sz*.2,0,0,Math.PI*2);ctx.stroke();
    // Top highlight
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.ellipse(bx-sz*.15,by-sz*.3,sz*.2,sz*.15,-.4,0,Math.PI*2);ctx.fill();
    // Bottom opening
    ctx.fillStyle=col3;ctx.beginPath();ctx.ellipse(bx,by+sz*.62,sz*.12,sz*.06,0,0,Math.PI*2);ctx.fill();
    // Rope netting
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;
    for(let r=0;r<4;r++){const ra=r/4*Math.PI*2;ctx.beginPath();ctx.moveTo(bx+Math.cos(ra)*sz*.1,by+sz*.62);ctx.lineTo(bx+Math.cos(ra)*sz*.3,by+sz*.75);ctx.stroke();}
    // Basket
    ctx.fillStyle='#8a5a20';ctx.fillRect(bx-sz*.18,by+sz*.72,sz*.36,sz*.24);
    ctx.strokeStyle='#6a4010';ctx.lineWidth=1.5;ctx.strokeRect(bx-sz*.18,by+sz*.72,sz*.36,sz*.24);
    // Person in basket
    ctx.fillStyle='#f0c080';circle(ctx,bx,by+sz*.72,sz*.07);
  }
  balloon(w*.14,h*.24,w*.055,'#e02838','#f06878','#fff',h*.09);
  balloon(w*.34,h*.14,w*.055,'#f09010','#ffc040','#fff',h*.1);
  balloon(w*.54,h*.22,w*.055,'#1868c8','#4898f0','#fff',h*.088);
  balloon(w*.73,h*.16,w*.055,'#18a838','#50d068','#fff',h*.096);
  balloon(w*.88,h*.28,w*.055,'#8828b0','#c058e0','#fff',h*.082);
}

function drawStars(ctx,w,h){
  ctx.fillStyle='#000005';ctx.fillRect(0,0,w,h);
  // Dense star field with varied sizes/brightness
  for(let i=0;i<300;i++){const sz=Math.random();ctx.fillStyle=`rgba(255,255,255,${.2+sz*.8})`;circle(ctx,Math.random()*w,Math.random()*h,.3+sz*1.8);}
  // Milky way band - wide and detailed
  const mw=ctx.createLinearGradient(0,h*.15,w,h*.85);
  mw.addColorStop(0,'rgba(0,0,0,0)');mw.addColorStop(.25,'rgba(160,140,200,.07)');mw.addColorStop(.45,'rgba(180,160,220,.12)');mw.addColorStop(.55,'rgba(180,160,220,.12)');mw.addColorStop(.75,'rgba(160,140,200,.07)');mw.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mw;ctx.fillRect(0,0,w,h);
  // Dust clouds in milky way
  [[.3,.4,.08,'rgba(120,100,160,.06)'],[.5,.5,.1,'rgba(100,80,140,.08)'],[.7,.6,.07,'rgba(140,120,180,.06)']].forEach(([cx,cy,cr,col])=>{
    const dg=ctx.createRadialGradient(w*cx,h*cy,0,w*cx,h*cy,w*cr);dg.addColorStop(0,col);dg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=dg;ctx.fillRect(0,0,w,h);
  });
  // Colored giant stars
  const giantCols=['#ffd0d0','#d0d0ff','#d0ffd0','#ffffd0','#ffd0ff','#d0ffff'];
  for(let i=0;i<15;i++){ctx.fillStyle=giantCols[i%6];circle(ctx,Math.random()*w,Math.random()*h,1.5+Math.random()*2);}
  // Cross-sparkle on bright stars
  [[.12,.38],[.68,.18],[.45,.72],[.88,.55],[.28,.82],[.75,.4]].forEach(([sx,sy])=>{
    const r=w*.025;ctx.strokeStyle='rgba(255,255,200,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(w*sx-r,h*sy);ctx.lineTo(w*sx+r,h*sy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*sx,h*sy-r);ctx.lineTo(w*sx,h*sy+r);ctx.stroke();
    ctx.fillStyle='rgba(255,255,180,.95)';circle(ctx,w*sx,h*sy,2.5);
  });
  // Two shooting stars
  [[.55,.1,.75,.28],[.2,.6,.4,.72]].forEach(([x1,y1,x2,y2])=>{
    ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(w*x1,h*y1);ctx.lineTo(w*x2,h*y2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(w*x1,h*y1);ctx.lineTo(w*x2,h*y2);ctx.stroke();
  });
  // Distant galaxy smudge
  ctx.save();ctx.globalAlpha=.15;ctx.fillStyle='rgba(180,160,220,1)';ctx.beginPath();ctx.ellipse(w*.8,h*.7,25,10,-.4,0,Math.PI*2);ctx.fill();ctx.restore();
}

function drawNebula(ctx,w,h){
  ctx.fillStyle='#010008';ctx.fillRect(0,0,w,h);
  // Layered nebula clouds - rich colors
  const patches=[
    [w*.35,h*.38,w*.55,'rgba(120,30,200,.3)'],[w*.55,h*.28,w*.45,'rgba(30,70,220,.25)'],
    [w*.22,h*.55,w*.4,'rgba(200,50,100,.22)'],[w*.68,h*.62,w*.38,'rgba(30,180,120,.18)'],
    [w*.5,h*.5,w*.65,'rgba(60,20,150,.2)'],[w*.15,h*.25,w*.3,'rgba(180,50,80,.2)'],
    [w*.8,h*.35,w*.3,'rgba(40,100,200,.18)'],[w*.45,h*.7,w*.35,'rgba(200,120,30,.15)'],
  ];
  patches.forEach(([px,py,pr,col])=>{
    const g=ctx.createRadialGradient(px,py,0,px,py,pr);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  // Stars through nebula
  for(let i=0;i<200;i++){const sz=Math.random();ctx.fillStyle=`rgba(255,255,255,${.3+sz*.7})`;circle(ctx,Math.random()*w,Math.random()*h,.3+sz*1.5);}
  // Bright star cluster center
  const core=ctx.createRadialGradient(w*.42,h*.38,0,w*.42,h*.38,w*.12);
  core.addColorStop(0,'rgba(255,255,255,.9)');core.addColorStop(.1,'rgba(220,200,255,.5)');core.addColorStop(.3,'rgba(140,100,255,.2)');core.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=core;ctx.fillRect(w*.28,h*.24,w*.28,h*.28);
  // Dust lanes (dark)
  ctx.strokeStyle='rgba(5,0,15,.7)';ctx.lineWidth=14;
  ctx.beginPath();ctx.moveTo(w*.05,h*.28);ctx.bezierCurveTo(w*.3,h*.42,w*.6,h*.38,w*.92,h*.32);ctx.stroke();
  ctx.strokeStyle='rgba(5,0,15,.5)';ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(w*.1,h*.65);ctx.bezierCurveTo(w*.35,h*.55,w*.65,h*.6,w*.9,h*.7);ctx.stroke();
  // Bright nebula wisps
  ctx.save();ctx.globalAlpha=.4;
  ctx.fillStyle='rgba(180,100,255,1)';ctx.beginPath();ctx.ellipse(w*.3,h*.32,w*.08,w*.02,.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(80,160,255,1)';ctx.beginPath();ctx.ellipse(w*.65,h*.58,w*.06,w*.015,-.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawAurora(ctx,w,h){
  ctx.fillStyle='#010508';ctx.fillRect(0,0,w,h);
  for(let i=0;i<70;i++){ctx.fillStyle=`rgba(255,255,255,${.3+Math.random()*.65})`;circle(ctx,Math.random()*w,Math.random()*h*.42,.4+Math.random()*1.1);}

  const aurData=[
    {x:.02,w:.14,cols:['rgba(0,255,100,0)','rgba(0,255,100,.18)','rgba(0,255,120,.12)','rgba(0,255,100,0)']},
    {x:.12,w:.16,cols:['rgba(0,200,255,0)','rgba(0,200,255,.15)','rgba(0,220,255,.1)','rgba(0,200,255,0)']},
    {x:.25,w:.14,cols:['rgba(100,0,255,0)','rgba(100,0,255,.12)','rgba(120,20,255,.08)','rgba(100,0,255,0)']},
    {x:.36,w:.15,cols:['rgba(0,255,150,0)','rgba(0,255,180,.2)','rgba(0,255,160,.14)','rgba(0,255,150,0)']},
    {x:.5,w:.13,cols:['rgba(0,180,255,0)','rgba(0,180,255,.18)','rgba(0,200,255,.12)','rgba(0,180,255,0)']},
    {x:.6,w:.16,cols:['rgba(180,0,255,0)','rgba(180,0,255,.13)','rgba(200,20,255,.09)','rgba(180,0,255,0)']},
    {x:.74,w:.14,cols:['rgba(0,255,120,0)','rgba(0,255,120,.16)','rgba(0,255,140,.1)','rgba(0,255,120,0)']},
    {x:.85,w:.15,cols:['rgba(0,200,200,0)','rgba(0,220,200,.14)','rgba(0,200,220,.09)','rgba(0,200,200,0)']},
  ];
  aurData.forEach(({x,w:aw,cols})=>{
    const ag=ctx.createLinearGradient(w*x,h*.04,w*x,h*.68);
    cols.forEach((c,i)=>ag.addColorStop(i/3,c));
    ctx.fillStyle=ag;
    ctx.beginPath();ctx.moveTo(w*x,h*.04);
    for(let y=h*.04;y<h*.68;y+=4){const wave=Math.sin(y*.018+(x*10))*w*(aw*.4);ctx.lineTo(w*x+wave,y);}
    for(let y=h*.68;y>h*.04;y-=4){const wave=Math.sin(y*.018+(x*10))*w*(aw*.4);ctx.lineTo(w*(x+aw)+wave,y);}
    ctx.closePath();ctx.fill();
  });
  // Snowy landscape
  gradRect(ctx,0,h*.72,w,h*.28,[[0,'#d0e4f4'],[.4,'#b8d0e8'],[.8,'#a0bcd8'],[1,'#88a8c8']]);
  ctx.fillStyle='#dceef8';
  for(let i=0;i<8;i++){ctx.beginPath();ctx.ellipse(w*(i*.14+.02),h*.72,w*.09,h*.04,0,0,Math.PI*2);ctx.fill();}
  // Aurora reflection in snow
  ctx.save();ctx.globalAlpha=.12;
  aurData.forEach(({x,w:aw,cols})=>{ctx.fillStyle=cols[1];ctx.fillRect(w*x,h*.72,w*aw,h*.28);});
  ctx.restore();
  // Pine tree silhouettes
  ctx.fillStyle='#0a1c0c';
  for(let i=0;i<10;i++)pineTree(ctx,w*(.04+i*.1),h*.72,w*.018,h*.18);
}

  ctx.strokeStyle='rgba(200,170,240,.3)';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(w*.76,h*.1,w*.09,h*.025,-.25,0,Math.PI*2);ctx.stroke();

    // Glowing top

  // Two moons reflection
  ctx.fillStyle='rgba(168,184,136,.08)';ctx.beginPath();ctx.ellipse(w*.18,h*.8,w*.02,h*.03,0,0,Math.PI*2);ctx.fill();

function drawSolar(ctx,w,h){
  ctx.fillStyle='#000008';ctx.fillRect(0,0,w,h);
  for(let i=0;i<150;i++){const sz=Math.random();ctx.fillStyle=`rgba(255,255,255,${.2+sz*.7})`;circle(ctx,Math.random()*w,Math.random()*h,.3+sz*1.5);}
  // Sun with corona
  const sunG=ctx.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,w*.1);
  sunG.addColorStop(0,'#ffffff');sunG.addColorStop(.1,'#ffffd0');sunG.addColorStop(.3,'#ffe040');sunG.addColorStop(.6,'#ff8010');sunG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sunG;ctx.fillRect(w*.35,h*.35,w*.3,h*.3);
  ctx.fillStyle='#ffffd0';circle(ctx,w*.5,h*.5,w*.04);
  // Solar flares
  ctx.strokeStyle='rgba(255,150,20,.3)';ctx.lineWidth=3;
  for(let a=0;a<Math.PI*2;a+=Math.PI/5){
    const r1=w*.042,r2=w*.065;
    ctx.beginPath();ctx.moveTo(w*.5+Math.cos(a)*r1,h*.5+Math.sin(a)*r1);ctx.lineTo(w*.5+Math.cos(a)*r2,h*.5+Math.sin(a)*r2);ctx.stroke();
  }
  // Orbit rings
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
  [.1,.17,.24,.32,.42,.53,.63,.73].forEach(r=>{ctx.beginPath();ctx.ellipse(w*.5,h*.5,w*r,h*r*.7,.1,0,Math.PI*2);ctx.stroke();});
  // Planets with detail
  const planets=[
    {r:.1,a:.8,sz:4,col:'#c09870',name:'rocky'},
    {r:.17,a:2.1,sz:6,col:'#d8a870',name:'hot'},
    {r:.24,a:1.2,sz:6,col:'#4878e0',name:'earth'},
    {r:.32,a:3.5,sz:5,col:'#c84830',name:'red'},
    {r:.42,a:.5,sz:14,col:'#c09060',name:'giant',ring:true},
    {r:.53,a:2.8,sz:12,col:'#d0c880',name:'ringed',ring:true},
    {r:.63,a:1.8,sz:8,col:'#80c8e0',name:'ice'},
    {r:.73,a:4,sz:8,col:'#8898e0',name:'far'},
  ];
  planets.forEach(({r,a,sz,col,ring})=>{
    const px=w*.5+Math.cos(a)*w*r,py=h*.5+Math.sin(a)*h*r*.7;
    // Planet shadow
    ctx.fillStyle='rgba(0,0,0,.4)';circle(ctx,px+sz*.3,py+sz*.3,sz*.9);
    ctx.fillStyle=col;circle(ctx,px,py,sz);
    // Atmosphere glow
    ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.ellipse(px-sz*.2,py-sz*.3,sz*.5,sz*.3,-.5,0,Math.PI*2);ctx.fill();
    if(ring){ctx.strokeStyle=`rgba(200,180,140,.45)`;ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(px,py,sz*2.2,sz*.55,.2,0,Math.PI*2);ctx.stroke();}
    // Earth details
    if(col==='#4878e0'){ctx.fillStyle='rgba(60,160,60,.7)';ctx.beginPath();ctx.ellipse(px-sz*.2,py,sz*.35,sz*.25,.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(px+sz*.1,py-sz*.4,sz*.4,sz*.12,-.2,0,Math.PI*2);ctx.fill();}
  });
}

function drawBlackHole(ctx,w,h){
  ctx.fillStyle='#000000';ctx.fillRect(0,0,w,h);
  for(let i=0;i<120;i++){const sz=Math.random();ctx.fillStyle=`rgba(255,255,255,${.2+sz*.8})`;circle(ctx,Math.random()*w,Math.random()*h,.3+sz*1.5);}
  // Gravitationally lensed arcs (bright warped stars)
  ctx.strokeStyle='rgba(255,220,180,.35)';ctx.lineWidth=2;
  for(let a=0;a<Math.PI*2;a+=.08){const r=w*.14+Math.sin(a*5)*w*.012;ctx.beginPath();ctx.arc(w*.5,h*.5,r,a,a+.06);ctx.stroke();}
  // Accretion disk - layered hot gas
  const diskLayers=[
    {rx:w*.28,ry:h*.07,col:'rgba(255,220,100,.6)',lw:8},
    {rx:w*.22,ry:h*.055,col:'rgba(255,160,40,.5)',lw:6},
    {rx:w*.18,ry:h*.045,col:'rgba(255,80,10,.4)',lw:5},
    {rx:w*.15,ry:h*.038,col:'rgba(200,20,0,.3)',lw:4},
  ];
  diskLayers.forEach(({rx,ry,col,lw})=>{
    ctx.strokeStyle=col;ctx.lineWidth=lw;
    ctx.beginPath();ctx.ellipse(w*.5,h*.5,rx,ry,.08,0,Math.PI*2);ctx.stroke();
  });
  // Hot inner glow on one side (doppler effect)
  ctx.fillStyle='rgba(255,200,80,.15)';ctx.beginPath();ctx.ellipse(w*.38,h*.5,w*.12,h*.06,.1,0,Math.PI*2);ctx.fill();
  // Event horizon
  ctx.fillStyle='#000000';circle(ctx,w*.5,h*.5,w*.08);
  // Photon ring - crisp
  ctx.strokeStyle='rgba(255,210,120,.65)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(w*.5,h*.5,w*.085,0,Math.PI*2);ctx.stroke();
  // Inner shadow ring
  ctx.strokeStyle='rgba(255,160,60,.2)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(w*.5,h*.5,w*.09,0,Math.PI*2);ctx.stroke();
  // Relativistic jets
  [[h*.5-w*.085,h*.04],[h*.5+w*.085,h*.96]].forEach(([y1,y2])=>{
    ctx.strokeStyle='rgba(80,160,255,.4)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(w*.5,y1);ctx.lineTo(w*.5,y2);ctx.stroke();
    ctx.strokeStyle='rgba(180,220,255,.2)';ctx.lineWidth=20;ctx.beginPath();ctx.moveTo(w*.5,y1);ctx.lineTo(w*.5,y2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(w*.5,y1);ctx.lineTo(w*.5,y2);ctx.stroke();
  });
  // Lensed background galaxies
  ctx.save();ctx.globalAlpha=.2;
  ctx.fillStyle='rgba(200,180,255,1)';ctx.beginPath();ctx.ellipse(w*.2,h*.3,18,5,-.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(w*.78,h*.68,15,4,.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── ANIMALS ───────────────────────────────────────────────────────────
function drawKoi(ctx,w,h){
  // Rich deep pond
  gradRect(ctx,0,0,w,h,[[0,'#041e10'],[.3,'#062818'],[.6,'#083020'],[1,'#041808']]);
  // Underwater depth gradient
  const ug=ctx.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,w*.6);
  ug.addColorStop(0,'rgba(0,80,40,.2)');ug.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=ug;ctx.fillRect(0,0,w,h);
  // Underwater plants/reeds
  ctx.strokeStyle='#1a5010';ctx.lineWidth=3;
  for(let i=0;i<8;i++){const rx=w*(i*.13+.02),bot=h;ctx.beginPath();ctx.moveTo(rx,bot);for(let y=bot;y>bot*.4;y-=10)ctx.lineTo(rx+Math.sin(y*.04+i)*6,y);ctx.stroke();}
  ctx.strokeStyle='#2a6818';ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){const rx=w*(i*.2+.1),bot=h;ctx.beginPath();ctx.moveTo(rx,bot);for(let y=bot;y>bot*.6;y-=8)ctx.lineTo(rx+Math.sin(y*.05+i+2)*4,y);ctx.stroke();}
  // Lily pads - detailed
  const pads=[[.18,.25,w*.075,'#1a5818'],[.68,.55,w*.085,'#205e1e'],[.4,.78,w*.065,'#1a5818'],[.82,.22,w*.06,'#225a20'],[.08,.68,w*.055,'#185014']];
  pads.forEach(([px,py,pr,col])=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(w*px,h*py,pr,0,Math.PI*2);ctx.fill();
    // Radial pattern on pad
    ctx.strokeStyle='rgba(10,60,10,.4)';ctx.lineWidth=1;
    for(let v=0;v<8;v++){const va=v/8*Math.PI*2;ctx.beginPath();ctx.moveTo(w*px,h*py);ctx.lineTo(w*px+Math.cos(va)*pr,h*py+Math.sin(va)*pr);ctx.stroke();}
    // Notch
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(w*px,h*py);ctx.arc(w*px,h*py,pr*.15,-0.4,0.4);ctx.fill();
    // Flower
    ctx.fillStyle='rgba(255,160,180,.85)';circle(ctx,w*px,h*py,pr*.28);
    ctx.fillStyle='rgba(255,200,210,.9)';circle(ctx,w*px,h*py,pr*.16);
    ctx.fillStyle='rgba(255,240,80,.95)';circle(ctx,w*px,h*py,pr*.08);
  });
  // Water surface shimmer
  ctx.strokeStyle='rgba(100,200,150,.12)';ctx.lineWidth=1;
  for(let i=0;i<10;i++){ctx.beginPath();ctx.ellipse(Math.random()*w,Math.random()*h,15+Math.random()*25,3,0,0,Math.PI*2);ctx.stroke();}
  // Ripples
  [[.4,.4],[.6,.65],[.25,.6]].forEach(([rx,ry])=>{ctx.strokeStyle='rgba(150,220,180,.1)';ctx.lineWidth=1;for(let r=1;r<5;r++){ctx.beginPath();ctx.ellipse(w*rx,h*ry,r*9,r*5,0,0,Math.PI*2);ctx.stroke();}});
  // Koi fish - detailed with patterns
  function koi(fx,fy,angle,bodyCol,spotCol,sz){
    ctx.save();ctx.translate(fx,fy);ctx.rotate(angle);
    // Body shadow
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(sz*.1,sz*.1,sz*2,sz*.85,0,0,Math.PI*2);ctx.fill();
    // Body
    ctx.fillStyle=bodyCol;ctx.beginPath();ctx.ellipse(0,0,sz*2,sz*.85,0,0,Math.PI*2);ctx.fill();
    // Spots
    ctx.fillStyle=spotCol;circle(ctx,sz*.4,0,sz*.55);circle(ctx,-sz*.3,sz*.3,sz*.4);circle(ctx,-sz*.5,-sz*.25,sz*.35);
    // Scales texture
    ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=.8;
    for(let sr=0;sr<3;sr++){ctx.beginPath();ctx.ellipse(-sz*.4+sr*sz*.5,0,sz*.6-sr*.1,sz*.45,0,0,Math.PI*2);ctx.stroke();}
    // Fins
    ctx.fillStyle=bodyCol+'aa';ctx.beginPath();ctx.moveTo(-sz*.8,0);ctx.lineTo(-sz*1.2,-sz*.5);ctx.lineTo(-sz*.5,-sz*.2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-sz*.8,0);ctx.lineTo(-sz*1.2,sz*.5);ctx.lineTo(-sz*.5,sz*.2);ctx.fill();
    // Tail
    ctx.fillStyle=bodyCol;ctx.beginPath();ctx.moveTo(-sz*1.8,0);ctx.lineTo(-sz*2.5,-sz*.9);ctx.lineTo(-sz*2.5,sz*.9);ctx.fill();
    // Eye
    ctx.fillStyle='#1a0a00';circle(ctx,sz*1.5,-sz*.25,sz*.22);ctx.fillStyle='rgba(255,255,255,.6)';circle(ctx,sz*1.6,-sz*.3,sz*.1);
    ctx.restore();
  }
  koi(w*.32,h*.32,.4,'#e86010','#f8f0e0',14);
  koi(w*.62,h*.52,-.9,'#f8f8f8','#e03030',16);
  koi(w*.18,h*.62,1.3,'#f09010','#ffffff',12);
  koi(w*.72,h*.32,-1.5,'#d01808','#f0e060',13);
  koi(w*.5,h*.18,.7,'#f8f8f0','#f07030',11);
  koi(w*.45,h*.72,2.2,'#1060a0','#f8f8f8',10);
}

function drawArctic(ctx,w,h){
  gradRect(ctx,0,0,w,h*.52,[[0,'#040810'],[.3,'#08142a'],[.6,'#0e2040'],[1,'#2a4870']]);
  for(let i=0;i<60;i++){ctx.fillStyle=`rgba(255,255,220,${.2+Math.random()*.7})`;circle(ctx,Math.random()*w,Math.random()*h*.46,.4+Math.random()*1.1);}
  // Northern lights wash
  const aurG=ctx.createLinearGradient(0,h*.05,0,h*.48);
  aurG.addColorStop(0,'rgba(0,255,120,0)');aurG.addColorStop(.3,'rgba(0,255,100,.12)');aurG.addColorStop(.6,'rgba(0,180,255,.08)');aurG.addColorStop(1,'rgba(0,255,120,0)');
  ctx.fillStyle=aurG;ctx.fillRect(0,0,w,h*.48);
  // Ice landscape
  gradRect(ctx,0,h*.52,w,h*.48,[[0,'#d8eaf8'],[.3,'#c0d8ec'],[.6,'#a8c4dc'],[1,'#8ab0c8']]);
  // Snow drifts
  ctx.fillStyle='#e4f0fc';
  for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(w*(i*.18+.04),h*.52,w*.1,h*.05,0,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#cce0f4';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(w*(i*.25+.08),h*.72,w*.12,h*.055,0,0,Math.PI*2);ctx.fill();}
  // Cracked ice details
  ctx.strokeStyle='rgba(140,180,220,.3)';ctx.lineWidth=1;
  for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(Math.random()*w,h*(.55+Math.random()*.2));for(let s=0;s<3;s++){ctx.lineTo(Math.random()*w,h*(.55+Math.random()*.2));}ctx.stroke();}
  // Ice chunks / bergs
  ctx.fillStyle='#b8d0e8';
  [[.05,.55,.18,.1],[.28,.57,.22,.08],[.52,.56,.2,.09],[.75,.56,.18,.08],[.88,.54,.14,.1]].forEach(([ix,iy,iw2,ih2])=>{
    ctx.beginPath();ctx.moveTo(w*ix,h*iy);ctx.lineTo(w*(ix+iw2*.3),h*(iy-ih2*1.4));ctx.lineTo(w*(ix+iw2*.65),h*(iy-ih2*.7));ctx.lineTo(w*(ix+iw2),h*iy);ctx.fill();
    ctx.fillStyle='rgba(200,230,250,.3)';ctx.beginPath();ctx.moveTo(w*ix,h*iy);ctx.lineTo(w*(ix+iw2*.25),h*(iy-ih2*.8));ctx.lineTo(w*(ix+iw2*.15),h*iy);ctx.fill();
    ctx.fillStyle='#b8d0e8';
  });
  // Frozen pond/sea section
  ctx.fillStyle='rgba(120,170,210,.35)';ctx.beginPath();ctx.ellipse(w*.55,h*.75,w*.22,h*.07,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(160,200,235,.5)';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(w*.55,h*.75,w*.22,h*.07,0,0,Math.PI*2);ctx.stroke();
  // Arctic fox - detailed
  const fx=w*.42,fy=h*.66;
  // Body
  ctx.fillStyle='#f4f4f4';ctx.beginPath();ctx.ellipse(fx,fy,w*.075,h*.05,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#f8f8f8';circle(ctx,fx+w*.07,fy-h*.015,w*.03);
  // Ears
  ctx.fillStyle='#f0f0f0';tri(ctx,fx+w*.055,fy-h*.035,fx+w*.07,fy-h*.062,fx+w*.085,fy-h*.035);
  tri(ctx,fx+w*.07,fy-h*.03,fx+w*.085,fy-h*.055,fx+w*.1,fy-h*.03);
  ctx.fillStyle='rgba(220,180,180,.4)';tri(ctx,fx+w*.062,fy-h*.036,fx+w*.07,fy-h*.055,fx+w*.078,fy-h*.036);
  // Legs
  ctx.fillStyle='#eeeeee';ctx.beginPath();ctx.ellipse(fx-w*.03,fy+h*.04,w*.014,h*.028,.25,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(fx+w*.02,fy+h*.04,w*.014,h*.028,-.2,0,Math.PI*2);ctx.fill();
  // Fluffy tail
  ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.ellipse(fx-w*.09,fy,w*.045,h*.03,.35,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.ellipse(fx-w*.1,fy,w*.028,h*.018,.35,0,Math.PI*2);ctx.fill();
  // Face details
  ctx.fillStyle='#1a1010';circle(ctx,fx+w*.082,fy-h*.018,2.5);ctx.fillStyle='rgba(255,255,255,.6)';circle(ctx,fx+w*.085,fy-h*.02,1);
  ctx.fillStyle='rgba(200,140,140,.6)';ctx.beginPath();ctx.ellipse(fx+w*.09,fy-h*.01,3,2,0,0,Math.PI*2);ctx.fill();
  // Whiskers
  ctx.strokeStyle='rgba(200,200,200,.7)';ctx.lineWidth=.8;
  [[-6,-2],[-6,0],[-6,2]].forEach(([wx2,wy2])=>{ctx.beginPath();ctx.moveTo(fx+w*.09,fy-h*.01);ctx.lineTo(fx+w*.09+wx2,fy-h*.01+wy2);ctx.stroke();});
  // Snow falling
  ctx.fillStyle='rgba(255,255,255,.7)';
  for(let i=0;i<35;i++)circle(ctx,Math.random()*w,Math.random()*h*.5,1+Math.random()*2);
  // Pine trees silhouette
  ctx.fillStyle='#0a1810';
  for(let i=0;i<7;i++)pineTree(ctx,w*(.06+i*.13),h*.52,w*.018,h*.17);

  // Giraffe - detailed

  // Ossicones (horns)

  // Zebra silhouette

  ctx.fillStyle='#f0f0f0';ctx.fillRect(zx-12,zy+8,7,14);ctx.fillRect(zx+2,zy+8,7,14);

function drawReef(ctx,w,h){
  // Deep blue water
  gradRect(ctx,0,0,w,h,[[0,'#000810'],[.2,'#001020'],[.5,'#001830'],[.8,'#002040'],[1,'#002848']]);
  // Caustic light patterns from surface
  ctx.save();ctx.globalAlpha=.08;ctx.strokeStyle='#40c0ff';ctx.lineWidth=1;
  for(let i=0;i<12;i++){ctx.beginPath();ctx.ellipse(Math.random()*w,Math.random()*h*.3,8+Math.random()*20,4+Math.random()*10,.3,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
  // Light rays from surface
  ctx.save();ctx.globalAlpha=.07;ctx.fillStyle='#60d0ff';
  for(let i=0;i<10;i++){ctx.beginPath();ctx.moveTo(w*(i*.11),0);ctx.lineTo(w*(i*.11-.05),h);ctx.lineTo(w*(i*.11+.06),h);ctx.fill();}
  ctx.restore();
  // Sandy seafloor
  gradRect(ctx,0,h*.78,w,h*.22,[[0,'#1a1410'],[.5,'#121008'],[1,'#0c0a06']]);
  // Sand ripples
  ctx.strokeStyle='rgba(60,45,30,.3)';ctx.lineWidth=1;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(0,h*(.8+i*.03));ctx.lineTo(w,h*(.82+i*.03));ctx.stroke();}
  // Background reef wall
  ctx.fillStyle='#1a0e08';
  ctx.beginPath();ctx.moveTo(0,h*.78);for(let x=0;x<=w;x+=15)ctx.lineTo(x,h*(.78-Math.sin(x*.04)*.04));ctx.lineTo(w,h*.78);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  // Rich coral formations
  const coralCols2=['#e02850','#ff5018','#e8a000','#a030c0','#18c878','#ff40a0','#40c0ff'];
  function coralBranch(cx,cy,col,gen,angle,len){
    if(gen<0||len<3)return;
    ctx.strokeStyle=col;ctx.lineWidth=Math.max(1,gen);
    ctx.beginPath();ctx.moveTo(cx,cy);const ex=cx+Math.cos(angle)*len,ey=cy-Math.sin(Math.abs(angle))*len;ctx.lineTo(ex,ey);ctx.stroke();
    if(gen>0){coralBranch(ex,ey,col,gen-1,angle-.35,len*.7);coralBranch(ex,ey,col,gen-1,angle+.35,len*.7);}
  }
  for(let i=0;i<9;i++)coralBranch(w*(.06+i*.105),h*.78,coralCols2[i%7],3,Math.PI/2,h*.1);
  // Round brain corals
  [[.18,.82,18],[.45,.8,22],[.72,.81,16],[.86,.83,14]].forEach(([cx,cy,cr])=>{
    ctx.fillStyle=coralCols2[Math.floor(Math.random()*4)];ctx.beginPath();ctx.arc(w*cx,h*cy,cr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;
    for(let l=0;l<5;l++){ctx.beginPath();ctx.moveTo(w*cx-cr+l*cr*.4,h*cy-cr*.8);ctx.lineTo(w*cx-cr*.5+l*cr*.4,h*cy+cr*.8);ctx.stroke();}
  });
  // Sea anemones
  [[.32,.8],[.6,.79],[.08,.82]].forEach(([ax,ay])=>{
    ctx.fillStyle='rgba(255,100,160,.6)';
    for(let t=0;t<8;t++){const ta=t/8*Math.PI*2;ctx.beginPath();ctx.moveTo(w*ax,h*ay);ctx.quadraticCurveTo(w*ax+Math.cos(ta)*14,h*ay+Math.sin(ta)*14,w*ax+Math.cos(ta+.4)*18,h*ay+Math.sin(ta+.4)*8);ctx.lineTo(w*ax,h*ay);ctx.fill();}
    ctx.fillStyle='rgba(255,160,100,.8)';circle(ctx,w*ax,h*ay,5);
  });
  // Fish - colorful and detailed
  function fish(fx,fy,sz,c1,c2,c3){
    ctx.fillStyle=c1;ctx.beginPath();ctx.ellipse(fx,fy,sz*2.2,sz*.9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c2;for(let st=0;st<3;st++){ctx.beginPath();ctx.moveTo(fx-sz*.5+st*sz*.7,fy-sz*.7);ctx.lineTo(fx-sz*.5+st*sz*.7,fy+sz*.7);ctx.lineWidth=sz*.3;ctx.strokeStyle=c2;ctx.stroke();}
    ctx.fillStyle=c2;ctx.beginPath();ctx.moveTo(fx-sz*2,fy);ctx.lineTo(fx-sz*2.8,fy-sz);ctx.lineTo(fx-sz*2.8,fy+sz);ctx.fill();
    if(c3){ctx.fillStyle=c3;ctx.beginPath();ctx.ellipse(fx+sz*.5,fy,sz*.8,sz*.6,0,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#101010';circle(ctx,fx+sz*1.6,fy-sz*.25,sz*.28);ctx.fillStyle='rgba(255,255,255,.6)';circle(ctx,fx+sz*1.7,fy-sz*.3,sz*.12);
  }
  fish(w*.28,h*.28,9,'#ff5008','#ff2000',null);
  fish(w*.6,h*.42,8,'#1050ff','#40a0ff','#ffffff');
  fish(w*.12,h*.48,7,'#ffdd00','#ff6600',null);
  fish(w*.74,h*.28,9,'#ff3090','#ff7040','#ffffff');
  fish(w*.48,h*.58,6,'#30ff80','#008040',null);
  fish(w*.82,h*.5,7,'#a030ff','#e060ff','#ffffff');
  // Jellyfish
  ctx.fillStyle='rgba(180,220,255,.25)';ctx.beginPath();ctx.ellipse(w*.38,h*.18,18,12,0,0,Math.PI,true);ctx.fill();
  ctx.strokeStyle='rgba(180,220,255,.3)';ctx.lineWidth=1;
  for(let t=0;t<5;t++){ctx.beginPath();ctx.moveTo(w*.38+(t-2)*6,h*.18);ctx.lineTo(w*.38+(t-2)*5,h*.35);ctx.stroke();}
  // Bubbles
  ctx.strokeStyle='rgba(160,230,255,.3)';ctx.lineWidth=1;
  for(let i=0;i<20;i++){const bx2=Math.random()*w,by=Math.random()*h*.7;ctx.beginPath();ctx.arc(bx2,by,2+Math.random()*5,0,Math.PI*2);ctx.stroke();}
}

  ctx.fillStyle='#243e10';ctx.beginPath();ctx.moveTo(0,h*.58);ctx.bezierCurveTo(w*.18,h*.5,w*.38,h*.54,w*.55,h*.58);ctx.bezierCurveTo(w*.72,h*.62,w*.86,h*.56,w,h*.58);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  ctx.fillStyle='#1a3008';ctx.beginPath();ctx.moveTo(0,h*.7);ctx.bezierCurveTo(w*.22,h*.63,w*.48,h*.68,w*.7,h*.66);ctx.bezierCurveTo(w*.84,h*.64,w*.94,h*.7,w,h*.68);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  ctx.fillStyle='#12200a';ctx.beginPath();ctx.moveTo(0,h*.82);ctx.bezierCurveTo(w*.3,h*.76,w*.6,h*.8,w*.8,h*.78);ctx.bezierCurveTo(w*.9,h*.77,w*.96,h*.82,w,h*.8);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.fill();
  // Village silhouette
  ctx.fillStyle='#0a1806';

    ctx.fillRect(w*hx,h*hy,hw,hh);ctx.beginPath();ctx.moveTo(w*hx-2,h*hy);ctx.lineTo(w*hx+hw/2,h*hy-hh*.8);ctx.lineTo(w*hx+hw+2,h*hy);ctx.fill();
  });
  // Trees
  ctx.fillStyle='#0a1c06';for(let i=0;i<8;i++)bigTree(ctx,w*(.04+i*.13),h*.58,w*.022,h*.18);
  // Bird flocks - many, varied sizes
  function birdFlock2(cx,cy,count,spread,sz,alpha){
    ctx.strokeStyle=`rgba(15,8,3,${alpha})`;ctx.lineWidth=sz;
    for(let i=0;i<count;i++){
      const bx=cx+(-count/2+i)*spread+(Math.random()-.5)*spread*.6;

    }
  }
  // Multiple flocks at different distances/sizes
  birdFlock2(w*.4,h*.14,12,20,1.8,.85);
  birdFlock2(w*.65,h*.22,8,16,1.5,.8);
  birdFlock2(w*.22,h*.28,7,14,1.3,.75);
  birdFlock2(w*.78,h*.18,10,18,1.6,.85);
  birdFlock2(w*.5,h*.08,5,10,1.2,.7);
  birdFlock2(w*.3,h*.18,6,12,1.1,.7);
  birdFlock2(w*.82,h*.32,4,10,1.0,.65);
  birdFlock2(w*.15,h*.1,9,15,1.4,.75);
  // Sun reflection on water/path
  ctx.fillStyle='rgba(255,180,60,.12)';ctx.beginPath();ctx.ellipse(w*.5,h*.8,w*.06,h*.06,0,0,Math.PI*2);ctx.fill();
}

}

function mkPC(pi,size){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  const row=Math.floor(pi/N),col=pi%N;
  ctx.drawImage(mc,col*SZ,row*SZ,SZ,SZ,0,0,size,size);
  return c;
}

function renderBoard(){
  const bd=document.getElementById('board');
  bd.style.width=SZ*N+'px';bd.style.height=SZ*N+'px';
  bd.innerHTML='';
  for(let i=0;i<N*N;i++){
    const row=Math.floor(i/N),col=i%N;
    const slot=document.createElement('div');
    slot.className='slot'+(bState[i]!==null?' filled':'');
    slot.style.cssText=`left:${col*SZ}px;top:${row*SZ}px;width:${SZ}px;height:${SZ}px;`;
    if(bState[i]!==null){
      const c=mkPC(bState[i],SZ);
      if(bState[i]===i)c.classList.add('correct-glow');
      slot.appendChild(c);
    }
    if(bState[i]===null)slot.addEventListener('click',()=>slotClick(i));
    bd.appendChild(slot);
  }
}

function renderTray(){
  const tr=document.getElementById('tray');
  tr.innerHTML='';
  const rem=pieces.filter(p=>!bState.includes(p));
  // Size pieces so 3 cols x 6 rows fills the board height (SZ*N)
  const boardPx=SZ*N;
  const tsz=Math.floor((boardPx-7*5)/6); // 6 rows with gaps
  const trayW=tsz*3+5*2+16; // 3 cols + gaps + padding
  tr.style.maxHeight=boardPx+'px';
  tr.style.width=trayW+'px';
  rem.forEach(pi=>{
    const wrap=document.createElement('div');
    wrap.className='piece'+(sel===pi?' sel':'');
    wrap.style.cssText=`width:${tsz}px;height:${tsz}px;`;
    wrap.appendChild(mkPC(pi,tsz));
    wrap.addEventListener('click',()=>selPiece(pi));
    tr.appendChild(wrap);
  });
  if(!rem.length)tr.innerHTML='<span style="font-size:11px;color:rgba(240,237,232,.4);padding:8px;">'+t('all_placed')+'</span>';
}

function selPiece(pi){
  sel=sel===pi?null:pi;
  document.getElementById('ht').textContent=sel!==null?t('hint_select'):t('hint_desel');
  renderTray();
}

function slotClick(idx){
  if(sel===null){document.getElementById('ht').textContent=t('hint_need');return;}
  if(bState[idx]!==null)return;
  bState[idx]=sel;
  if(!going){going=true;tInt=setInterval(()=>{secs++;},1000);}
  moves++;
  sel=null;
  const correct=bState[idx]===idx;
  
  if(correct){
    document.getElementById('ht').textContent=t('hint_correct');
    renderBoard();renderTray();checkWin();
  } else {
    renderBoard();renderTray();
    const allSlots=document.getElementById('board').querySelectorAll('.slot');
    const slot=allSlots[idx];
    if(slot){
      slot.style.background='rgba(220,60,60,.3)';
      const pc=slot.querySelector('canvas');
      if(pc){pc.style.transition='transform 0.15s ease-in';pc.style.transform='scale(1.1)';setTimeout(()=>{pc.style.transform='scale(0)';pc.style.transition='transform 0.2s ease-in';},150);}
      setTimeout(()=>{bState[idx]=null;document.getElementById('ht').textContent=t('hint_wrong');renderBoard();renderTray();},400);
    }
  }
}

function checkWin(){
  if(bState.every((v,i)=>v===i)){clearInterval(tInt);const wm=Math.floor(secs/60),ws=secs%60;document.getElementById('wm').textContent=t('win',moves,wm+':'+(ws<10?'0':'')+ws);}
}

function togPrev(){showPrev=!showPrev;drawPrev();}
function setN(n){N=n;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('on',[3,4,5][i]===n));ng();}

// ── Audio Engine (Web Audio API) ────────────────────────────────────
let audioCtx = null, musicGain = null, sfxGain = null;
let musicPlaying = false, musicOscillators = [], musicInterval = null;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  if(!musicGain){ musicGain = audioCtx.createGain(); musicGain.gain.value = 0.18; musicGain.connect(audioCtx.destination); }
  if(!sfxGain){ sfxGain = audioCtx.createGain(); sfxGain.gain.value = 0.35; sfxGain.connect(audioCtx.destination); }
  return audioCtx;
}

function playTone(freq, type, duration, gainVal, startTime, destination){
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, startTime || ctx.currentTime);
  g.gain.setValueAtTime(gainVal || 0.2, startTime || ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, (startTime || ctx.currentTime) + duration);
  osc.connect(g);
  g.connect(destination || sfxGain);
  osc.start(startTime || ctx.currentTime);
  osc.stop((startTime || ctx.currentTime) + duration + 0.05);
}

// Sound effects
function sfxSelect(){ playTone(520, 'sine', 0.12, 0.5); }
function sfxDeselect(){ playTone(380, 'sine', 0.1, 0.3); }
function sfxCorrect(){
  const ctx = getAudioCtx(); const now = ctx.currentTime;
  playTone(523, 'sine', 0.12, 0.5, now);
  playTone(659, 'sine', 0.12, 0.5, now + 0.1);
  playTone(784, 'sine', 0.2, 0.5, now + 0.2);
}
function sfxWrong(){
  const ctx = getAudioCtx(); const now = ctx.currentTime;
  playTone(220, 'sawtooth', 0.08, 0.4, now);
  playTone(180, 'sawtooth', 0.1, 0.4, now + 0.08);
}
function sfxWin(){
  const ctx = getAudioCtx(); const now = ctx.currentTime;
  const melody = [523,659,784,1047,784,1047,1175,1319];
  melody.forEach((f,i) => playTone(f, 'sine', 0.25, 0.5, now + i*0.12));
}
function sfxNav(){ playTone(440, 'triangle', 0.06, 0.25); }

// Background music - gentle ambient arpeggio
const MUSIC_NOTES = [261,329,392,523,392,329,261,220,262,330,392,494,392,330];
let musicNoteIdx = 0;
function startMusic(){
  if(musicPlaying) return;
  musicPlaying = true;
  getAudioCtx();
  musicInterval = setInterval(()=>{
    if(!musicPlaying) return;
    const note = MUSIC_NOTES[musicNoteIdx % MUSIC_NOTES.length];
    musicNoteIdx++;
    playTone(note, 'triangle', 0.45, 0.6, null, musicGain);
    // Occasional harmony
    if(musicNoteIdx % 4 === 0) playTone(note * 1.5, 'sine', 0.4, 0.3, null, musicGain);
  }, 480);
  document.getElementById('music-btn').textContent = '🔇';
}
function stopMusic(){
  musicPlaying = false;
  if(musicInterval){ clearInterval(musicInterval); musicInterval = null; }
  document.getElementById('music-btn').textContent = '🎵';
}
function toggleMusic(){
  getAudioCtx();
  musicPlaying ? stopMusic() : startMusic();
}

// Patch game functions to emit sounds
const _origSelPiece = selPiece;
selPiece = function(pi){
  if(sel === pi){ sfxDeselect(); } else { sfxSelect(); }
  _origSelPiece(pi);
};

const _origSlotClick = slotClick;
slotClick = function(idx){
  // We detect correct/wrong after the fact by watching bState
  const prevSel = sel;
  _origSlotClick(idx);
  // slotClick sets sel=null after placement; check if a piece was placed
  if(prevSel !== null && prevSel !== undefined){
    if(bState[idx] === idx){ sfxCorrect(); }
    else {
      // piece was placed wrong (will bounce back)
      sfxWrong();
    }
  }
};

const _origCheckWin = checkWin;
checkWin = function(){
  const wasDone = bState.every((v,i)=>v===i);
  _origCheckWin();
  if(wasDone) setTimeout(sfxWin, 50);
};

// ── Touch Controls ───────────────────────────────────────────────────
let isTouchDevice = false;
let trayFocusIdx = 0; // index into remaining pieces in tray

function detectTouch(){
  isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const tc = document.getElementById('touch-controls');
  const kbHint = document.getElementById('kb-hint');
  if(isTouchDevice){ tc.classList.add('visible'); }
  else { kbHint.style.display = 'block'; }
}

function getTrayPieces(){
  return pieces.filter(p => !bState.includes(p));
}

function trayNavLeft(){
  sfxNav();
  const rem = getTrayPieces();
  if(!rem.length) return;
  trayFocusIdx = (trayFocusIdx - 1 + rem.length) % rem.length;
  highlightTrayFocus();
}
function trayNavRight(){
  sfxNav();
  const rem = getTrayPieces();
  if(!rem.length) return;
  trayFocusIdx = (trayFocusIdx + 1) % rem.length;
  highlightTrayFocus();
}
function highlightTrayFocus(){
  const rem = getTrayPieces();
  if(!rem.length) return;
  trayFocusIdx = Math.min(trayFocusIdx, rem.length - 1);
  const pieces_el = document.getElementById('tray').querySelectorAll('.piece');
  pieces_el.forEach((el, i) => {
    el.style.outline = i === trayFocusIdx ? '2px solid var(--accent2)' : '';
  });
  // Scroll focused piece into view
  if(pieces_el[trayFocusIdx]) pieces_el[trayFocusIdx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function touchSelectOrPlace(){
  sfxSelect();
  const rem = getTrayPieces();
  if(!rem.length) return;
  trayFocusIdx = Math.min(trayFocusIdx, rem.length - 1);
  if(sel === null){
    // Select highlighted tray piece
    selPiece(rem[trayFocusIdx]);
  } else {
    // Find first empty slot and place
    const emptySlot = bState.findIndex(v => v === null);
    if(emptySlot >= 0) slotClick(emptySlot);
  }
}

// Wire touch buttons
document.addEventListener('DOMContentLoaded', ()=>{
  detectTouch();
  document.getElementById('tc-left').addEventListener('click', trayNavLeft);
  document.getElementById('tc-right').addEventListener('click', trayNavRight);
  document.getElementById('tc-select').addEventListener('click', touchSelectOrPlace);
  document.getElementById('tc-new').addEventListener('click', ()=>{ sfxDeselect(); ng(); });
  document.getElementById('tc-prev').addEventListener('click', ()=>{ togPrev(); sfxNav(); });
  document.getElementById('tc-music').addEventListener('click', toggleMusic);
});

// ── Keyboard Controls ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Don't fire on input elements
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key){
    case 'ArrowLeft':  e.preventDefault(); trayNavLeft(); break;
    case 'ArrowRight': e.preventDefault(); trayNavRight(); break;
    case 'Enter':
    case ' ':          e.preventDefault(); touchSelectOrPlace(); break;
    case 'n': case 'N': ng(); sfxDeselect(); break;
    case 'p': case 'P': togPrev(); sfxNav(); break;
    case 'm': case 'M': toggleMusic(); break;
  }
});

// Also re-highlight focus after renderTray
const _origRenderTray = renderTray;
renderTray = function(){
  _origRenderTray();
  const rem = getTrayPieces();
  if(rem.length){ trayFocusIdx = Math.min(trayFocusIdx, rem.length-1); if(!isTouchDevice) highlightTrayFocus(); }
};

detectTouch();
