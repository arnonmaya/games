<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHOOT FIGHT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{overscroll-behavior:none;}
  #canvas, #touch-canvas { touch-action:none; }
  body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;font-family:'Orbitron',monospace;overflow:hidden;color:#fff;}

  /* ── TITLE ── */
  #title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:12px;
    background:linear-gradient(90deg,#ff4444,#ffaa00,#ff4444);background-size:200%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    animation:shimmer 2s linear infinite;margin-bottom:6px;}
  @keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

  /* ── HUD ── */
  #hud{display:flex;gap:8px;margin-bottom:6px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .phud{text-align:center;min-width:90px;}
  .phud .pname{font-size:9px;letter-spacing:2px;margin-bottom:3px;}
  .hbar-bg{width:80px;height:9px;background:#1a1a2e;border-radius:5px;border:1px solid #333;overflow:hidden;margin:0 auto;}
  .hbar-fill{height:100%;width:100%;border-radius:5px;transition:width .1s;}
  .klabel{font-size:8px;letter-spacing:2px;color:#555;margin-top:2px;}
  .kcount{font-size:17px;font-weight:900;letter-spacing:2px;margin-top:1px;}
  #timer-box{text-align:center;min-width:80px;}
  #timer-label{font-size:8px;letter-spacing:3px;color:#555;margin-bottom:1px;}
  #timer-display{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:#fff;line-height:1;}
  #timer-display.urgent{color:#ff4444;animation:tpulse .5s ease-in-out infinite alternate;}
  @keyframes tpulse{from{text-shadow:0 0 8px #ff4444}to{text-shadow:0 0 24px #ff4444}}

  /* ── GAME CANVAS ── */
  #canvas{border:2px solid #222;box-shadow:0 0 40px rgba(255,100,0,.12),0 0 80px rgba(0,100,255,.08);display:block;}
  #controls{margin-top:5px;display:flex;gap:20px;font-size:8px;letter-spacing:1px;color:#444;flex-wrap:wrap;justify-content:center;}
  .ctrl{text-align:center;}.ctrl span{display:block;margin:1px 0;}

  /* ── BACK ARROW (only during gameplay) ── */
  #back-arrow{
    position:fixed;top:10px;left:12px;z-index:9999;
    width:38px;height:38px;border-radius:50%;
    background:rgba(30,30,30,.9);border:1px solid #444;
    display:none;align-items:center;justify-content:center;
    cursor:pointer;font-size:20px;color:#aaa;
    transition:all .18s;
  }
  #back-arrow:hover,#back-arrow:active{background:rgba(255,60,0,.3);border-color:#ff4444;color:#ff4444;}

  /* ── OVERLAY ── */
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:100;overflow-y:auto;padding:14px 8px;text-align:center;}

  /* Player count */
  #setup-section{display:flex;flex-direction:column;align-items:center;width:100%;}
  #pcount-row{display:flex;gap:12px;margin:12px 0 16px;justify-content:center;}
  .pcount-btn{width:62px;height:62px;border-radius:12px;border:2px solid #2a2a2a;background:#111;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:all .15s;user-select:none;}
  .pcount-btn .num{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;color:#555;}
  .pcount-btn .lbl{font-size:8px;letter-spacing:2px;color:#444;margin-top:1px;}
  .pcount-btn.active{border-color:#ff4444;background:#1a0000;box-shadow:0 0 14px rgba(255,60,0,.25);}
  .pcount-btn.active .num{color:#ff4444;}.pcount-btn.active .lbl{color:#aa4444;}

  /* Char select */
  #char-rows{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;}
  .crow{display:flex;gap:8px;align-items:center;justify-content:center;}
  .crow .clabel{font-size:9px;letter-spacing:3px;min-width:28px;text-align:right;font-weight:bold;}
  .ccard{cursor:pointer;border-radius:7px;padding:4px;border:2px solid #1e1e1e;
    background:transparent;transition:all .12s;text-align:center;user-select:none;}
  .ccard canvas{display:block;border-radius:4px;}
  .ccard .cname{font-size:7px;letter-spacing:1px;margin-top:2px;font-family:'Orbitron',monospace;color:#444;}
  .ccard.sel{background:rgba(255,255,255,.05);}

  /* Buttons in overlay */
  #start-btn{margin-top:14px;padding:11px 40px;background:transparent;border:2px solid #ff4444;
    color:#ff4444;font-family:'Orbitron',monospace;font-size:12px;letter-spacing:5px;
    cursor:pointer;transition:all .2s;display:block;margin-left:auto;margin-right:auto;}
  #start-btn:hover{background:#ff4444;color:#000;box-shadow:0 0 20px #ff4444;}

  #winner-text{font-size:16px;letter-spacing:3px;margin-top:10px;text-align:center;line-height:1.8;width:100%;}
  #replay-ring-wrap{position:relative;width:60px;height:60px;margin:8px auto 0;display:none;}
  #replay-secs{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:24px;color:#ff4444;}
  #replay-countdown{margin-top:5px;font-size:9px;letter-spacing:3px;color:#555;text-align:center;width:100%;}

  /* ── LANGUAGE TOGGLE ── */
  #lang-btn{
    position:fixed;top:10px;right:14px;z-index:9999;
    padding:5px 12px;border-radius:20px;
    background:rgba(30,30,30,.9);border:1px solid #444;
    color:#aaa;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;
    cursor:pointer;transition:all .18s;
  }
  #lang-btn:hover{border-color:#ff4444;color:#ff4444;}

  /* RTL support for Hebrew */
  body.rtl { direction: rtl; }
  body.rtl #overlay { direction: rtl; }
  body.rtl .crow { flex-direction: row-reverse; }
  body.rtl .crow .clabel { text-align: left; }
  #touch-layer canvas{position:absolute;inset:0;width:100%;height:100%;border:none;box-shadow:none;pointer-events:all;touch-action:none;}

  /* Hide touch layer on non-touch, hide keyboard controls on touch */
  @media (pointer:fine){
    #touch-layer{display:none;}
  }
  @media (pointer:coarse){
    #controls{display:none;}
    body{justify-content:flex-start;padding-top:3px;}
    #title{font-size:26px;margin-bottom:2px;}
    #back-arrow{top:8px;left:8px;width:36px;height:36px;font-size:17px;}
  }
</style>
</head>
<body>

<div id="title">SHOOT FIGHT</div>
<div id="hud"></div>
<canvas id="canvas" width="800" height="560"></canvas>
<!-- Back arrow: shown only during gameplay, injected inside HUD row -->
<div id="touch-layer"><canvas id="touch-canvas"></canvas></div>
<div id="controls"></div>

<!-- ═══════ OVERLAY (opening / end screen) ═══════ -->
<div id="overlay">
  <!-- Language toggle -->
  <button id="lang-btn" onclick="toggleLang()" style="position:absolute;top:14px;right:16px;padding:5px 14px;background:transparent;border:1px solid #444;color:#888;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;border-radius:4px;transition:all .2s;" onmouseover="this.style.borderColor='#aaa';this.style.color='#fff'" onmouseout="this.style.borderColor='#444';this.style.color='#888'">עברית</button>

  <h1 id="main-title" style="font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:12px;
    background:linear-gradient(90deg,#4af,#fa0,#f44,#4d4);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px;
    text-align:center;width:100%;">SHOOT FIGHT</h1>
  <p id="main-subtitle" style="font-size:9px;letter-spacing:4px;color:#444;text-align:center;width:100%;">ARENA SHOOTER · 60 SEC · MOST KILLS WINS</p>

  <!-- Player count picker — hidden when showing end-of-game result -->
  <div id="setup-section">
    <div id="num-players-label" style="font-size:8px;letter-spacing:4px;color:#555;margin-top:14px;margin-bottom:0;text-align:center;width:100%;">NUMBER OF PLAYERS</div>
    <div id="pcount-row">
      <div class="pcount-btn active" data-n="2"><span class="num">2</span><span class="lbl">PLAYERS</span></div>
      <div class="pcount-btn"        data-n="3"><span class="num">3</span><span class="lbl">PLAYERS</span></div>
      <div class="pcount-btn"        data-n="4"><span class="num">4</span><span class="lbl">PLAYERS</span></div>
    </div>
    <div id="char-rows"></div>
  </div>

  <button id="start-btn" onclick="startGame()">START GAME</button>
  <button id="home-page-btn" onclick="try{window.top.location.replace('https://arnonmaya.github.io/games/')}catch(e){window.location.replace('https://arnonmaya.github.io/games/')}" style="margin-top:10px;padding:9px 32px;background:transparent;border:1px solid #444;color:#666;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;cursor:pointer;transition:all .2s;display:block;margin-left:auto;margin-right:auto;" onmouseover="this.style.borderColor='#888';this.style.color='#aaa'" onmouseout="this.style.borderColor='#444';this.style.color='#666'">← BACK TO HOME PAGE</button>

  <div id="winner-text"></div>
  <div id="replay-ring-wrap">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="24" fill="none" stroke="#222" stroke-width="5"/>
      <circle id="replay-ring-fill" cx="30" cy="30" r="24" fill="none" stroke="#ff4444" stroke-width="5"
        stroke-linecap="round"
        style="transform-origin:center;transform:rotate(-90deg);stroke-dasharray:151;stroke-dashoffset:0;transition:stroke-dashoffset 5s linear;"/>
    </svg>
    <div id="replay-secs">5</div>
  </div>
  <div id="replay-countdown"></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  LANGUAGE SYSTEM
// ═══════════════════════════════════════════════════════
let lang = 'en'; // default English

const TRANSLATIONS = {
  en: {
    title: 'SHOOT FIGHT',
    subtitle: 'ARENA SHOOTER · 60 SEC · MOST KILLS WINS',
    numPlayers: 'NUMBER OF PLAYERS',
    players: 'PLAYERS',
    startGame: 'START GAME',
    playAgain: 'PLAY AGAIN',
    backHome: '← BACK TO HOME PAGE',
    time: 'TIME',
    kills: 'KILLS',
    escape: '⚠  ESCAPE!  ⚠',
    noShooting: 'NO SHOOTING UNTIL BATTLE STARTS',
    fight: 'FIGHT!',
    wins: 'WINS!',
    draw: 'DRAW!',
    returningMenu: 'returning to menu in...',
    langBtn: 'עברית',
    dir: 'ltr',
  },
  he: {
    title: 'קרב יריות',
    subtitle: 'משחק זירה · 60 שניות · הכי הרבה הרגות מנצח',
    numPlayers: 'מספר שחקנים',
    players: 'שחקנים',
    startGame: 'התחל משחק',
    playAgain: 'שחק שוב',
    backHome: 'חזור לדף הבית ←',
    time: 'זמן',
    kills: 'הרגות',
    escape: '⚠  ברח!  ⚠',
    noShooting: 'אסור לירות עד שהמשחק מתחיל',
    fight: 'לחימה!',
    wins: 'מנצח!',
    draw: 'תיקו!',
    returningMenu: '...חוזר לתפריט בעוד',
    langBtn: 'English',
    dir: 'rtl',
  },
};

function T(key){ return TRANSLATIONS[lang][key] || TRANSLATIONS['en'][key]; }

function applyLanguage(){
  const t = TRANSLATIONS[lang];
  // Direction
  document.getElementById('overlay').dir = t.dir;
  document.body.dir = t.dir;

  // Title & subtitle
  document.getElementById('main-title').textContent = t.title;
  document.getElementById('main-subtitle').textContent = t.subtitle;
  document.getElementById('num-players-label').textContent = t.numPlayers;

  // Player count buttons
  document.querySelectorAll('.pcount-btn .lbl').forEach(el => el.textContent = t.players);

  // Buttons
  const sb = document.getElementById('start-btn');
  if(sb) sb.textContent = overlayMode === 'result' ? t.playAgain : t.startGame;
  const hb = document.getElementById('home-page-btn');
  if(hb) hb.textContent = t.backHome;

  // Lang toggle
  const lb = document.getElementById('lang-btn');
  if(lb) lb.textContent = t.langBtn;

  // Replay countdown text (if visible)
  const rc = document.getElementById('replay-countdown');
  if(rc && rc.textContent) rc.textContent = t.returningMenu;

  // HUD labels
  document.querySelectorAll('.klabel').forEach(el => el.textContent = t.kills);
  const timerLabel = document.getElementById('timer-label');
  if(timerLabel) timerLabel.textContent = t.time;

  buildCharSelect();
}

function toggleLang(){
  lang = lang === 'en' ? 'he' : 'en';
  applyLanguage();
}
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// Generic tone helper
function playTone(freq, type, dur, vol=0.18, attack=0.004, decay=0.08){
  try{
    const a = getAudio();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.connect(gain); gain.connect(a.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, a.currentTime);
    gain.gain.setValueAtTime(0, a.currentTime);
    gain.gain.linearRampToValueAtTime(vol, a.currentTime+attack);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime+attack+decay+dur);
    osc.start(a.currentTime); osc.stop(a.currentTime+attack+decay+dur+0.05);
  } catch(e){}
}

function playNoise(dur, vol=0.12, freq=800){
  try{
    const a = getAudio();
    const buf = a.createBuffer(1, a.sampleRate*dur, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const src = a.createBufferSource();
    const bpf = a.createBiquadFilter();
    const gain = a.createGain();
    bpf.type='bandpass'; bpf.frequency.value=freq; bpf.Q.value=1.5;
    src.buffer=buf; src.connect(bpf); bpf.connect(gain); gain.connect(a.destination);
    gain.gain.setValueAtTime(vol, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    src.start(a.currentTime); src.stop(a.currentTime+dur+0.05);
  } catch(e){}
}

const SFX = {
  shoot(){ playTone(880,'square',0.04,0.14); playTone(660,'sawtooth',0.05,0.08); },
  hit(){ playNoise(0.1,0.22,400); playTone(200,'sawtooth',0.06,0.15); },
  death(){ playNoise(0.25,0.3,150); playTone(120,'sawtooth',0.2,0.2); playTone(80,'sine',0.3,0.15); },
  mine(){ playTone(60,'sine',0.3,0.3); playNoise(0.4,0.35,200); playTone(120,'sawtooth',0.25,0.2); },
  respawn(){ playTone(440,'sine',0.05,0.1); playTone(660,'sine',0.05,0.1); playTone(880,'sine',0.1,0.12); },
  countdown(){ playTone(440,'square',0.06,0.12); },
  fight(){ playTone(880,'square',0.05,0.2); playTone(1100,'square',0.05,0.2); playTone(1320,'square',0.1,0.25); },
  win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.18,0.2),i*120)); },
  draw(){ [440,415,392,349].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.15,0.15),i*110)); },
  click(){ playTone(660,'sine',0.03,0.08); },
  bgTick:null,
};

// Background music: looping ambient beat
let bgMusicLoop = null;
let bgPlaying = false;

function startBgMusic(){
  if(bgPlaying) return;
  bgPlaying = true;
  const bpm = 128;
  const step = 60/bpm/2; // 16th note duration
  let beat = 0;
  // Pattern: kick-snare 4/4 with synth pad
  function tick(){
    if(!bgPlaying) return;
    const a = getAudio();
    const t = a.currentTime;
    // Kick on 0, 8
    if(beat%16===0||beat%16===8){
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(40,t+0.12);
      o.type='sine';g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      o.start(t);o.stop(t+0.2);
    }
    // Snare on 4, 12
    if(beat%16===4||beat%16===12){
      const buf=a.createBuffer(1,a.sampleRate*0.1,a.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const s=a.createBufferSource(),bf=a.createBiquadFilter(),g=a.createGain();
      bf.type='highpass';bf.frequency.value=1200;
      s.buffer=buf;s.connect(bf);bf.connect(g);g.connect(a.destination);
      g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      s.start(t);s.stop(t+0.12);
    }
    // Hi-hat on every 2nd 16th
    if(beat%2===1){
      const buf=a.createBuffer(1,a.sampleRate*0.04,a.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const s=a.createBufferSource(),bf=a.createBiquadFilter(),g=a.createGain();
      bf.type='highpass';bf.frequency.value=8000;
      s.buffer=buf;s.connect(bf);bf.connect(g);g.connect(a.destination);
      g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
      s.start(t);s.stop(t+0.05);
    }
    // Bass synth note on beat 0, 8
    if(beat%16===0||beat%16===8){
      const notes=[55,55,65,55,49,55,58,55];
      const f=notes[Math.floor(beat/16)%notes.length];
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t);o.stop(t+0.35);
    }
    beat=(beat+1)%64;
    bgMusicLoop=setTimeout(tick, step*1000);
  }
  tick();
}

function stopBgMusic(){
  bgPlaying=false;
  if(bgMusicLoop){clearTimeout(bgMusicLoop);bgMusicLoop=null;}
}

// Unlock audio on first interaction
function unlockAudio(){
  try{ getAudio().resume(); }catch(e){}
  document.removeEventListener('click', unlockAudio);
  document.removeEventListener('touchstart', unlockAudio);
}
document.addEventListener('click', unlockAudio, {once:true});
document.addEventListener('touchstart', unlockAudio, {once:true});

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const W=800,H=560,TILE=40,COLS=W/TILE,ROWS=H/TILE;

// ═══════════════════════════════════════════════════════
//  CHARACTER DESIGNS
// ═══════════════════════════════════════════════════════
const CHARACTERS=[
  {id:0,name:'BLAZE',color:'#44aaff',color2:'#0055cc',
    draw(c,cx,cy,r,a){c.save();c.translate(cx,cy);c.rotate(a);c.shadowColor='#44aaff';c.shadowBlur=12;
      const g=c.createRadialGradient(-r*.3,-r*.3,0,0,0,r);g.addColorStop(0,'#99ddff');g.addColorStop(1,'#0055cc');
      c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fillStyle=g;c.fill();c.strokeStyle='#44aaff';c.lineWidth=2;c.stroke();c.shadowBlur=0;
      c.fillStyle='rgba(180,230,255,.9)';c.beginPath();c.ellipse(r*.25,-r*.15,r*.38,r*.22,0,0,Math.PI*2);c.fill();
      c.fillStyle='#44aaff';c.beginPath();c.roundRect(r-3,-2.5,12,5,2);c.fill();c.restore();}},
  {id:1,name:'INFERNO',color:'#ff5522',color2:'#880000',
    draw(c,cx,cy,r,a){c.save();c.translate(cx,cy);c.rotate(a);c.shadowColor='#ff5522';c.shadowBlur=14;
      c.beginPath();for(let i=0;i<8;i++){const ag=(i/8)*Math.PI*2-Math.PI/2,rr=i%2===0?r:r*.62;i===0?c.moveTo(Math.cos(ag)*rr,Math.sin(ag)*rr):c.lineTo(Math.cos(ag)*rr,Math.sin(ag)*rr);}c.closePath();
      const g=c.createRadialGradient(0,0,0,0,0,r);g.addColorStop(0,'#ffaa44');g.addColorStop(1,'#880000');
      c.fillStyle=g;c.fill();c.strokeStyle='#ff5522';c.lineWidth=2;c.stroke();c.shadowBlur=0;
      c.fillStyle='#fff8e0';c.beginPath();c.ellipse(r*.28,0,r*.28,r*.11,0,0,Math.PI*2);c.fill();
      c.fillStyle='#cc3300';c.beginPath();c.roundRect(r-3,-2.5,14,5,1);c.fill();c.restore();}},
  {id:2,name:'SPECTER',color:'#aa44ff',color2:'#330066',
    draw(c,cx,cy,r,a){c.save();c.translate(cx,cy);c.rotate(a);c.shadowColor='#aa44ff';c.shadowBlur=18;
      c.beginPath();for(let i=0;i<6;i++){const ag=(i/6)*Math.PI*2-Math.PI/2;i===0?c.moveTo(Math.cos(ag)*r,Math.sin(ag)*r):c.lineTo(Math.cos(ag)*r,Math.sin(ag)*r);}c.closePath();
      const g=c.createRadialGradient(0,-r*.2,0,0,0,r);g.addColorStop(0,'#dd99ff');g.addColorStop(1,'#330066');
      c.fillStyle=g;c.fill();c.strokeStyle='#aa44ff';c.lineWidth=2;c.stroke();c.shadowBlur=0;
      c.fillStyle='rgba(255,255,255,.95)';c.beginPath();c.arc(-r*.2,-r*.1,r*.17,0,Math.PI*2);c.fill();c.beginPath();c.arc(r*.2,-r*.1,r*.17,0,Math.PI*2);c.fill();
      c.fillStyle='#220033';c.beginPath();c.arc(-r*.2,-r*.1,r*.08,0,Math.PI*2);c.fill();c.beginPath();c.arc(r*.2,-r*.1,r*.08,0,Math.PI*2);c.fill();
      c.fillStyle='#7700cc';c.beginPath();c.roundRect(r-3,-2.5,13,5,2);c.fill();c.restore();}},
  {id:3,name:'TITAN',color:'#44dd88',color2:'#005522',
    draw(c,cx,cy,r,a){c.save();c.translate(cx,cy);c.rotate(a);c.shadowColor='#44dd88';c.shadowBlur=10;
      const s=r*.8;c.beginPath();c.roundRect(-s,-s,s*2,s*2,4);
      const g=c.createRadialGradient(-s*.3,-s*.3,0,0,0,r);g.addColorStop(0,'#aaffcc');g.addColorStop(1,'#005522');
      c.fillStyle=g;c.fill();c.strokeStyle='#44dd88';c.lineWidth=2;c.stroke();c.shadowBlur=0;
      c.strokeStyle='rgba(100,255,180,.28)';c.lineWidth=1;c.beginPath();c.moveTo(-s*.3,-s);c.lineTo(-s*.3,s);c.stroke();c.beginPath();c.moveTo(s*.3,-s);c.lineTo(s*.3,s);c.stroke();
      c.fillStyle='rgba(180,255,220,.85)';c.beginPath();c.roundRect(-s*.52,-s*.22,s*1.04,s*.38,2);c.fill();
      c.fillStyle='#228844';c.beginPath();c.roundRect(s-1,-3,14,6,1);c.fill();c.restore();}},
];

// ═══════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════
const MAP_TEMPLATE=[
  'WWWWWWWWWWWWWWWWWWWW',
  'W..........W.......W',
  'W.WW....WW...WW....W',
  'W..........M.......W',
  'W....WWW...........W',
  'W..M...............W',
  'W..................W',
  'W..................W',
  'W..........M...WWW.W',
  'W....WW............W',
  'W..M.......WWW...M.W',
  'W..........W.......W',
  'W.WW..M....W.WW....W',
  'WWWWWWWWWWWWWWWWWWWW',
];
let walls=[],mines=[];
function buildMap(){
  walls=[];mines=[];
  for(let r=0;r<MAP_TEMPLATE.length;r++)
    for(let c=0;c<MAP_TEMPLATE[r].length;c++){
      const ch=MAP_TEMPLATE[r][c];
      if(ch==='W')walls.push({x:c*TILE,y:r*TILE,w:TILE,h:TILE});
      if(ch==='M')mines.push({x:c*TILE+TILE/2,y:r*TILE+TILE/2,r:10,alive:true,pulse:0});
    }
}

  {x:TILE+9,y:TILE+9},{x:W-TILE*2+9,y:TILE+9},

function buildCharSelect(){

    row.appendChild(lbl);
    CHARACTERS.forEach(ch=>{
      const card=document.createElement('div');
      card.className='ccard'+(selectedChar[pi]===ch.id?' sel':'');

      const c=cv.getContext('2d');c.fillStyle='#0e0e18';c.fillRect(0,0,50,50);ch.draw(c,25,25,15,0);
      card.appendChild(cv);
      const nm=document.createElement('div');nm.className='cname';nm.textContent=ch.name;
      nm.style.color=selectedChar[pi]===ch.id?ctrl.hudColor:'#444';
      card.appendChild(nm);
      card.addEventListener('click',()=>{SFX.click();selectedChar[pi]=ch.id;buildCharSelect();});

// ═══════════════════════════════════════════════════════
function buildHUD(){
  const hud=document.getElementById('hud');hud.innerHTML='';
  const mid=Math.floor(numPlayers/2);
  for(let pi=0;pi<numPlayers;pi++){
    if(pi===mid){
      const tb=document.createElement('div');tb.id='timer-box';
      tb.innerHTML=`<div id="timer-label">${T('time')}</div><div id="timer-display">1:00</div>`;
      hud.appendChild(tb);
    }
    const p=players[pi],ctrl=CTRL_DEFS[pi],ch=CHARACTERS[p.charId];
    const d=document.createElement('div');d.className='phud';
    d.innerHTML=`<div class="pname" style="color:${ctrl.hudColor}">${ch.name}</div>
      <div class="hbar-bg"><div id="hbar${pi}" class="hbar-fill" style="background:${ctrl.hudColor}"></div></div>
      <div class="klabel">${T('kills')}</div><div class="kcount" id="kc${pi}" style="color:${ctrl.hudColor}">0</div>`;
    hud.appendChild(d);
  }
  if(!document.getElementById('timer-display')){
    const tb=document.createElement('div');tb.id='timer-box';
    tb.innerHTML=`<div id="timer-label">${T('time')}</div><div id="timer-display">1:00</div>`;
    hud.appendChild(tb);
  }
}

function updateHUD(){
  for(let pi=0;pi<numPlayers;pi++){
    const f=document.getElementById('hbar'+pi);
    const k=document.getElementById('kc'+pi);
    if(f)f.style.width=players[pi]&&players[pi].alive?'100%':'0%';
    if(k)k.textContent=players[pi]?players[pi].kills:0;
  }
  const td=document.getElementById('timer-display');
  if(!td)return;
  const s=Math.max(0,matchTimeLeft);
  td.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  td.className=s<=10?'urgent':'';
}

function initPlayers(){
  players=[];
  for(let pi=0;pi<numPlayers;pi++){
    const ch=CHARACTERS[selectedChar[pi]],sp=CENTER_SPAWNS[pi];
    players.push({x:sp.x,y:sp.y,w:22,h:22,speed:2.8,angle:sp.angle,
      hp:100,maxHp:100,color:ch.color,color2:ch.color2,charId:ch.id,
      shootCooldown:0,shootRate:18,id:pi,kills:0,alive:true,trail:[]});

// ═══════════════════════════════════════════════════════
//  START GAME
// ═══════════════════════════════════════════════════════
function startGame(){
  SFX.click();
  if(replayCountdownTimer){clearInterval(replayCountdownTimer);replayCountdownTimer=null;}
  buildMap();initPlayers();buildHUD();buildControlsUI();
  bullets=[];particles=[];keys={};
  gameRunning=true;countdown=5;matchTimeLeft=60;window._fightFlash=0;lastCountdownBeep=5;
  document.getElementById('overlay').style.display='none';
  showBackArrow();
  updateHUD();
  startBgMusic();
  if(countdownTimer)clearInterval(countdownTimer);
  countdownTimer=setInterval(()=>{
    countdown--;
    if(countdown>0)SFX.countdown();
    if(countdown<=0){
      countdown=0;window._fightFlash=40;
      SFX.fight();
      clearInterval(countdownTimer);countdownTimer=null;
      if(matchTimer)clearInterval(matchTimer);
      matchTimer=setInterval(()=>{
        matchTimeLeft--;updateHUD();
        if(matchTimeLeft<=10&&matchTimeLeft>0)SFX.countdown();
        if(matchTimeLeft<=0){
          matchTimeLeft=0;clearInterval(matchTimer);matchTimer=null;
          gameRunning=false;stopBgMusic();
          setTimeout(()=>endMatch(),200);
        }
      },1000);
    }
  },1000);
  layoutTouchControls();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
const GAME_KEYS = new Set([
  'KeyW','KeyA','KeyS','KeyD','KeyF',
  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Slash',
  'KeyI','KeyJ','KeyK','KeyL','KeyN',
  'Numpad0','Numpad4','Numpad5','Numpad6','Numpad8',
]);
document.addEventListener('keydown',e=>{
  if(GAME_KEYS.has(e.code)){ keys[e.code]=true; e.preventDefault(); }
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

// ═══════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════
function rectRect(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function collidesWall(x,y,w,h){for(const w2 of walls)if(rectRect(x,y,w,h,w2.x,w2.y,w2.w,w2.h))return true;return false;}

// ═══════════════════════════════════════════════════════
//  SHOOT
// ═══════════════════════════════════════════════════════
function shoot(p){
  if(p.shootCooldown>0||!p.alive||countdown>0)return;
  bullets.push({x:p.x+p.w/2+Math.cos(p.angle)*14,y:p.y+p.h/2+Math.sin(p.angle)*14,
    vx:Math.cos(p.angle)*7,vy:Math.sin(p.angle)*7,owner:p.id,alive:true,r:5,trail:[]});
  p.shootCooldown=p.shootRate;
  SFX.shoot();
}

// ═══════════════════════════════════════════════════════
//  KILL / RESPAWN
// ═══════════════════════════════════════════════════════
function killPlayer(p,killerId){
  if(!p.alive)return;
  p.hp=0;p.alive=false;
  spawnDeathParticles(p.x+p.w/2,p.y+p.h/2,p.color);
  SFX.death();
  if(killerId!=null&&killerId!==p.id)players[killerId].kills++;
  updateHUD();
  setTimeout(()=>respawnPlayer(p),1500);
}

function respawnPlayer(p){
  const enemies=players.filter(pp=>pp.id!==p.id&&pp.alive);
  let best=CORNERS[0],bestDist=-1;
  for(const c of CORNERS){
    const minD=enemies.length?Math.min(...enemies.map(e=>Math.hypot(c.x-e.x,c.y-e.y))):999;
    if(minD>bestDist){bestDist=minD;best=c;}
  }
  p.x=best.x;p.y=best.y;p.hp=100;p.alive=true;p.trail=[];p.shootCooldown=30;
  p.angle=Math.atan2(H/2-p.y,W/2-p.x);
  spawnHitParticles(p.x+11,p.y+11,p.color,16);
  SFX.respawn();
  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
function spawnHitParticles(x,y,color,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,r:2+Math.random()*3,color,life:20+Math.random()*15});}
}
function spawnDeathParticles(x,y,color){
  for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:3+Math.random()*5,color,life:35+Math.random()*20});}
}

// ═══════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════
function update(){
  if(!gameRunning)return;
  for(let pi=0;pi<numPlayers;pi++){
    const p=players[pi],def=CTRL_DEFS[pi],tk=touchKeys[pi]||{dx:0,dy:0,shoot:false};
    let dx=0,dy=0;
    if(keys[def.up])dy=-1;if(keys[def.down])dy=1;if(keys[def.left])dx=-1;if(keys[def.right])dx=1;
    if(dx===0&&dy===0){dx=tk.dx||0;dy=tk.dy||0;}
    if(keys[def.shoot]||tk.shoot)shoot(p);
    movePlayer(p,dx,dy);
    if(p.shootCooldown>0)p.shootCooldown--;
  }
  for(const b of bullets){
    if(!b.alive)continue;
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>6)b.trail.shift();
    b.x+=b.vx;b.y+=b.vy;
    for(const w2 of walls)if(rectRect(b.x-b.r,b.y-b.r,b.r*2,b.r*2,w2.x,w2.y,w2.w,w2.h)){b.alive=false;spawnHitParticles(b.x,b.y,'#aaa',5);break;}
    if(!b.alive)continue;
    if(b.x<0||b.x>W||b.y<0||b.y>H){b.alive=false;continue;}
    for(const p of players){
      if(!b.alive||!p.alive||b.owner===p.id)continue;
      if(Math.hypot(b.x-(p.x+p.w/2),b.y-(p.y+p.h/2))<p.w/2+b.r+2){
        b.alive=false;spawnHitParticles(b.x,b.y,p.color,12);SFX.hit();killPlayer(p,b.owner);
      }
    }
  }
  bullets=bullets.filter(b=>b.alive);
  for(const m of mines){
    if(!m.alive)continue;
    m.pulse=(m.pulse+0.05)%(Math.PI*2);
    for(const p of players){
      if(!p.alive)continue;
      if(Math.hypot(m.x-(p.x+p.w/2),m.y-(p.y+p.h/2))<m.r+11){
        m.alive=false;spawnHitParticles(m.x,m.y,'#ff0',20);spawnHitParticles(m.x,m.y,'#f80',15);
        SFX.mine();killPlayer(p,null);
      }
    }
  }
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life--;p.r*=0.95;}
}

function movePlayer(p,dx,dy){
  if(!p.alive)return;
  if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}
  const nx=p.x+dx*p.speed,ny=p.y+dy*p.speed;
  if(!collidesWall(nx,p.y,p.w,p.h))p.x=nx;
  if(!collidesWall(p.x,ny,p.w,p.h))p.y=ny;
  p.x=Math.max(1,Math.min(W-p.w-1,p.x));p.y=Math.max(1,Math.min(H-p.h-1,p.y));
  if(dx!==0||dy!==0)p.angle=Math.atan2(dy,dx);
  p.trail.push({x:p.x+p.w/2,y:p.y+p.h/2});if(p.trail.length>8)p.trail.shift();
}

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
function draw(){
  ctx.fillStyle='#0e0e18';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1a1a2a';ctx.lineWidth=0.5;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)ctx.strokeRect(c*TILE,r*TILE,TILE,TILE);

  for(const w2 of walls){
    ctx.fillStyle='#1c1c30';ctx.fillRect(w2.x,w2.y,w2.w,w2.h);
    ctx.fillStyle='#2a2a45';ctx.fillRect(w2.x,w2.y,w2.w,3);
    ctx.fillStyle='#0d0d1a';ctx.fillRect(w2.x,w2.y+w2.h-3,w2.w,3);ctx.fillRect(w2.x+w2.w-3,w2.y,3,w2.h);
    ctx.strokeStyle='#151528';ctx.lineWidth=1;ctx.strokeRect(w2.x+1,w2.y+1,w2.w-2,w2.h-2);
  }

  for(const m of mines){
    if(!m.alive)continue;
    const pulse=Math.sin(m.pulse)*.5+.5;
    const grd=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,18+pulse*6);
    grd.addColorStop(0,`rgba(255,220,0,${0.4*pulse})`);grd.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(m.x,m.y,18+pulse*6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${180+pulse*60|0},${80+pulse*30|0},0)`;ctx.fill();
    ctx.strokeStyle='#ff0';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💀',m.x,m.y);
  }

  for(const p of players){
    for(let i=0;i<p.trail.length;i++){
      ctx.globalAlpha=(i/p.trail.length)*.14;
      ctx.beginPath();ctx.arc(p.trail[i].x,p.trail[i].y,7*(i/p.trail.length),0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  for(const p of players)drawPlayer(p);

  for(const b of bullets){
    if(!b.alive)continue;
    const pc=players[b.owner],bc=pc?pc.color:'#fff';
    for(let i=0;i<b.trail.length;i++){
      ctx.globalAlpha=(i/b.trail.length)*.45;
      ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,b.r*(i/b.trail.length),0,Math.PI*2);
      ctx.fillStyle=bc;ctx.fill();
    }
    ctx.globalAlpha=1;
    const grad=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*2);
    grad.addColorStop(0,'#fff');grad.addColorStop(.3,bc);grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*2,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  }

  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/35);
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.r),0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
  }
  ctx.globalAlpha=1;

  if(countdown>0){
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 16px Orbitron,monospace';ctx.fillStyle='#ffcc00';ctx.fillText(T('escape'),W/2,H/2-54);
    const pulse=1+Math.sin(Date.now()/150)*.06;
    ctx.save();ctx.translate(W/2,H/2+8);ctx.scale(pulse,pulse);
    ctx.font='bold 88px Bebas Neue,sans-serif';ctx.shadowColor=countdown<=2?'#ff4444':'#ffcc00';ctx.shadowBlur=30;
    ctx.fillStyle=countdown<=2?'#ff6666':'#ffee44';ctx.fillText(countdown,0,0);ctx.shadowBlur=0;ctx.restore();
    ctx.font='10px Orbitron,monospace';ctx.fillStyle='rgba(255,100,100,.75)';ctx.fillText(T('noShooting'),W/2,H/2+64);
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
    for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
      ctx.beginPath();ctx.moveTo(players[i].x+11,players[i].y+11);ctx.lineTo(players[j].x+11,players[j].y+11);ctx.stroke();
    }
    ctx.setLineDash([]);ctx.restore();
  } else if(countdown===0&&countdownTimer===null&&window._fightFlash>0){
    ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
    const al=window._fightFlash/40,sc=1+(1-al)*.5;
    ctx.globalAlpha=al;ctx.translate(W/2,H/2);ctx.scale(sc,sc);
    ctx.font='bold 96px Bebas Neue,sans-serif';ctx.shadowColor='#ff4444';ctx.shadowBlur=40;
    ctx.fillStyle='#ff4444';ctx.fillText(T('fight'),0,0);
    ctx.restore();ctx.globalAlpha=1;window._fightFlash--;
  }
}

function drawPlayer(p){
  if(!p.alive)return;
  const cx=p.x+p.w/2,cy=p.y+p.h/2,r=p.w/2;
  CHARACTERS[p.charId].draw(ctx,cx,cy,r,p.angle);
  if(p.shootCooldown>0&&p.shootCooldown<=30){
    ctx.globalAlpha=(p.shootCooldown/30)*.65;
    ctx.beginPath();ctx.arc(cx,cy,r+8,0,Math.PI*2);ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();ctx.globalAlpha=1;
  }
  ctx.fillStyle='#111';ctx.fillRect(cx-14,cy-r-9,28,4);
  ctx.fillStyle=p.color;ctx.fillRect(cx-14,cy-r-9,28,4);
  ctx.fillStyle='#fff';ctx.font='bold 8px Orbitron,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('P'+(p.id+1),cx,cy);
}

// ═══════════════════════════════════════════════════════
//  MATCH END
// ═══════════════════════════════════════════════════════
function endMatch(){
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
  if(matchTimer){clearInterval(matchTimer);matchTimer=null;}
  stopBgMusic();

  const sorted=[...players].sort((a,b)=>b.kills-a.kills);
  const top=sorted[0];
  let winnerHtml='';
  if(sorted.length>1&&top.kills===sorted[1].kills){
    winnerHtml=`<span style="color:#fff;font-size:22px">${T('draw')}</span>`;
    SFX.draw();
  } else {
    const ctrl=CTRL_DEFS[top.id],ch=CHARACTERS[top.charId];
    winnerHtml=`<span style="color:${ctrl.hudColor};font-size:22px">${ch.name} (P${top.id+1})</span><br>${T('wins')}`;
    SFX.win();
  }
  const killsLine=sorted.map(p=>`<span style="color:${CTRL_DEFS[p.id].hudColor}">${CHARACTERS[p.charId].name}:${p.kills}</span>`).join('  ');

  showResultScreen(`${winnerHtml}<br><span style="font-size:10px;color:#555;letter-spacing:2px">${killsLine}</span>`);

  // 5-second auto-return to opening screen
  const ringWrap=document.getElementById('replay-ring-wrap');
  const ringFill=document.getElementById('replay-ring-fill');
  const ringSecs=document.getElementById('replay-secs');
  const CIRC=2*Math.PI*24;
  ringWrap.style.display='block';
  document.getElementById('replay-countdown').textContent=T('returningMenu');
  let secsLeft=5;ringSecs.textContent=secsLeft;
  ringFill.style.strokeDasharray=CIRC;ringFill.style.strokeDashoffset=0;
  requestAnimationFrame(()=>{ringFill.style.strokeDashoffset=CIRC;});

  if(replayCountdownTimer)clearInterval(replayCountdownTimer);
  replayCountdownTimer=setInterval(()=>{
    secsLeft--;ringSecs.textContent=Math.max(0,secsLeft);
    if(secsLeft<=0){clearInterval(replayCountdownTimer);replayCountdownTimer=null;resetToOpening();}
  },1000);
}

function resetToOpening(){
  if(replayCountdownTimer){clearInterval(replayCountdownTimer);replayCountdownTimer=null;}
  buildMap();initPlayers();buildHUD();
  bullets=[];particles=[];keys={};matchTimeLeft=60;countdown=0;window._fightFlash=0;
  updateHUD();draw();
  showSetupScreen();
}

// Start-btn click: if result screen → startGame; if setup screen → startGame
document.getElementById('start-btn').addEventListener('click',()=>{
  if(replayCountdownTimer){clearInterval(replayCountdownTimer);replayCountdownTimer=null;}
  document.getElementById('replay-ring-wrap').style.display='none';
  document.getElementById('replay-countdown').textContent='';
  // startGame() is called by onclick in HTML
});

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
function loop(){update();draw();drawTouchControls();if(gameRunning)requestAnimationFrame(loop);}

// ═══════════════════════════════════════════════════════
//  TOUCH CONTROLS  (only rendered on touch devices via CSS)
// ═══════════════════════════════════════════════════════
const touchCanvas=document.getElementById('touch-canvas');
const tCtx=touchCanvas.getContext('2d');
const JOY_R=52,STICK_R=22,SHOOT_R=34;
let tW=0,tH=0;
let touchKeys=[{dx:0,dy:0,shoot:false},{dx:0,dy:0,shoot:false},{dx:0,dy:0,shoot:false},{dx:0,dy:0,shoot:false}];
const joyState=[0,1,2,3].map(()=>({id:null,bx:0,by:0,sx:0,sy:0}));
const activeTouches={};

// Detect touch device
const isTouchDevice = window.matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window;

function getZones(){
  const sw=tW/numPlayers;
  return Array.from({length:numPlayers},(_,pi)=>{
    const cx=sw*pi+sw/2;
    return {pi,cx,joyX:cx,joyY:tH-105,shootX:cx+(pi<numPlayers/2?sw*.28:-sw*.28),shootY:tH-68,minX:sw*pi,maxX:sw*(pi+1)};
  });
}

function layoutTouchControls(){
  tW=touchCanvas.width=window.innerWidth;
  tH=touchCanvas.height=window.innerHeight;
  getZones().forEach(z=>{joyState[z.pi].bx=z.joyX;joyState[z.pi].by=z.joyY;joyState[z.pi].sx=z.joyX;joyState[z.pi].sy=z.joyY;});
}

function drawTouchControls(){
  tCtx.clearRect(0,0,tW,tH);
  // Only draw on touch devices and during gameplay
  if(!isTouchDevice||!gameRunning)return;
  const zones=getZones();
  zones.forEach(z=>{
    const p=players[z.pi];if(!p)return;
    const color=p.color,js=joyState[z.pi],tk=touchKeys[z.pi];
    if(z.pi>0){tCtx.strokeStyle='rgba(255,255,255,.04)';tCtx.lineWidth=1;tCtx.beginPath();tCtx.moveTo(z.minX,0);tCtx.lineTo(z.minX,tH);tCtx.stroke();}
    tCtx.beginPath();tCtx.arc(js.bx,js.by,JOY_R,0,Math.PI*2);
    tCtx.strokeStyle=hr(color,.32);tCtx.lineWidth=3;tCtx.stroke();
    tCtx.fillStyle=hr(color,.07);tCtx.fill();
    tCtx.beginPath();tCtx.moveTo(js.bx,js.by);tCtx.lineTo(js.sx,js.sy);
    tCtx.strokeStyle=hr(color,.38);tCtx.lineWidth=2;tCtx.stroke();
    tCtx.beginPath();tCtx.arc(js.sx,js.sy,STICK_R,0,Math.PI*2);
    tCtx.fillStyle=hr(color,.52);tCtx.fill();tCtx.strokeStyle=color;tCtx.lineWidth=2;tCtx.stroke();
    tCtx.fillStyle='rgba(255,255,255,.65)';tCtx.font='14px Arial';tCtx.textAlign='center';tCtx.textBaseline='middle';tCtx.fillText('✦',js.sx,js.sy);
    tCtx.beginPath();tCtx.arc(z.shootX,z.shootY,SHOOT_R,0,Math.PI*2);
    tCtx.fillStyle=tk.shoot?hr(color,.72):hr(color,.16);tCtx.fill();
    tCtx.strokeStyle=color;tCtx.lineWidth=2.5;tCtx.stroke();
    tCtx.fillStyle=tk.shoot?'#fff':hr('#ffffff',.65);tCtx.font='bold 10px Orbitron,monospace';
    tCtx.textAlign='center';tCtx.textBaseline='middle';tCtx.fillText('FIRE',z.shootX,z.shootY);
    tCtx.fillStyle=hr(color,.45);tCtx.font='bold 9px Orbitron,monospace';tCtx.fillText('P'+(z.pi+1),js.bx,js.by-JOY_R-9);
  });
}

function hr(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function piForX(x){const sw=tW/numPlayers;return Math.min(numPlayers-1,Math.max(0,Math.floor(x/sw)));}

// ═══════════════════════════════════════════════════════
//  BACK ARROW  (shown only during gameplay, not on menu)
// ═══════════════════════════════════════════════════════
const backArrow = document.createElement('button');
backArrow.id = 'back-arrow';
backArrow.innerHTML = '&#8592;';
backArrow.title = 'Back to Home';
backArrow.style.display = 'none';
document.body.appendChild(backArrow);

function goHome(){
  // Stop any running timers
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
  if(matchTimer){clearInterval(matchTimer);matchTimer=null;}
  if(replayCountdownTimer){clearInterval(replayCountdownTimer);replayCountdownTimer=null;}
  stopBgMusic();
  gameRunning=false;
  bullets=[];particles=[];keys={};
  buildMap();initPlayers();buildHUD();
  matchTimeLeft=60;countdown=0;window._fightFlash=0;
  updateHUD();draw();
  showSetupScreen();
}
backArrow.addEventListener('click', goHome);
backArrow.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); goHome(); }, {passive:false});

function showBackArrow(){ backArrow.style.display = 'flex'; }
function hideBackArrow(){ backArrow.style.display = 'none'; }

// Only attach touch listeners on touch devices
if(isTouchDevice){
  touchCanvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    const zones=getZones();
    for(const t of e.changedTouches){
      const x=t.clientX,y=t.clientY;
      // Leave top-left 70×70 free for the back arrow
      if(x<70&&y<70) continue;
      const pi=piForX(x),z=zones[pi],js=joyState[pi],tk=touchKeys[pi];
      if(Math.hypot(x-z.shootX,y-z.shootY)<SHOOT_R+18){
        activeTouches[t.identifier]={pi,type:'shoot'};tk.shoot=true;
      } else if(js.id===null){
        activeTouches[t.identifier]={pi,type:'joy'};
        js.id=t.identifier;js.bx=x;js.by=y;js.sx=x;js.sy=y;tk.dx=0;tk.dy=0;
      }
    }
  },{passive:false});

  touchCanvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const info=activeTouches[t.identifier];if(!info||info.type!=='joy')continue;
      const pi=info.pi,js=joyState[pi],tk=touchKeys[pi];
      const dx=t.clientX-js.bx,dy=t.clientY-js.by,dist=Math.hypot(dx,dy),angle=Math.atan2(dy,dx),cap=Math.min(dist,JOY_R);
      js.sx=js.bx+Math.cos(angle)*cap;js.sy=js.by+Math.sin(angle)*cap;
      tk.dx=dist>8?Math.cos(angle):0;tk.dy=dist>8?Math.sin(angle):0;
    }
  },{passive:false});

  touchCanvas.addEventListener('touchend',e=>{
    e.preventDefault();
    const zones=getZones();
    for(const t of e.changedTouches){
      const info=activeTouches[t.identifier];if(!info)continue;
      const pi=info.pi,js=joyState[pi],tk=touchKeys[pi],z=zones[pi];
      if(info.type==='joy'){js.id=null;tk.dx=0;tk.dy=0;js.bx=z.joyX;js.by=z.joyY;js.sx=js.bx;js.sy=js.by;}
      else{tk.shoot=false;}
      delete activeTouches[t.identifier];
    }
  },{passive:false});

  touchCanvas.addEventListener('touchcancel',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const info=activeTouches[t.identifier];
      if(info){const pi=info.pi;touchKeys[pi].shoot=false;touchKeys[pi].dx=0;touchKeys[pi].dy=0;joyState[pi].id=null;}
      delete activeTouches[t.identifier];
    }
  },{passive:false});
}

window.addEventListener('resize',()=>{layoutTouchControls();drawTouchControls();});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
buildMap();initPlayers();buildHUD();buildControlsUI();
bullets=[];particles=[];keys={};
countdown=0;countdownTimer=null;matchTimer=null;matchTimeLeft=60;window._fightFlash=0;
layoutTouchControls();
updateHUD();draw();
// Show setup screen
showSetupScreen();
applyLanguage();
</script>
</body>
</html>
