<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👾 ALIEN — Multiplayer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060612; color:#fff; font-family:'Rajdhani',sans-serif; overflow:hidden; height:100vh; }
  canvas { display:block; position:absolute; top:0; left:0; }
  #overlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(6,6,18,0.92); z-index:10; flex-direction:column; gap:20px;
  }
  #overlay.hidden { display:none; }
  .logo {
    font-family:'Press Start 2P', monospace; font-size:clamp(18px,4vw,40px);
    color:#88eeff; text-shadow:0 0 30px #44aaff, 0 0 60px #2266ff;
    letter-spacing:4px; margin-bottom:8px;
  }
  .sub { color:rgba(255,255,255,0.5); font-size:14px; letter-spacing:2px; margin-bottom:28px; }
  .card {
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.12);
    border-radius:16px; padding:28px 36px; width:min(420px,90vw);
    display:flex; flex-direction:column; gap:14px;
  }
  .card h2 { font-size:16px; color:#88eeff; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  input[type=text] {
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.2);
    border-radius:8px; padding:10px 14px; color:#fff; font-size:15px;
    font-family:'Rajdhani',sans-serif; width:100%; outline:none;
    transition:border-color 0.2s;
  }
  input[type=text]:focus { border-color:#44aaff; }
  .btn {
    background:linear-gradient(135deg,#1a6fff,#0044cc);
    border:none; border-radius:8px; padding:12px; color:#fff;
    font-size:14px; font-family:'Press Start 2P',monospace; cursor:pointer;
    letter-spacing:1px; transition:transform 0.1s,box-shadow 0.2s; width:100%;
  }
  .btn:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(68,170,255,0.4); }
  .btn:active { transform:scale(0.98); }
  .btn.green { background:linear-gradient(135deg,#1a9f55,#0d6b38); }
  .divider { border:none; border-top:1px solid rgba(255,255,255,0.1); margin:4px 0; }
  #room-code-display {
    font-family:'Press Start 2P',monospace; font-size:22px; color:#ffcc00;
    text-align:center; letter-spacing:6px; padding:14px;
    background:rgba(255,200,0,0.08); border-radius:8px;
    border:1px solid rgba(255,200,0,0.25);
  }
  #status-msg { text-align:center; color:rgba(255,255,255,0.5); font-size:13px; min-height:18px; }
  #hud {
    position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 16px; pointer-events:none;
    background:linear-gradient(to bottom,rgba(6,6,18,0.8),transparent);
  }
  .hud-box {
    font-family:'Press Start 2P',monospace; font-size:11px;
    padding:6px 12px; border-radius:8px; border:1px solid;
  }
  #hud-p1 { color:#4af; border-color:rgba(68,170,255,0.4); background:rgba(68,170,255,0.1); }
  #hud-p2 { color:#f84; border-color:rgba(255,136,68,0.4); background:rgba(255,136,68,0.1); }
  #hud-stage { color:#ffcc00; border-color:rgba(255,200,0,0.4); background:rgba(255,200,0,0.08); }
  #end-overlay {
    position:absolute; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(6,6,18,0.88); display:none;
  }
  #end-title { font-family:'Press Start 2P',monospace; font-size:clamp(16px,3vw,32px); color:#ffcc00; text-shadow:0 0 20px #ff8800; margin-bottom:16px; text-align:center; }
  #end-sub { color:rgba(255,255,255,0.6); font-size:15px; margin-bottom:24px; }
  .my-key-hint {
    position:absolute; bottom:12px; left:0; right:0; text-align:center;
    color:rgba(255,255,255,0.3); font-size:11px; pointer-events:none; z-index:5;
  }
  #config-warning {
    background:rgba(255,80,80,0.12); border:1px solid rgba(255,80,80,0.3);
    border-radius:8px; padding:10px 14px; font-size:12px; color:#ff8888;
    line-height:1.6; display:none;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-box" id="hud-p1">P1: <span id="s1">0</span></div>
  <div class="hud-box" id="hud-stage">STAGE <span id="stg">1</span></div>
  <div class="hud-box" id="hud-p2">P2: <span id="s2">0</span></div>
</div>

<!-- Lobby Overlay -->
<div id="overlay">
  <div class="logo">👾 ALIEN</div>
  <div class="sub">MULTIPLAYER</div>

  <div id="config-warning">
    ⚠️ עדיין לא הגדרת Firebase Config!<br>
    פתח את קובץ ה-HTML בעורך טקסט והחלף את ה-PLACEHOLDER בפרטי הפרויקט שלך.
  </div>

  <div class="card">
    <h2>🎮 בחר מצב משחק</h2>
    <button class="btn" id="btn-local" style="font-size:11px;background:linear-gradient(135deg,#7c3aed,#4c1d95)">🖥️ באותו מחשב (P1: ← → | P2: A D)</button>
    <div style="text-align:center;color:rgba(255,255,255,0.3);font-size:11px;margin:-4px 0">— או מולטיפלייר ברשת —</div>
    <input type="text" id="name-input" placeholder="השם שלך..." maxlength="12" />
    <div style="display:flex;gap:10px">
      <button class="btn" id="btn-create" style="font-size:11px">✦ צור חדר</button>
      <button class="btn green" id="btn-showjoin" style="font-size:11px">→ הצטרף</button>
    </div>
    <div id="join-section" style="display:none;flex-direction:column;gap:10px">
      <input type="text" id="room-input" placeholder="קוד חדר (4 ספרות)..." maxlength="4" />
      <button class="btn green" id="btn-join">הצטרף לחדר ←</button>
    </div>
    <div id="room-code-display" style="display:none"></div>
    <div id="status-msg">בחר מצב משחק</div>
  </div>
</div>

<!-- End Overlay -->
<div id="end-overlay">
  <div id="end-title"></div>
  <div id="end-sub"></div>
  <button class="btn" id="btn-again" style="width:220px;font-size:11px">↺ שחק שוב</button>
</div>

<div class="my-key-hint" id="key-hint"></div>

<script type="module">
// ═══════════════════════════════════════════════════════
//  🔥 FIREBASE CONFIG — החלף את הערכים האלו בשלך!
//  קח מ: Firebase Console → Project Settings → Your apps → Web
// ═══════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDbprzF4Kf01ejNHagZLrWoDEZUmMlcaJs",
  authDomain:        "games-on-d-mend.firebaseapp.com",
  databaseURL:       "https://games-on-d-mend-default-rtdb.firebaseio.com",
  projectId:         "games-on-d-mend",
  storageBucket:     "games-on-d-mend.firebasestorage.app",
  messagingSenderId: "828376886522",
  appId:             "1:828376886522:web:6b2ca497c7b0ef0ccb2d43"
};
// ═══════════════════════════════════════════════════════

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Detect placeholder config
const isPlaceholder = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";
if (isPlaceholder) {
  document.getElementById('config-warning').style.display = 'block';
}

const app = isPlaceholder ? null : initializeApp(FIREBASE_CONFIG);
const db  = isPlaceholder ? null : getDatabase(app);

// ── Canvas / Game setup ──────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const W  = () => canvas.width;
const H  = () => canvas.height;
const CX = () => W()/2;
const CY = () => H()/2;
const CR = () => Math.min(W(),H()) * 0.35;
const PR = 14;

// ── State ───────────────────────────────────────────
let myRole   = null; // 'p1' | 'p2'
let roomId   = null;
let roomRef  = null;
let gameState = null; // full synced state from Firebase
let localKeys = {};
let animId   = null;
let lastTs   = null;
let particles = [];
let myName   = '';

// ── Helpers ─────────────────────────────────────────
function randId() { return Math.floor(1000 + Math.random()*9000).toString(); }
function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }
function showJoin() {
  document.getElementById('join-section').style.display = 'flex';
  document.getElementById('join-section').style.flexDirection = 'column';
}

// ── Create Room ──────────────────────────────────────
async function createRoom() {
  if (isPlaceholder) { alert('נא להגדיר Firebase Config קודם!'); return; }
  myName = document.getElementById('name-input').value.trim() || 'P1';
  roomId = randId();
  myRole = 'p1';
  roomRef = ref(db, `rooms/${roomId}`);

  const initial = buildInitialState(myName, '');
  await set(roomRef, initial);
  setStatus('ממתין לשחקן שני...');
  document.getElementById('room-code-display').style.display = 'block';
  document.getElementById('room-code-display').textContent = roomId;
  listenRoom();
};

// ── Join Room ────────────────────────────────────────
async function joinRoom() {
  if (isPlaceholder) { alert('נא להגדיר Firebase Config קודם!'); return; }
  myName = document.getElementById('name-input').value.trim() || 'P2';
  const code = document.getElementById('room-input').value.trim();
  if (code.length !== 4) { setStatus('קוד לא תקין'); return; }
  roomId  = code;
  myRole  = 'p2';
  roomRef = ref(db, `rooms/${roomId}`);
  const snap = await get(roomRef);
  if (!snap.exists()) { setStatus('חדר לא קיים'); return; }
  await update(roomRef, { 'p2Name': myName, 'p2Ready': true });
  listenRoom();
};

// ── Local (same computer) mode ───────────────────────
let localMode = false;

function startLocal() {
  localMode = true;
  myRole = 'p1';
  const s = buildInitialState('P1', 'P2');
  s.status = 'playing';
  s.p2Ready = true;
  gameState = s;
  // Cancel idle loop
  if (idleAnimId) { cancelAnimationFrame(idleAnimId); idleAnimId = null; }
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('key-hint').textContent = 'P1: ← →   |   P2: A D';
  startGameLoop();
}

function playAgain() {
  document.getElementById('end-overlay').style.display = 'none';
  if (localMode) {
    const n1 = gameState.p1Name || 'P1';
    const n2 = gameState.p2Name || 'P2';
    const s = buildInitialState(n1, n2);
    s.status = 'playing';
    s.p2Ready = true;
    gameState = s;
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    startGameLoop();
    return;
  }
  if (!roomRef) return;
  if (myRole === 'p1') {
    const fresh = buildInitialState(gameState.p1Name, gameState.p2Name);
    set(roomRef, fresh);
  }
};

// ── Listen to Firebase ───────────────────────────────
function listenRoom() {
  onValue(roomRef, snap => {
    if (!snap.exists()) return;
    const data = snap.val();

    // Both players joined → start
    if (data.p2Ready && data.status === 'waiting') {
      if (myRole === 'p1') {
        update(roomRef, { status: 'playing', startedAt: Date.now() });
      }
    }
    if (data.status === 'playing' && !animId) {
      startGameLoop();
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('key-hint').textContent =
        myRole === 'p1' ? '← → לתזוזה' : 'A D לתזוזה';
    }
    gameState = data;
    updateHUD(data);

    if (data.status === 'gameover') {
      endGameUI(data.winner, data.p1Name, data.p2Name);
    }
  });
}

// ── Initial State ────────────────────────────────────
function buildInitialState(n1, n2) {
  return {
    status:    'waiting',
    p1Name:    n1, p2Name: n2, p2Ready: false,
    p1Angle:   Math.PI * 0.9, p2Angle: Math.PI * 0.1,
    p1Alive:   true,  p2Alive: true,
    p1Score:   0,     p2Score: 0,
    alienAngle: 0,
    mines:     {},
    stage:     1,
    elapsed:   0,
    fireStopped: false, fireStopTimer: 0, nextFireTime: 2,
    winner:    null,
  };
}

// ── HUD ───────────────────────────────────────────────
function updateHUD(s) {
  if (!s) return;
  document.getElementById('s1').textContent   = s.p1Score || 0;
  document.getElementById('s2').textContent   = s.p2Score || 0;
  document.getElementById('stg').textContent  = s.stage   || 1;
}

function endGameUI(winner, n1, n2) {
  const el = document.getElementById('end-overlay');
  el.style.display = 'flex';
  const titleEl = document.getElementById('end-title');
  const subEl   = document.getElementById('end-sub');
  if (!winner || winner === 'draw') {
    titleEl.textContent = '🤝 תיקו!';
    subEl.textContent   = 'שניכם עפתם!';
  } else {
    const winName = winner === 'p1' ? (n1||'P1') : (n2||'P2');
    titleEl.textContent = `🏆 ${winName} ניצח!`;
    subEl.textContent   = 'כל הכבוד!';
  }
}

// ── Game Loop ─────────────────────────────────────────
function startGameLoop() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  lastTs = null;
  function loop(ts) {
    if (!lastTs) lastTs = ts;
    const dt = Math.min((ts - lastTs)/1000, 0.05);
    lastTs = ts;
    if (myRole === 'p1') hostUpdate(dt);
    draw();
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

// ── Host (P1) drives the physics ──────────────────────
async function hostUpdate(dt) {
  if (!gameState || gameState.status !== 'playing') return;
  let s = { ...gameState };
  s.elapsed = (s.elapsed || 0) + dt;

  // Stage
  s.stage = s.elapsed > 30 ? 3 : s.elapsed > 15 ? 2 : 1;

  // Alien spin
  const alienSpin = s.stage === 3 ? 0.015 : s.stage === 2 ? 0.012 : 0.008;
  if (!s.fireStopped) s.alienAngle = (s.alienAngle || 0) + alienSpin;

  // Player input — local mode: P1=arrows, P2=AD | online: p2 from Firebase
  const p1Left  = localKeys['ArrowLeft'];
  const p1Right = localKeys['ArrowRight'];
  const p2Left  = localMode ? (localKeys['a'] || localKeys['A']) : (s.p2Left  || false);
  const p2Right = localMode ? (localKeys['d'] || localKeys['D']) : (s.p2Right || false);
  const spd = 0.035;
  if (p1Left  && s.p1Alive) s.p1Angle -= spd;
  if (p1Right && s.p1Alive) s.p1Angle += spd;
  if (p2Left  && s.p2Alive) s.p2Angle -= spd;
  if (p2Right && s.p2Alive) s.p2Angle += spd;

  // Fire stop mechanic
  s.fireStopTimer = s.fireStopTimer || 0;
  s.nextFireTime  = s.nextFireTime  || 2;
  if (!s.fireStopped) {
    if (s.elapsed >= s.nextFireTime) {
      s.fireStopped = true;
      s.fireStopTimer = 0;
      s.mines = s.mines || {};
      const mid = Date.now().toString();
      s.mines[mid] = spawnMineData(s);
    }
  } else {
    s.fireStopTimer += dt;
    if (s.fireStopTimer > 1.5) {
      s.fireStopped = false;
      s.nextFireTime = s.elapsed + 1 + Math.random()*9;
      if (s.p1Alive) s.p1Score = (s.p1Score||0)+1;
      if (s.p2Alive) s.p2Score = (s.p2Score||0)+1;
    }
  }

  // Update mines
  s.mines = s.mines || {};
  for (const mid in s.mines) {
    const m = s.mines[mid];
    if (!m || m.dead) { delete s.mines[mid]; continue; }
    s.mines[mid] = updateMine(m, dt, s);
    if (s.mines[mid] && s.mines[mid].dead) delete s.mines[mid];
  }

  // Check game over
  if (!s.p1Alive && !s.p2Alive) { s.status='gameover'; s.winner='draw'; }
  else if (!s.p1Alive) { s.status='gameover'; s.winner='p2'; }
  else if (!s.p2Alive) { s.status='gameover'; s.winner='p1'; }

  gameState = s;
  updateHUD(s);

  if (s.status === 'gameover') {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    endGameUI(s.winner, s.p1Name, s.p2Name);
  }

  if (!localMode) await set(roomRef, s);
}

// ── Mine spawn / update ───────────────────────────────
function spawnMineData(s) {
  const stage = s.stage || 1;
  const types = stage < 2 ? ['fireball','greenball'] :
                stage < 3 ? ['fireball','greenball','laser','tongue'] :
                            ['fireball','greenball','laser','tongue','ringLaser'];
  const t = types[Math.floor(Math.random()*types.length)];
  const m = { type: t, age: 0, dead: false };
  const cx = 0, cy = 0; // relative to center
  const r = 0.15;
  if (t === 'fireball') {
    const a = s.alienAngle + (Math.random()-0.5)*0.5;
    m.angle = a; m.x = Math.cos(a)*r; m.y = Math.sin(a)*r;
    m.vx = Math.cos(a)*(2.5+stage*0.5)/CR(); m.vy = Math.sin(a)*(2.5+stage*0.5)/CR();
    m.radius = 10/CR();
  } else if (t === 'greenball') {
    const a = Math.random()*Math.PI*2;
    m.x = Math.cos(a)*r; m.y = Math.sin(a)*r;
    const pp = { x: Math.cos(s.p1Alive ? s.p1Angle : s.p2Angle), y: Math.sin(s.p1Alive ? s.p1Angle : s.p2Angle) };
    const dx = pp.x - m.x, dy = pp.y - m.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const sp = (2+stage*0.4)/CR();
    m.vx = dx/len*sp; m.vy = dy/len*sp; m.radius = 9/CR();
  } else if (t === 'laser') {
    m.laserAngle = s.alienAngle;
    m.spinSpeed  = (0.015+stage*0.005)*(Math.random()<0.5?1:-1);
    m.killDelay  = 3; m.killing = false;
  } else if (t === 'tongue') {
    m.tongueAngle = Math.random()*Math.PI*2;
    m.length = 0; m.maxLength = 0.9; m.growing = true; m.speed = 6/CR(); m.width = 18/CR();
  } else if (t === 'ringLaser') {
    m.gapAngle = Math.random()*Math.PI*2;
    m.gapSize  = Math.max(0.3, 0.8-stage*0.08);
    m.killDelay = 5; m.killing = false;
  }
  return m;
}

function playerUnitPos(angle) {
  return { x: Math.cos(angle), y: Math.sin(angle) };
}

function updateMine(m, dt, s) {
  m = { ...m };
  m.age = (m.age||0) + dt;
  const cr = CR();
  if (m.type === 'fireball' || m.type === 'greenball') {
    m.x += m.vx * cr * dt * 60;
    m.y += m.vy * cr * dt * 60;
    const dist = Math.sqrt(m.x*m.x+m.y*m.y);
    if (dist/cr > 1.3 || m.age > 5) { m.dead = true; return m; }
    // collision
    for (const role of ['p1','p2']) {
      if (!s[role+'Alive']) continue;
      const pa = s[role+'Angle'];
      const px = Math.cos(pa), py = Math.sin(pa);
      const ddx = m.x/cr - px, ddy = m.y/cr - py;
      if (Math.sqrt(ddx*ddx+ddy*ddy) < (PR+m.radius*cr)/cr) {
        s[role+'Alive'] = false;
        m.dead = true;
      }
    }
  } else if (m.type === 'laser') {
    m.laserAngle += m.spinSpeed;
    if (m.age > m.killDelay) m.killing = true;
    if (m.age > 8) { m.dead = true; return m; }
    if (m.killing) {
      for (const role of ['p1','p2']) {
        if (!s[role+'Alive']) continue;
        const pa = s[role+'Angle'];
        let diff = Math.abs(((pa - m.laserAngle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2));
        if (diff > Math.PI) diff = Math.PI*2 - diff;
        const thresh = Math.asin(Math.min(1, 14/cr));
        if (diff < thresh) s[role+'Alive'] = false;
      }
    }
  } else if (m.type === 'tongue') {
    if (m.growing) {
      m.length += m.speed * cr * dt * 60 / cr;
      if (m.length >= m.maxLength) m.growing = false;
    } else {
      m.length -= m.speed * cr * dt * 60 / cr * 1.5;
      if (m.length <= 0) { m.dead = true; return m; }
    }
    const tx = Math.cos(m.tongueAngle)*m.length;
    const ty = Math.sin(m.tongueAngle)*m.length;
    for (const role of ['p1','p2']) {
      if (!s[role+'Alive']) continue;
      const pa = s[role+'Angle'];
      const ddx = tx - Math.cos(pa), ddy = ty - Math.sin(pa);
      if (Math.sqrt(ddx*ddx+ddy*ddy) < (PR+m.width*cr/2)/cr) s[role+'Alive'] = false;
    }
  } else if (m.type === 'ringLaser') {
    if (m.age > m.killDelay) m.killing = true;
    if (m.age > 10) { m.dead = true; return m; }
    if (m.killing) {
      for (const role of ['p1','p2']) {
        if (!s[role+'Alive']) continue;
        let diff = ((s[role+'Angle'] - m.gapAngle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
        if (diff > Math.PI) diff = Math.PI*2 - diff;
        if (diff > m.gapSize/2) s[role+'Alive'] = false;
      }
    }
  }
  return m;
}

// ── Key handling ─────────────────────────────────────
document.addEventListener('keydown', e => {
  localKeys[e.key] = true;
  // Online P2: send keys to Firebase
  if (!localMode && myRole === 'p2' && roomRef) {
    update(roomRef, { p2Left: !!(localKeys['a']||localKeys['A']||localKeys['ArrowLeft']), p2Right: !!(localKeys['d']||localKeys['D']||localKeys['ArrowRight']) });
  }
});
document.addEventListener('keyup', e => {
  localKeys[e.key] = false;
  if (!localMode && myRole === 'p2' && roomRef) {
    update(roomRef, { p2Left: !!(localKeys['a']||localKeys['A']||localKeys['ArrowLeft']), p2Right: !!(localKeys['d']||localKeys['D']||localKeys['ArrowRight']) });
  }
});

// ── DRAW ──────────────────────────────────────────────
function drawStars() {
  for (let i=0;i<80;i++) {
    const x=(Math.sin(i*137.5)*0.5+0.5)*W(), y=(Math.cos(i*97.3)*0.5+0.5)*H();
    const s=0.5+(i%3)*0.5;
    ctx.fillStyle=`rgba(255,255,255,${0.1+(i%5)*0.06})`;
    ctx.beginPath(); ctx.arc(x,y,s,0,Math.PI*2); ctx.fill();
  }
}
function drawCircle() {
  const r=CR();
  ctx.save();
  ctx.strokeStyle='rgba(100,180,255,0.15)'; ctx.lineWidth=24;
  ctx.beginPath(); ctx.arc(CX(),CY(),r,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(100,200,255,0.5)'; ctx.lineWidth=2;
  ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.arc(CX(),CY(),r,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}
function drawAlien(s) {
  ctx.save();
  ctx.translate(CX(),CY());
  ctx.rotate(s.alienAngle||0);
  const sz=Math.min(W(),H())*0.065;
  ctx.fillStyle=s.fireStopped?'#88ff44':'#55dd22';
  ctx.beginPath(); ctx.ellipse(0,0,sz*0.9,sz*1.1,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.fireStopped?'#aaffaa':'#77ee55';
  for (let i=0;i<3;i++) {
    const ba=(i/3)*Math.PI*2-Math.PI/2;
    ctx.beginPath(); ctx.arc(Math.cos(ba)*sz*0.5,Math.sin(ba)*sz*0.5-sz*0.3,sz*0.22,0,Math.PI*2); ctx.fill();
  }
  for (let i=0;i<3;i++) {
    const ea=(i/3)*Math.PI*2-Math.PI/2;
    const ex=Math.cos(ea)*sz*0.35, ey=Math.sin(ea)*sz*0.35-sz*0.25;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(ex,ey,sz*0.14,sz*0.16,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff0040'; ctx.beginPath(); ctx.arc(ex,ey+sz*0.02,sz*0.07,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ex+sz*0.04,ey-sz*0.04,sz*0.03,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle='#224400'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,sz*0.4,sz*0.25,0.2,Math.PI-0.2); ctx.stroke();
  ctx.restore();
}
function drawPlayer(angle, color, label, alive) {
  if (!alive) return;
  const px=CX()+Math.cos(angle)*CR(), py=CY()+Math.sin(angle)*CR();
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=14;
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(px,py,PR,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='bold 8px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,px,py);
  // Role indicator (is this me?)
  if ((myRole==='p1'&&label===((gameState&&gameState.p1Name)||'P1')) ||
      (myRole==='p2'&&label===((gameState&&gameState.p2Name)||'P2'))) {
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.arc(px,py,PR+5,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawMines(mines) {
  if (!mines) return;
  const cr=CR();
  for (const mid in mines) {
    const m=mines[mid];
    if (!m||m.dead) continue;
    ctx.save();
    if (m.type==='fireball') {
      const mx=CX()+m.x*cr, my=CY()+m.y*cr;
      const pulse=0.85+0.15*Math.sin(m.age*12);
      ctx.shadowColor='#ff6622'; ctx.shadowBlur=16;
      const g=ctx.createRadialGradient(mx,my,2,mx,my,m.radius*cr*1.3*pulse);
      g.addColorStop(0,'#fff8aa'); g.addColorStop(0.4,'#ff8800'); g.addColorStop(1,'rgba(255,50,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(mx,my,m.radius*cr*1.3*pulse,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(mx,my,m.radius*cr*0.4,0,Math.PI*2); ctx.fill();
    } else if (m.type==='greenball') {
      const mx=CX()+m.x*cr, my=CY()+m.y*cr;
      ctx.shadowColor='#44ff88'; ctx.shadowBlur=14;
      ctx.fillStyle='#44ff88'; ctx.beginPath(); ctx.arc(mx,my,m.radius*cr,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ccffee'; ctx.beginPath(); ctx.arc(mx-3,my-3,m.radius*cr*0.35,0,Math.PI*2); ctx.fill();
    } else if (m.type==='laser') {
      const warn=m.age<m.killDelay;
      const alpha=warn?0.35+0.35*Math.sin(m.age*8):0.9;
      const lc=warn?`rgba(255,220,0,${alpha})`:`rgba(255,30,30,${alpha})`;
      ctx.strokeStyle=lc; ctx.lineWidth=warn?2:5;
      ctx.shadowColor=lc; ctx.shadowBlur=warn?8:20;
      const far=cr*1.5;
      ctx.beginPath(); ctx.moveTo(CX(),CY());
      ctx.lineTo(CX()+Math.cos(m.laserAngle)*far,CY()+Math.sin(m.laserAngle)*far);
      ctx.stroke();
      if (!warn) {
        ctx.lineWidth=2; ctx.strokeStyle='#ffffff'; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.moveTo(CX(),CY());
        ctx.lineTo(CX()+Math.cos(m.laserAngle)*far,CY()+Math.sin(m.laserAngle)*far);
        ctx.stroke();
      }
      const prog=Math.min(1,m.age/m.killDelay);
      ctx.strokeStyle=warn?'rgba(255,220,0,0.5)':'rgba(255,0,0,0.8)';
      ctx.lineWidth=3; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(CX(),CY(),cr*0.18,-Math.PI/2,-Math.PI/2+prog*Math.PI*2); ctx.stroke();
    } else if (m.type==='tongue') {
      const tx=CX()+Math.cos(m.tongueAngle)*m.length*cr;
      const ty=CY()+Math.sin(m.tongueAngle)*m.length*cr;
      ctx.strokeStyle='#ff44aa'; ctx.lineWidth=m.width*cr; ctx.lineCap='round';
      ctx.shadowColor='#ff44aa'; ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.moveTo(CX()+Math.cos(m.tongueAngle)*cr*0.12,CY()+Math.sin(m.tongueAngle)*cr*0.12);
      ctx.lineTo(tx,ty); ctx.stroke();
      ctx.fillStyle='#ff0066'; ctx.beginPath(); ctx.arc(tx,ty,m.width*cr*0.7,0,Math.PI*2); ctx.fill();
    } else if (m.type==='ringLaser') {
      const warn=m.age<m.killDelay;
      const alpha=warn?0.25+0.25*Math.sin(m.age*5):0.75;
      ctx.lineWidth=warn?12:22;
      ctx.strokeStyle=warn?`rgba(200,180,255,${alpha})`:`rgba(220,50,255,${alpha})`;
      ctx.shadowColor=warn?'#bbaaff':'#cc00ff'; ctx.shadowBlur=warn?8:20;
      ctx.beginPath();
      ctx.arc(CX(),CY(),cr,m.gapAngle+m.gapSize/2,m.gapAngle-m.gapSize/2+Math.PI*2);
      ctx.stroke();
      ctx.strokeStyle=warn?'rgba(100,255,100,0.8)':'rgba(100,255,100,0.9)';
      ctx.lineWidth=3; ctx.shadowColor='#00ff88'; ctx.shadowBlur=12;
      const triR=cr*0.88;
      const pts=[];
      for (let i=0;i<3;i++) {
        const a=m.gapAngle+(i/3-0.5)*m.gapSize;
        pts.push([CX()+Math.cos(a)*triR,CY()+Math.sin(a)*triR]);
      }
      pts.push([CX()+Math.cos(m.gapAngle)*triR*0.5,CY()+Math.sin(m.gapAngle)*triR*0.5]);
      ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
      ctx.lineTo(pts[1][0],pts[1][1]); ctx.lineTo(pts[2][0],pts[2][1]);
      ctx.lineTo(pts[3][0],pts[3][1]); ctx.closePath(); ctx.stroke();
      if (!m.killing) {
        const prog=m.age/m.killDelay;
        ctx.strokeStyle='rgba(200,150,255,0.6)'; ctx.lineWidth=3; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.arc(CX(),CY(),cr*0.14,-Math.PI/2,-Math.PI/2+prog*Math.PI*2); ctx.stroke();
      }
    }
    ctx.restore();
  }
}

function draw() {
  ctx.clearRect(0,0,W(),H());
  ctx.fillStyle='#060612'; ctx.fillRect(0,0,W(),H());
  drawStars();
  if (!gameState || gameState.status==='waiting') {
    drawIdleAlien();
    return;
  }
  const s=gameState;
  drawCircle();
  drawMines(s.mines);
  if (s.fireStopped) drawAttackFlash(s.fireStopTimer/1.5);
  drawAlien(s);
  drawPlayer(s.p1Angle,s.p1Alive?'#4af':'#224',s.p1Name||'P1',s.p1Alive);
  drawPlayer(s.p2Angle,s.p2Alive?'#f84':'#422',s.p2Name||'P2',s.p2Alive);
  // Particles
  particles=particles.filter(p=>p.life>0);
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.life-=0.025; p.vy+=0.08;
  }
}

function drawIdleAlien() {
  ctx.save(); ctx.translate(CX(),CY());
  const t=Date.now()/1000;
  ctx.rotate(t*0.4);
  const sz=Math.min(W(),H())*0.08;
  ctx.fillStyle='#55dd22';
  ctx.beginPath(); ctx.ellipse(0,0,sz*0.9,sz*1.1,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#77ee55';
  for (let i=0;i<3;i++) {
    const ba=(i/3)*Math.PI*2-Math.PI/2;
    ctx.beginPath(); ctx.arc(Math.cos(ba)*sz*0.5,Math.sin(ba)*sz*0.5-sz*0.3,sz*0.22,0,Math.PI*2); ctx.fill();
  }
  for (let i=0;i<3;i++) {
    const ea=(i/3)*Math.PI*2-Math.PI/2;
    const ex=Math.cos(ea)*sz*0.35,ey=Math.sin(ea)*sz*0.35-sz*0.25;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(ex,ey,sz*0.14,sz*0.16,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff0040'; ctx.beginPath(); ctx.arc(ex,ey+sz*0.02,sz*0.07,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
// Kick off idle animation loop (separate from game loop)
let idleAnimId = null;
function idleLoop() { draw(); idleAnimId = requestAnimationFrame(idleLoop); }
idleAnimId = requestAnimationFrame(idleLoop);

function drawAttackFlash(prog) {
  ctx.save();
  ctx.strokeStyle=`rgba(255,220,80,${0.6*(1-prog)})`;
  ctx.lineWidth=3+prog*8; ctx.setLineDash([10,6]);
  ctx.beginPath(); ctx.arc(CX(),CY(),CR()*0.22,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=`rgba(255,200,0,${0.7*(1-prog)})`;
  ctx.font=`bold ${14+prog*4}px 'Press Start 2P',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⚡ ATTACK!',CX(),CY()-CR()*0.3);
  ctx.restore();
}

document.getElementById('btn-local').addEventListener('click', startLocal);
document.getElementById('btn-create').addEventListener('click', createRoom);
document.getElementById('btn-showjoin').addEventListener('click', showJoin);
document.getElementById('btn-join').addEventListener('click', joinRoom);
document.getElementById('btn-again').addEventListener('click', playAgain);
</script>
