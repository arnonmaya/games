async function upload() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const bar = document.getElementById('bar');
  btn.disabled = true;
  status.className = 'status yellow';
  status.textContent = 'Uploading...';

  try {
    const existing = await get(ref(db, 'questions'));
    if(existing.exists()) {
      const count = Object.keys(existing.val()).length;
      if(count >= 100) {
        status.className = 'status green';
        status.textContent = `✅ Already uploaded! (${count} questions in database)`;
        bar.style.width = '100%';
        btn.textContent = '✅ Done!';
        return;
      }
    }

    const keys = Object.keys(questions);
    let done = 0;
    for(const key of keys) {
      await set(ref(db, 'questions/' + key), questions[key]);
      done++;
      bar.style.width = (done/keys.length*100) + '%';
      status.textContent = `Uploading... ${done}/${keys.length}`;
    }

    status.className = 'status green';
    status.textContent = `✅ Success! ${keys.length} questions uploaded to Firebase.`;
    bar.style.width = '100%';
    btn.textContent = '✅ Done! You can close this page.';
  } catch(e) {
    status.className = 'status red';
    status.textContent = '❌ Error: ' + e.message;
    btn.disabled = false;
  }
}

// Attach listener inside the module — no onclick needed
document.getElementById('btn').addEventListener('click', upload);
