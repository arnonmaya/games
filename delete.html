async function upload() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const bar = document.getElementById('bar');
  btn.disabled = true;
  status.className = 'status yellow';
  status.textContent = 'מעלה...';

  try {
    const existing = await get(ref(db, 'questions_he'));
    if(existing.exists()) {
      const count = Object.keys(existing.val()).length;
      if(count >= 100) {
        status.className = 'status green';
        status.textContent = 'כבר הועלה! (' + count + ' שאלות במסד הנתונים)';
        bar.style.width = '100%';
        btn.textContent = '✅ סיום!';
        return;
      }
    }

    const keys = Object.keys(questions);
    let done = 0;
    for(const key of keys) {
      await set(ref(db, 'questions_he/' + key), questions[key]);
      done++;
      bar.style.width = (done/keys.length*100) + '%';
      status.textContent = 'מעלה... ' + done + '/' + keys.length;
    }

    status.className = 'status green';
    status.textContent = '✅ הצלחה! ' + keys.length + ' שאלות הועלו ל-Firebase.';
    bar.style.width = '100%';
    btn.textContent = '✅ סיום! ניתן לסגור עמוד זה.';
  } catch(e) {
    status.className = 'status red';
    status.textContent = 'שגיאה: ' + e.message;
    btn.disabled = false;
  }
}

document.getElementById('btn').addEventListener('click', upload);
</script>
