<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, off, remove, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbprzF4Kf01ejNHagZLrWoDEZUmMlcaJs",
  authDomain: "games-on-d-mend.firebaseapp.com",
  databaseURL: "https://games-on-d-mend-default-rtdb.firebaseio.com",
  projectId: "games-on-d-mend",
  storageBucket: "games-on-d-mend.firebasestorage.app",
  messagingSenderId: "828376886522",
  appId: "1:828376886522:web:6b2ca497c7b0ef0ccb2d43"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ══════════════════════════════════════════════
//  WEB AUDIO ENGINE — no external libs
// ══════════════════════════════════════════════
let AC = null;
let musicOn = false;
let musicState = 'lobby';
let currentSeq = null;

function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

function noteToHz(note) {
  const NOTES = {C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
  const m = note.match(/^([A-Ga-g][b#]?)(\d)$/);
  if (!m) return 440;
  return 440 * Math.pow(2, (parseInt(m[2]) - 4) + (NOTES[m[1]] - 9) / 12);
}

function playOsc(freq, type, start, dur, vol, dest) {
  const ac = getAC();
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.001, start);
  g.gain.linearRampToValueAtTime(vol, start + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  osc.connect(g); g.connect(dest || ac.destination);
  osc.start(start); osc.stop(start + dur + 0.05);
}

function playKick(ac, t) {
  const osc = ac.createOscillator(), g = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  osc.connect(g); g.connect(ac.destination);
  osc.start(t); osc.stop(t + 0.32);
}

function playSnare(ac, t) {
  const len = Math.floor(ac.sampleRate * 0.14);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(), g = ac.createGain();
  const filt = ac.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 3000; filt.Q.value = 0.7;
  g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  src.buffer = buf;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + 0.18);
}

function playHihat(ac, t) {
  const len = Math.floor(ac.sampleRate * 0.04);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(), g = ac.createGain();
  const filt = ac.createBiquadFilter();
  filt.type = 'highpass'; filt.frequency.value = 8000;
  g.gain.setValueAtTime(0.07, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  src.buffer = buf;
  src.connect(filt); filt.connect(g); g.connect(ac.destination);
  src.start(t); src.stop(t + 0.05);
}

// Sequencer: schedules audio ahead of time via setTimeout loop
function makeSeq(bpm, barCount, scheduleFn) {
  const ac = getAC();
  const stepDur = (60 / bpm) / 4; // 16th note
  const totalSteps = barCount * 16;
  let step = 0;
  let nextTime = ac.currentTime + 0.05;
  let stopped = false;
  const LOOKAHEAD = 0.25;

  function tick() {
    if (stopped) return;
    const now = ac.currentTime;
    while (nextTime < now + LOOKAHEAD) {
      scheduleFn(ac, nextTime, step % totalSteps, stepDur);
      step++;
      nextTime += stepDur;
    }
    setTimeout(tick, 40);
  }
  tick();
  return { stop() { stopped = true; } };
}

// ── Song patterns ──
function schedLobby(ac, t, s, sd) {
  const bass = ['C2','C2','G2','G2','A2','A2','F2','F2','C2','C2','G2','G2','A2','F2','G2','C2'];
  if (s % 2 === 0) playOsc(noteToHz(bass[s/2|0]), 'sawtooth', t, sd * 1.7, 0.16);
  const mel = [null,'C4',null,null,'E4',null,'G4',null,null,'A4',null,null,'G4',null,'E4',null,
               null,'F4',null,null,'A4',null,'C5',null,null,'B4',null,null,'G4',null,'A4',null];
  if (mel[s]) playOsc(noteToHz(mel[s]), 'triangle', t, sd * 1.4, 0.1);
  if (s % 4 === 0) playKick(ac, t);
  if (s === 4 || s === 12 || s === 20 || s === 28) playSnare(ac, t);
  if (s % 2 === 0) playHihat(ac, t);
}

function schedGame(ac, t, s, sd) {
  const bass = ['C2','C2','C2','G1','A1','A1','F1','G1','C2','C2','C2','G1','A1','A1','F1','G1'];
  if (s % 2 === 0) playOsc(noteToHz(bass[s/2|0]), 'sawtooth', t, sd * 1.5, 0.18);
  const mel = ['C5',null,null,null,'G4',null,'A4',null,'B4',null,'C5',null,null,null,null,null,
               'F4',null,null,null,'A4',null,null,null,'G4',null,'E4',null,'F4',null,null,null];
  if (mel[s]) playOsc(noteToHz(mel[s]), 'triangle', t, sd * 1.1, 0.11);
  if (s===0||s===4||s===6||s===8||s===12||s===14||s===16||s===20||s===22||s===24||s===28||s===30) playKick(ac, t);
  if (s===4||s===12||s===20||s===28) playSnare(ac, t);
  playHihat(ac, t);
}

function schedTense(ac, t, s, sd) {
  const bass = ['C2','C2','D2','C2','A1','A1','G1','G1','C2','C2','D2','C2','A1','A1','G1','G1'];
  if (s % 2 === 0) playOsc(noteToHz(bass[s/2|0]), 'sawtooth', t, sd * 1.3, 0.2);
  const mel = ['C5',null,'D5',null,'E5',null,null,null,'D5',null,'C5',null,null,'B4',null,null,
               'C5',null,null,null,'A4',null,null,null,'G4',null,null,null,'F4','E4',null,null];
  if (mel[s]) playOsc(noteToHz(mel[s]), 'triangle', t, sd * 0.9, 0.13);
  if (s % 2 === 0) playKick(ac, t);
  if (s===4||s===10||s===12||s===20||s===26||s===28) playSnare(ac, t);
  playHihat(ac, t);
}

function startMusic(state) {
  if (currentSeq) { currentSeq.stop(); currentSeq = null; }
  const fn   = state === 'lobby' ? schedLobby : state === 'tense' ? schedTense : schedGame;
  const bpm  = state === 'lobby' ? 118 : state === 'tense' ? 155 : 138;
  currentSeq = makeSeq(bpm, 2, fn);
}

function stopMusic() {
  if (currentSeq) { currentSeq.stop(); currentSeq = null; }
}

function setMusicState(state) {
  if (!musicOn) { musicState = state; return; }
  if (musicState === state) return;
  musicState = state;
  startMusic(state);
}

// ── SFX ──
function playSFX(type) {
  if (!musicOn) return;
  const ac = getAC();
  const now = ac.currentTime;
  if (type === 'kick') {
    playKick(ac, now);
  } else if (type === 'goal') {
    [[0,'C5'],[0.16,'E5'],[0.32,'G5'],[0.48,'C6']].forEach(([dt,n]) => playOsc(noteToHz(n), 'triangle', now+dt, 0.32, 0.18));
    setTimeout(() => ['C5','E5','G5'].forEach(n => playOsc(noteToHz(n), 'triangle', ac.currentTime, 0.55, 0.13)), 700);
  } else if (type === 'save') {
    playOsc(noteToHz('G3'), 'square', now, 0.1, 0.13);
    playOsc(noteToHz('E3'), 'square', now+0.12, 0.18, 0.1);
  } else if (type === 'miss') {
    playOsc(noteToHz('A3'), 'sine', now, 0.16, 0.1);
    playOsc(noteToHz('G3'), 'sine', now+0.14, 0.16, 0.09);
    playOsc(noteToHz('F3'), 'sine', now+0.28, 0.22, 0.08);
  } else if (type === 'whistle') {
    playOsc(noteToHz('A5'), 'sine', now, 0.07, 0.16);
    playOsc(noteToHz('A5'), 'sine', now+0.1, 0.07, 0.16);
    playOsc(noteToHz('B5'), 'sine', now+0.22, 0.32, 0.18);
  } else if (type === 'crowd') {
    for (let i = 0; i < 4; i++) {
      const bLen = Math.floor(ac.sampleRate * 0.25);
      const buf = ac.createBuffer(1, bLen, ac.sampleRate);
      const d = buf.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let j=0;j<bLen;j++){
        const w=Math.random()*2-1;
        b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;
        d[j]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.1;b6=w*0.115926;
      }
      const src=ac.createBufferSource(),g=ac.createGain(),filt=ac.createBiquadFilter();
      filt.type='bandpass';filt.frequency.value=1400;filt.Q.value=0.5;
      src.buffer=buf;
      const st=now+i*0.08;
      g.gain.setValueAtTime(0,st);
      g.gain.linearRampToValueAtTime(0.2,st+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,st+0.35);
      src.connect(filt);filt.connect(g);g.connect(ac.destination);
      src.start(st);src.stop(st+0.4);
    }
  }
}

// ── Music toggle button ──
document.getElementById('music-btn').addEventListener('click', () => {
  // AudioContext MUST be created/resumed directly in a user gesture
  getAC();
  musicOn = !musicOn;
  const btn = document.getElementById('music-btn');
  if (musicOn) {
    btn.textContent = '🔊 מוזיקה';
    btn.classList.add('on');
    startMusic(musicState);
  } else {
    btn.textContent = '🔇 מוזיקה';
    btn.classList.remove('on');
    stopMusic();
  }
});

// ══════════════════════════════════════════════
//  TRANSLATIONS
// ══════════════════════════════════════════════
const T = {
  he: {
    title:'בעיטות לשער', sub:'בחר מצב משחק', diffLabel:'רמת קושי (יחיד)',

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=600,H=320;
canvas.width=W; canvas.height=H;
const GOAL_L=W/2-180,GOAL_R=W/2+180,GOAL_TOP=30,GOAL_BOT=145;
const KEEPER_BASE=GOAL_BOT-18,KEEPER_MARGIN=20;
const SHOTS_PER_ROUND=5;
const JERSEY=['#f5c800','#4080f5'],JERSEY_D=['#c8a000','#1850c0'];
const SOLO_DIFF={
  easy:{reactDelay:38,maxSpeed:2.5,catchRange:14,swaySpeed:0.008},
  med: {reactDelay:28,maxSpeed:4,  catchRange:18,swaySpeed:0.013},
  hard:{reactDelay:18,maxSpeed:6.5,catchRange:22,swaySpeed:0.018}
};
const HUMAN_CATCH=26,HUMAN_SPEED=7;

let gameMode='solo',difficulty='easy',setupDiff='easy';
let scores=[0,0],round=1,shooterShots=[0,0],shooterIdx=0;
let myIdx=0,myRole='shooter';
let phase='aim';
let ballX=W/2,ballY=H-55;
let targetX=W/2,targetY=GOAL_TOP+40;
let aimX=W/2,aimY=GOAL_TOP+40;
let remoteAimX=W/2,remoteAimY=GOAL_TOP+40;
let keeperX=W/2,keeperSwayDir=1;
let animFrame=0,animMax=45,animId=null,idleAnimId=null;
let particles=[];
let keysHeld={ArrowLeft:false,ArrowRight:false},keeperKeyInt=null;
let roomCode=null,roomRef=null,listeners=[];

function startGame(mode){
  gameMode=mode; difficulty=setupDiff;
  scores=[0,0]; round=1; shooterShots=[0,0]; shooterIdx=0; myIdx=0; myRole='shooter';
  showScreen('game-screen');
  const dc=document.getElementById('diff-controls');
  dc.style.display=(mode==='online')?'none':'';
  ['d-easy','d-med','d-hard'].forEach(id=>document.getElementById(id).style.display=mode==='local'?'none':'');
  playSFX('whistle'); setMusicState('game');
  initRound();
}

function genCode(){ return Math.random().toString(36).substring(2,6).toUpperCase(); }

async function showCreate(){
  showScreen('waiting-screen');
  document.getElementById('status-txt').textContent=t('waiting');
  let code;
  for(let i=0;i<10;i++){ code=genCode(); const snap=await get(ref(db,'rooms/'+code)); if(!snap.exists()) break; }
  roomCode=code; roomRef=ref(db,'rooms/'+roomCode);
  document.getElementById('code-display').textContent=roomCode;
  await set(roomRef,{host:true,guest:false,round:1,shooterShots:[0,0],scores:[0,0],shooterIdx:0,phase:'waiting',aim:{x:W/2,y:GOAL_TOP+40},shoot:{x:null,y:null,fired:false},keeperX:W/2,result:null});
  onDisconnect(roomRef).remove();
  myIdx=0; myRole='shooter';
  const guestRef=ref(db,'rooms/'+roomCode+'/guest');
  const unsub=onValue(guestRef,snap=>{ if(snap.val()===true){ off(guestRef); listeners=listeners.filter(l=>l!==unsub); startOnlineGame(); } });
  listeners.push(unsub);
}

async function joinRoom(){
  const code=document.getElementById('code-input').value.trim().toUpperCase();
  if(code.length!==4){ document.getElementById('join-error').textContent=t('roomNotFound'); return; }
  document.getElementById('join-error').textContent='';
  const snap=await get(ref(db,'rooms/'+code));
  if(!snap.exists()){ document.getElementById('join-error').textContent=t('roomNotFound'); return; }
  if(snap.val().guest===true){ document.getElementById('join-error').textContent=t('roomFull'); return; }
  roomCode=code; roomRef=ref(db,'rooms/'+roomCode);
  myIdx=1; myRole='keeper';
  await update(roomRef,{guest:true});
  onDisconnect(roomRef).remove();
  startOnlineGame();
}

function startOnlineGame(){
  gameMode='online'; difficulty='easy';
  scores=[0,0]; round=1; shooterShots=[0,0]; shooterIdx=0;
  myRole=myIdx===0?'shooter':'keeper';
  showScreen('game-screen');
  document.getElementById('diff-controls').style.display='none';
  playSFX('whistle'); setMusicState('game');
  initRound(); listenFirebase();
}

function listenFirebase(){
  if(myRole==='keeper'){
    listeners.push(onValue(ref(db,'rooms/'+roomCode+'/aim'),snap=>{ const v=snap.val(); if(!v) return; remoteAimX=v.x; remoteAimY=v.y; if(phase==='aim') draw(); }));
    listeners.push(onValue(ref(db,'rooms/'+roomCode+'/shoot'),snap=>{ const v=snap.val(); if(!v||!v.fired||phase!=='aim') return; targetX=v.x; targetY=v.y; phase='flying'; animFrame=0; ballX=W/2; ballY=H-55; playSFX('kick'); if(animId) cancelAnimationFrame(animId); animateFly(); }));
  }
  if(myRole==='shooter'){ listeners.push(onValue(ref(db,'rooms/'+roomCode+'/keeperX'),snap=>{ const v=snap.val(); if(v===null) return; keeperX=v; if(phase==='aim'||phase==='flying') draw(); })); }
  listeners.push(onValue(ref(db,'rooms/'+roomCode+'/result'),snap=>{ const v=snap.val(); if(!v) return; handleOnlineResult(v); }));
  listeners.push(onValue(ref(db,'rooms/'+roomCode+'/phase'),snap=>{ const v=snap.val(); if(v==='nextShot'&&phase==='result'){ phase='aim'; ballX=W/2; ballY=H-55; keeperX=W/2; remoteAimX=W/2; remoteAimY=GOAL_TOP+40; document.getElementById('msg').textContent=myRole==='shooter'?t('shoot'):t('keepHint'); document.getElementById('msg').className=''; draw(); } }));
  listeners.push(onValue(ref(db,'rooms/'+roomCode+'/host'),snap=>{ if(snap.val()===null&&myIdx===1) showOverlay(t('oppLeft'),true); }));
  listeners.push(onValue(ref(db,'rooms/'+roomCode+'/guest'),snap=>{ if(snap.val()===null&&myIdx===0) showOverlay(t('oppLeft'),true); }));
  listeners.push(onValue(ref(db,'rooms/'+roomCode+'/swapRound'),snap=>{ const v=snap.val(); if(!v) return; scores=[...v.scores]; round=2; shooterIdx=v.newShooterIdx; shooterShots=[...v.shooterShots]; myRole=myIdx===shooterIdx?'shooter':'keeper'; cleanupListeners(); setTimeout(()=>showRoleSwapOverlay(()=>{ rebuildHUD(); updateTurnLabel(); updateKeeperHint(); listenFirebase(); nextShot(); }),300); }));
  listeners.push(onValue(ref(db,'rooms/'+roomCode+'/gameover'),snap=>{ const v=snap.val(); if(!v) return; scores=[...v.scores]; setTimeout(()=>showGameOverOverlay(),600); }));
}

function cleanupListeners(){ listeners.forEach(u=>{ try{ if(typeof u==='function') u(); }catch(e){} }); listeners=[]; }
function cleanupRoom(){ cleanupListeners(); stopKeys(); if(roomRef){ remove(roomRef); roomRef=null; } roomCode=null; }

function handleOnlineResult(v){
  const msgEl=document.getElementById('msg'); const iScored=v.scorerIdx===myIdx;
  if(v.inGoal&&!v.caught){
    if(iScored){ scores[myIdx]++; msgEl.textContent=t('goal'); msgEl.className='goal-msg'; spawnParticles(targetX,targetY,'#e8d44d',30); spawnParticles(targetX,targetY,'#fff',15); playSFX('goal'); playSFX('crowd'); }
    else{ scores[1-myIdx]++; msgEl.textContent=t('goalOpp'); msgEl.className='save-msg'; playSFX('goal'); }
  } else if(v.caught){
    if(iScored){ msgEl.textContent=t('savedOpp'); msgEl.className='save-msg'; playSFX('save'); }
    else{ msgEl.textContent=t('saved'); msgEl.className='goal-msg'; spawnParticles(keeperX,KEEPER_BASE,'#e8d44d',20); playSFX('save'); playSFX('crowd'); }
  } else { msgEl.textContent=iScored?t('miss'):t('missOpp'); msgEl.className='save-msg'; playSFX('miss'); }
  updateHUD(); phase='result';
}

function initRound(){
  phase='aim'; ballX=W/2; ballY=H-55; keeperX=W/2; keeperSwayDir=1;
  aimX=W/2; aimY=GOAL_TOP+40; remoteAimX=W/2; remoteAimY=GOAL_TOP+40; particles=[];
  stopKeys(); rebuildHUD(); updateTurnLabel(); updateKeeperHint();
  const msgEl=document.getElementById('msg');
  msgEl.textContent=(gameMode==='online')?(myRole==='shooter'?t('shoot'):t('keepHint')):t('shoot');
  msgEl.className=''; draw();
  if(gameMode==='solo') startIdleSway();
  else if(gameMode!=='online') startKeys();
  else if(myRole==='keeper') startKeys();
}

function nextShot(){
  phase='aim'; ballX=W/2; ballY=H-55; keeperX=W/2; keeperSwayDir=Math.random()<0.5?1:-1;
  remoteAimX=W/2; remoteAimY=GOAL_TOP+40;
  if (shooterShots[shooterIdx] >= 3) setMusicState('tense'); else setMusicState('game');
  const msgEl=document.getElementById('msg');
  msgEl.textContent=(gameMode==='online')?(myRole==='shooter'?t('shoot'):t('keepHint')):t('shoot');
  msgEl.className=''; rebuildHUD(); updateTurnLabel();
  if(gameMode==='solo') startIdleSway(); draw();
}

function rebuildHUD(){
  const hud=document.getElementById('hud'); hud.innerHTML='';
  if(gameMode==='online'){
    for(let i=0;i<2;i++){ const isMe=i===myIdx; const div=document.createElement('div'); div.className='player-stat'+(isMe?' me':''); div.id='pstat-'+i; div.innerHTML=`<div class="p-name">${isMe?t('you'):t('opp')}</div><div class="p-score" id="pscore-${i}">${scores[i]}</div>`; hud.appendChild(div); }
  } else if(gameMode==='local'){
    for(let i=0;i<2;i++){ const isShooter=i===shooterIdx; const div=document.createElement('div'); div.className='player-stat'+(isShooter?' me':''); div.id='pstat-'+i; div.innerHTML=`<div class="p-name">${t('player')} ${i+1} <span style="opacity:0.55;font-size:10px">(${isShooter?t('shooter'):t('keeper')})</span></div><div class="p-score" id="pscore-${i}">${scores[i]}</div>`; hud.appendChild(div); }
  } else {
    const div=document.createElement('div'); div.className='player-stat me'; div.innerHTML=`<div class="p-name">${t('player')} 1</div><div class="p-score" id="pscore-0">${scores[0]}</div>`; hud.appendChild(div);
  }
}
function updateHUD(){ for(let i=0;i<2;i++){ const el=document.getElementById('pscore-'+i); if(el) el.textContent=scores[i]; } }
function updateTurnLabel(){
  if(gameMode==='online') document.getElementById('turn-label').textContent=`${myRole==='shooter'?t('youShoot'):t('youKeep')} — ${t('round')} ${round}/2`;
  else if(gameMode==='local') document.getElementById('turn-label').textContent=`${t('player')} ${shooterIdx+1} ${t('shooter')} · ${t('player')} ${1-shooterIdx+1} ${t('keeper')} — ${t('round')} ${round}/2`;
  else document.getElementById('turn-label').textContent='';
}
function updateKeeperHint(){ const hint=document.getElementById('keeper-hint'); if(gameMode==='local') hint.textContent=t('keepHint'); else if(gameMode==='online'&&myRole==='keeper') hint.textContent=t('keepHint'); else hint.textContent=''; }

function startKeys(){
  stopKeys(); document.addEventListener('keydown',onKD); document.addEventListener('keyup',onKU);
  keeperKeyInt=setInterval(()=>{
    if(phase!=='aim'&&phase!=='flying') return;
    const minX=GOAL_L+KEEPER_MARGIN,maxX=GOAL_R-KEEPER_MARGIN; let moved=false;
    if(keysHeld.ArrowLeft){ keeperX=Math.max(minX,keeperX-HUMAN_SPEED); moved=true; }
    if(keysHeld.ArrowRight){ keeperX=Math.min(maxX,keeperX+HUMAN_SPEED); moved=true; }
    if(moved){ if(gameMode==='online') update(roomRef,{keeperX}); draw(); }
  },16);
}
function stopKeys(){ document.removeEventListener('keydown',onKD); document.removeEventListener('keyup',onKU); if(keeperKeyInt){ clearInterval(keeperKeyInt); keeperKeyInt=null; } keysHeld={ArrowLeft:false,ArrowRight:false}; }
function onKD(e){ if(e.key==='ArrowLeft'||e.key==='ArrowRight'){e.preventDefault();keysHeld[e.key]=true;}}
function onKU(e){ keysHeld[e.key]=false; }

function startIdleSway(){
  if(idleAnimId) cancelAnimationFrame(idleAnimId);
  const minX=GOAL_L+KEEPER_MARGIN,maxX=GOAL_R-KEEPER_MARGIN;
  function loop(){ if(phase!=='aim'){idleAnimId=null;return;} const step=(maxX-minX)*SOLO_DIFF[difficulty].swaySpeed; keeperX+=keeperSwayDir*step; if(keeperX>=maxX){keeperX=maxX;keeperSwayDir=-1;} else if(keeperX<=minX){keeperX=minX;keeperSwayDir=1;} draw(); idleAnimId=requestAnimationFrame(loop); }
  idleAnimId=requestAnimationFrame(loop);
}

function spawnParticles(x,y,color,count){ for(let i=0;i<count;i++){ const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,size:3+Math.random()*4}); } }
function updateParticles(){ particles=particles.filter(p=>p.life>0.05); particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life*=0.9;p.size*=0.97;}); }
function drawParticles(){ particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}); ctx.globalAlpha=1; }

function drawField(){ ctx.fillStyle='#1e5e20';ctx.fillRect(0,0,W,H); const sw=W/12; for(let i=0;i<12;i++){ctx.fillStyle=i%2===0?'#1e5e20':'#1a5a1c';ctx.fillRect(i*sw,0,sw,H);} ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5; ctx.strokeRect(18,18,W-36,H-36); ctx.beginPath();ctx.moveTo(W/2,18);ctx.lineTo(W/2,H-18);ctx.stroke(); ctx.beginPath();ctx.arc(W/2,H/2,55,0,Math.PI*2);ctx.stroke(); ctx.beginPath();ctx.arc(W/2,H-18,25,Math.PI,0);ctx.stroke(); }
function drawGoal(){ ctx.strokeStyle='#e8e8e8';ctx.lineWidth=4; ctx.strokeRect(GOAL_L,GOAL_TOP,GOAL_R-GOAL_L,GOAL_BOT-GOAL_TOP); ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1; for(let i=1;i<5;i++){const x=GOAL_L+(GOAL_R-GOAL_L)/5*i;ctx.beginPath();ctx.moveTo(x,GOAL_TOP);ctx.lineTo(x,GOAL_BOT);ctx.stroke();} for(let i=1;i<3;i++){const y=GOAL_TOP+(GOAL_BOT-GOAL_TOP)/3*i;ctx.beginPath();ctx.moveTo(GOAL_L,y);ctx.lineTo(GOAL_R,y);ctx.stroke();} ctx.fillStyle='rgba(100,200,100,0.06)';ctx.fillRect(GOAL_L,GOAL_TOP,GOAL_R-GOAL_L,GOAL_BOT-GOAL_TOP); }

function drawKeeper(kx){ const ky=KEEPER_BASE,ki=1-shooterIdx,jc=JERSEY[ki%2],jd=JERSEY_D[ki%2]; ctx.strokeStyle='#1a3a8a';ctx.lineWidth=7;ctx.lineCap='round'; ctx.beginPath();ctx.moveTo(kx-7,ky);ctx.lineTo(kx-9,ky+22);ctx.stroke(); ctx.beginPath();ctx.moveTo(kx+7,ky);ctx.lineTo(kx+9,ky+22);ctx.stroke(); ctx.fillStyle='#111'; ctx.beginPath();ctx.ellipse(kx-10,ky+23,7,4,0,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.ellipse(kx+10,ky+23,7,4,0,0,Math.PI*2);ctx.fill(); ctx.fillStyle=jc; ctx.beginPath();ctx.moveTo(kx-14,ky-2);ctx.lineTo(kx-16,ky-30);ctx.lineTo(kx+16,ky-30);ctx.lineTo(kx+14,ky-2);ctx.closePath();ctx.fill(); ctx.strokeStyle=jd;ctx.lineWidth=1;ctx.stroke(); ctx.strokeStyle=jc;ctx.lineWidth=6;ctx.lineCap='round'; ctx.beginPath();ctx.moveTo(kx-14,ky-24);ctx.lineTo(kx-30,ky-14);ctx.stroke(); ctx.beginPath();ctx.moveTo(kx+14,ky-24);ctx.lineTo(kx+30,ky-14);ctx.stroke(); ctx.fillStyle='#ff4400'; ctx.beginPath();ctx.arc(kx-30,ky-14,5,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(kx+30,ky-14,5,0,Math.PI*2);ctx.fill(); ctx.fillStyle='#f5c09a'; ctx.beginPath();ctx.rect(kx-4,ky-34,8,7);ctx.fill(); ctx.beginPath();ctx.arc(kx,ky-42,12,0,Math.PI*2);ctx.fill(); ctx.strokeStyle='#d4956a';ctx.lineWidth=0.8;ctx.stroke(); ctx.fillStyle='#3a2010';ctx.beginPath();ctx.arc(kx,ky-42,12,Math.PI,0);ctx.fill(); ctx.beginPath();ctx.rect(kx-12,ky-48,24,8);ctx.fill(); ctx.fillStyle='#222'; ctx.beginPath();ctx.arc(kx-4,ky-41,2,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(kx+4,ky-41,2,0,Math.PI*2);ctx.fill(); ctx.strokeStyle='#a0604a';ctx.lineWidth=1.2; ctx.beginPath();ctx.arc(kx,ky-36,3,0.2,Math.PI-0.2);ctx.stroke(); ctx.fillStyle=jd;ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.fillText(ki+1,kx,ky-18); }
function drawShooter(px,py){ const si=shooterIdx,jc=JERSEY[si%2],jd=JERSEY_D[si%2]; ctx.strokeStyle='#333';ctx.lineWidth=6;ctx.lineCap='round'; ctx.beginPath();ctx.moveTo(px-6,py);ctx.lineTo(px-8,py+18);ctx.stroke(); ctx.beginPath();ctx.moveTo(px+6,py);ctx.lineTo(px+8,py+18);ctx.stroke(); ctx.fillStyle='#222'; ctx.beginPath();ctx.ellipse(px-9,py+19,6,3.5,0,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.ellipse(px+9,py+19,6,3.5,0,0,Math.PI*2);ctx.fill(); ctx.fillStyle=jc; ctx.beginPath();ctx.moveTo(px-12,py-2);ctx.lineTo(px-14,py-26);ctx.lineTo(px+14,py-26);ctx.lineTo(px+12,py-2);ctx.closePath();ctx.fill(); ctx.strokeStyle=jd;ctx.lineWidth=1;ctx.stroke(); ctx.strokeStyle=jc;ctx.lineWidth=5;ctx.lineCap='round'; ctx.beginPath();ctx.moveTo(px-12,py-20);ctx.lineTo(px-22,py-12);ctx.stroke(); ctx.beginPath();ctx.moveTo(px+12,py-20);ctx.lineTo(px+22,py-12);ctx.stroke(); ctx.fillStyle='#f5c09a'; ctx.beginPath();ctx.rect(px-3,py-30,6,6);ctx.fill(); ctx.beginPath();ctx.arc(px,py-38,10,0,Math.PI*2);ctx.fill(); ctx.strokeStyle='#d4956a';ctx.lineWidth=0.7;ctx.stroke(); ctx.fillStyle='#222';ctx.beginPath();ctx.arc(px,py-42,10,Math.PI,0);ctx.fill(); ctx.fillStyle='#333'; ctx.beginPath();ctx.arc(px-3,py-37,1.5,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(px+3,py-37,1.5,0,Math.PI*2);ctx.fill(); ctx.fillStyle=jd;ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText(si+1,px,py-14); }
function drawBall(bx,by,scale){ scale=scale||1; const r=10*scale; ctx.save();ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.clip(); ctx.fillStyle='white';ctx.fillRect(bx-r,by-r,r*2,r*2); ctx.fillStyle='#111'; drawPentagon(bx,by,r*0.38); [[0,-r*0.62],[r*0.59,-r*0.19],[r*0.365,r*0.5],[-r*0.365,r*0.5],[-r*0.59,-r*0.19]].forEach(o=>drawPentagon(bx+o[0],by+o[1],r*0.3)); ctx.restore(); ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.strokeStyle='#888';ctx.lineWidth=0.8;ctx.stroke(); }
function drawPentagon(cx,cy,r){ ctx.beginPath(); for(let i=0;i<5;i++){const a=-Math.PI/2+(Math.PI*2/5)*i;i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);} ctx.closePath();ctx.fill(); }
function drawAimLine(){ if(phase!=='aim') return; const ax=(gameMode==='online'&&myRole==='keeper')?remoteAimX:aimX; const ay=(gameMode==='online'&&myRole==='keeper')?remoteAimY:aimY; const inGoal=ax>GOAL_L&&ax<GOAL_R&&ay>GOAL_TOP&&ay<GOAL_BOT; ctx.strokeStyle=inGoal?'rgba(232,212,77,0.7)':'rgba(255,100,100,0.5)'; ctx.lineWidth=1.5;ctx.setLineDash([8,5]); ctx.beginPath();ctx.moveTo(ballX,ballY);ctx.lineTo(ax,ay);ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle=inGoal?'rgba(232,212,77,0.8)':'rgba(255,100,100,0.7)'; ctx.beginPath();ctx.arc(ax,ay,7,0,Math.PI*2);ctx.fill(); }
function draw(){ ctx.clearRect(0,0,W,H); drawField();drawGoal();drawKeeper(keeperX); updateParticles();drawParticles(); const bScale=phase==='flying'?1-0.3*(animFrame/animMax):1; drawBall(ballX,ballY,bScale); drawShooter(W/2,H-35); drawAimLine(); }

function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function animateFly(){ if(phase!=='flying') return; const tt=easeInOut(animFrame/animMax); ballX=W/2+(targetX-W/2)*tt; ballY=(H-55)+(targetY-(H-55))*tt; if(gameMode==='solo'){ const rd=SOLO_DIFF[difficulty].reactDelay,ms=SOLO_DIFF[difficulty].maxSpeed; const minX=GOAL_L+KEEPER_MARGIN,maxX=GOAL_R-KEEPER_MARGIN; const cs=ms*Math.min(animFrame/rd,1); if(keeperX<targetX) keeperX=Math.min(keeperX+cs,targetX); else if(keeperX>targetX) keeperX=Math.max(keeperX-cs,targetX); keeperX=Math.max(minX,Math.min(maxX,keeperX)); } animFrame++;draw(); if(animFrame>animMax){resolveShot();return;} animId=requestAnimationFrame(animateFly); }

function resolveShot(){
  const inGoal=targetX>GOAL_L&&targetX<GOAL_R&&targetY>GOAL_TOP&&targetY<GOAL_BOT;
  const catchRange=(gameMode==='solo')?SOLO_DIFF[difficulty].catchRange:HUMAN_CATCH;
  const caught=Math.abs(keeperX-targetX)<catchRange&&inGoal;
  const msgEl=document.getElementById('msg');
  if(gameMode==='online'){
    if(myRole==='shooter'){ update(roomRef,{result:{inGoal,caught,scorerIdx:myIdx,processed:false},phase:'result'}); if(inGoal&&!caught){ msgEl.textContent=t('goal');msgEl.className='goal-msg';scores[myIdx]++;spawnParticles(targetX,targetY,'#e8d44d',30);spawnParticles(targetX,targetY,'#fff',15);playSFX('goal');playSFX('crowd'); } else if(caught){ msgEl.textContent=t('savedOpp');msgEl.className='save-msg';playSFX('save'); } else { msgEl.textContent=t('miss');msgEl.className='save-msg';playSFX('miss'); } updateHUD(); }
    phase='result'; shooterShots[shooterIdx]++;
    const roundDone=shooterShots[shooterIdx]>=SHOTS_PER_ROUND; const gameOver=roundDone&&round===2;
    setTimeout(()=>{ if(gameOver){ if(myRole==='shooter') update(roomRef,{gameover:{scores}}); showGameOverOverlay(); } else if(roundDone&&round===1){ if(myRole==='shooter') update(roomRef,{swapRound:{scores,shooterShots,newShooterIdx:1},phase:'swap'}); } else { if(myRole==='shooter') update(roomRef,{phase:'nextShot'}); nextShot(); } },1400);
    return;
  }
  if(inGoal&&!caught){ scores[shooterIdx]++;spawnParticles(targetX,targetY,'#e8d44d',30);spawnParticles(targetX,targetY,'#ffffff',15);msgEl.textContent=t('goal');msgEl.className='goal-msg';playSFX('goal');playSFX('crowd'); }
  else if(caught){ spawnParticles(keeperX,KEEPER_BASE,'#e05050',20);msgEl.textContent=t('saved');msgEl.className='save-msg';playSFX('save'); }
  else { msgEl.textContent=t('miss');msgEl.className='save-msg';playSFX('miss'); }
  shooterShots[shooterIdx]++; updateHUD(); phase='result';
  const roundDone=shooterShots[shooterIdx]>=SHOTS_PER_ROUND; const gameOver=roundDone&&(gameMode==='solo'||round===2);
  setTimeout(()=>{ if(gameOver) showGameOverOverlay(); else if(gameMode==='local'&&roundDone) showRoleSwapOverlay(()=>{rebuildHUD();updateTurnLabel();updateKeeperHint();nextShot();}); else nextShot(); },1400);
}

function showOverlay(msg,withBack=false){ const wrap=document.getElementById('canvas-wrap'); const ov=document.createElement('div'); ov.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;gap:14px;z-index:20;'; ov.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#e8d44d;letter-spacing:0.1em;text-align:center;padding:0 1rem;">${msg}</div>`; if(withBack){ const btn=document.createElement('button'); btn.className='btn-ghost'; btn.textContent=t('back'); btn.addEventListener('click',()=>goLobby()); ov.appendChild(btn); } wrap.appendChild(ov); }

function showRoleSwapOverlay(cb){ round=2; shooterIdx=1-shooterIdx; playSFX('whistle'); setMusicState('game'); const wrap=document.getElementById('canvas-wrap'); const ov=document.createElement('div'); ov.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;gap:12px;z-index:15;'; ov.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#e8d44d;letter-spacing:0.1em;">🔄 ${t('roundSwap')}</div><div style="font-size:14px;color:#f0f0e8;">${t('player')} ${shooterIdx+1} → ${t('shooter')} 🖱️</div><div style="font-size:14px;color:#f0f0e8;">${t('player')} ${(1-shooterIdx)+1} → ${t('keeper')} ← →</div><div id="swap-cd" style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:rgba(232,212,77,0.8);">3</div>`; wrap.appendChild(ov); let s=3; const iv=setInterval(()=>{ s--; const el=document.getElementById('swap-cd'); if(el) el.textContent=s; if(s<=0){ clearInterval(iv); ov.remove(); cb(); } },1000); }

function showGameOverOverlay(){
  setMusicState('lobby'); playSFX('whistle');
  const wrap=document.getElementById('canvas-wrap');
  let html=`<div style="position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;gap:11px;z-index:15;"><div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#e8d44d;letter-spacing:0.1em;">${t('gameover')}</div>`;
  if(gameMode==='solo'){ html+=`<div style="font-size:15px;color:#f0f0e8;">${scores[0]} ${t('score')}</div>`; }
  else { for(let i=0;i<2;i++){ const label=gameMode==='online'?(i===myIdx?t('you'):t('opp')):(t('player')+' '+(i+1)); html+=`<div style="font-size:14px;color:#f0f0e8;">${label}: ${scores[i]} ${t('score')}</div>`; } const max=Math.max(...scores); const winners=scores.map((s,i)=>s===max?i:-1).filter(i=>i>=0); html+=gameMode==='online'?`<div style="font-size:16px;color:#e8d44d;font-weight:700;">${winners.length===1?(winners[0]===myIdx?t('winner'):t('loser')):t('draw')}</div>`:`<div style="font-size:16px;color:#e8d44d;font-weight:700;">${winners.length===1?('🏆 '+t('player')+' '+(winners[0]+1)):t('draw')}</div>`; }
  html+=`<button id="pa-btn" style="margin-top:6px;padding:10px 32px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.1em;border:1px solid rgba(232,212,77,0.4);border-radius:10px;background:rgba(232,212,77,0.14);color:#e8d44d;cursor:pointer;">${t('playAgain')}</button><div id="go-cd" style="font-size:12px;color:rgba(240,240,232,0.4);">5</div></div>`;
  const ov=document.createElement('div'); ov.id='gameover-ov'; ov.innerHTML=html; wrap.appendChild(ov);
  document.getElementById('pa-btn').addEventListener('click',()=>{ if(window._goCd) clearInterval(window._goCd); ov.remove(); cleanupRoom(); if(gameMode==='online') goLobby(); else{ shooterShots=[0,0];round=1;shooterIdx=0;scores=[0,0]; playSFX('whistle'); setMusicState('game'); initRound(); } });
  let s=5; window._goCd=setInterval(()=>{ s--; const el=document.getElementById('go-cd'); if(el) el.textContent=s; if(s<=0){ clearInterval(window._goCd); ov.remove(); cleanupRoom(); goLobby(); } },1000);
}

function getPos(e){ const r=canvas.getBoundingClientRect(); return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}; }
function canShoot(){ if(phase!=='aim') return false; if(gameMode==='online'&&myRole!=='shooter') return false; return true; }
canvas.addEventListener('mousemove',e=>{ if(!canShoot()) return; const p=getPos(e); aimX=Math.max(GOAL_L-30,Math.min(GOAL_R+30,p.x)); aimY=Math.max(GOAL_TOP-10,Math.min(GOAL_BOT+10,p.y)); if(gameMode==='online') update(roomRef,{'aim/x':aimX,'aim/y':aimY}); draw(); });
canvas.addEventListener('click',e=>{ if(!canShoot()) return; const p=getPos(e); targetX=Math.max(GOAL_L-40,Math.min(GOAL_R+40,p.x)); targetY=Math.max(GOAL_TOP-15,Math.min(GOAL_BOT+15,p.y)); if(gameMode==='online') update(roomRef,{shoot:{x:targetX,y:targetY,fired:true}}); playSFX('kick'); phase='flying'; animFrame=0; ballX=W/2; ballY=H-55; if(idleAnimId){cancelAnimationFrame(idleAnimId);idleAnimId=null;} if(animId) cancelAnimationFrame(animId); animateFly(); });
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(!canShoot()) return; const p=getPos(e.touches[0]); aimX=Math.max(GOAL_L-30,Math.min(GOAL_R+30,p.x)); aimY=Math.max(GOAL_TOP-10,Math.min(GOAL_BOT+10,p.y)); if(gameMode==='online') update(roomRef,{'aim/x':aimX,'aim/y':aimY}); },{passive:false});
canvas.addEventListener('touchend',e=>{ if(!canShoot()) return; targetX=aimX; targetY=aimY; if(gameMode==='online') update(roomRef,{shoot:{x:targetX,y:targetY,fired:true}}); playSFX('kick'); phase='flying'; animFrame=0; ballX=W/2; ballY=H-55; if(idleAnimId){cancelAnimationFrame(idleAnimId);idleAnimId=null;} if(animId) cancelAnimationFrame(animId); animateFly(); });

applyText();
</script>
