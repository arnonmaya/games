<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game – Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c0e;
    --panel: #13151a;
    --border: #1e2128;
    --green: #1D9E75;
    --green-hi: #5DCAA5;
    --red: #E24B4A;
    --text: #d4d8e0;
    --muted: #555a66;
    --font-main: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  body {
    background: var(--bg);
    font-family: var(--font-main);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ---- Screens ---- */
  .screen { display: none; flex-direction: column; align-items: center; gap: 18px; padding: 2rem 1.2rem; max-width: 520px; width: 100%; }
  .screen.active { display: flex; }

  h1 { font-size: 38px; font-weight: 800; color: var(--green-hi); letter-spacing: -0.02em; text-align: center; }
  h1 span { color: var(--text); }

  .sub-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; align-self: flex-start; }

  /* ---- Buttons ---- */
  .btn-primary {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: var(--green); color: #fff; font-family: var(--font-main);
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary:hover { background: var(--green-hi); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-outline {
    padding: 10px 22px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text); font-family: var(--font-main);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-outline:hover { border-color: var(--green); color: var(--green-hi); }

  /* ---- Main menu mode select ---- */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .mode-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 16px; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .mode-card:hover, .mode-card.selected { border-color: var(--green); }
  .mode-card .mode-icon { font-size: 28px; margin-bottom: 8px; }
  .mode-card .mode-title { font-size: 15px; font-weight: 700; }
  .mode-card .mode-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ---- Online panel ---- */
  .online-panel { width: 100%; background: var(--panel); border-radius: 12px; border: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 14px; }

  .room-display {
    text-align: center; background: var(--bg); border-radius: 10px; border: 1px solid var(--green);
    padding: 16px;
  }
  .room-code { font-family: var(--font-mono); font-size: 40px; font-weight: 700; color: var(--green-hi); letter-spacing: 0.15em; }
  .room-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .input-row { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-mono); font-size: 18px; font-weight: 700;
    padding: 10px 14px; text-transform: uppercase; letter-spacing: 0.1em; outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]::placeholder { color: var(--muted); font-size: 13px; letter-spacing: 0; font-weight: 400; }
  input[type="text"]:focus { border-color: var(--green); }

  .divider { text-align: center; color: var(--muted); font-size: 12px; font-family: var(--font-mono); position: relative; }
  .divider::before, .divider::after { content:''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
  .divider::before { left: 0; } .divider::after { right: 0; }

  /* ---- Lobby ---- */
  .lobby-header { width: 100%; display: flex; justify-content: space-between; align-items: center; }
  .lobby-players { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .lobby-player {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px;
  }
  .lobby-player .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .lobby-player .lp-name { font-weight: 700; font-size: 14px; flex: 1; }
  .lobby-player .lp-badge { font-family: var(--font-mono); font-size: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; color: var(--muted); }
  .lobby-player .lp-ready { font-size: 11px; color: var(--green); }
  .lp-slot { opacity: 0.35; }

  .lobby-room { font-family: var(--font-mono); font-size: 24px; font-weight: 700; color: var(--green-hi); letter-spacing: 0.12em; }

  .lobby-msg { font-size: 13px; color: var(--muted); text-align: center; }

  /* ---- Player select ---- */
  .player-select { display: flex; gap: 10px; }
  .pnum { width: 52px; height: 52px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .pnum:hover { border-color: var(--green-hi); color: var(--green-hi); }
  .pnum.selected { background: var(--green); border-color: var(--green-hi); color: #fff; }

  /* ---- Instructions ---- */
  .instructions { width: 100%; background: var(--panel); border-radius: 10px; border: 1px solid var(--border); padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .player-row { display: flex; align-items: center; gap: 10px; }
  .p-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .p-name { font-size: 13px; font-weight: 700; min-width: 70px; }
  .p-keys { font-size: 12px; color: var(--muted); }
  .key { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; font-size: 11px; color: var(--text); margin: 0 1px; font-family: var(--font-mono); }

  .rules { width: 100%; background: var(--panel); border-radius: 10px; border: 1px solid var(--border); padding: 14px 16px; }
  .rules ul { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .rules li { font-size: 13px; color: var(--muted); padding-left: 16px; position: relative; }
  .rules li::before { content: '▸'; position: absolute; left: 0; color: var(--green); }
  html[dir="rtl"] .rules li { padding-left: 0; padding-right: 16px; }
  html[dir="rtl"] .rules li::before { left: auto; right: 0; }

  /* ---- Game screen ---- */
  #game-screen { gap: 10px; }
  #score-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .stat { text-align: center; background: var(--panel); border-radius: 8px; border: 1px solid var(--border); padding: 4px 12px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--font-mono); }
  .stat-value { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }

  #canvas-container { position: relative; }
  #canvas-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 0 50px rgba(29,158,117,0.1); }
  canvas { display: block; }

  #result-overlay {
    display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); border-radius: 12px;
    flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    backdrop-filter: blur(4px);
  }
  #result-overlay.show { display: flex; }
  #result-title { font-size: 26px; font-weight: 800; }
  #result-sub { font-size: 14px; color: var(--muted); }
  .rbtn { font-size: 13px; padding: 8px 22px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; margin: 4px; font-family: var(--font-main); }
  .rbtn:hover { background: var(--panel); color: var(--green-hi); border-color: var(--green); }
  #result-countdown { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 4px; }

  #game-btns { display: flex; gap: 10px; }
  .gbtn { font-size: 13px; padding: 7px 20px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; font-family: var(--font-main); font-weight: 600; }
  .gbtn:hover { background: var(--panel); color: var(--green-hi); border-color: var(--green); }

  #msg { font-size: 13px; color: var(--muted); font-family: var(--font-mono); min-height: 20px; }

  /* ---- Fixed buttons ---- */
  #lang-btn { position: fixed; top: 16px; left: 16px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; z-index: 100; font-family: var(--font-mono); }
  #lang-btn:hover { color: var(--green-hi); border-color: var(--green); }

  #home-btn { position: fixed; top: 16px; right: 16px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); color: var(--muted); font-size: 12px; text-decoration: none; transition: all 0.15s; z-index: 100; }
  #home-btn:hover { color: var(--green-hi); border-color: var(--green); }

  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-left: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .error-msg { color: var(--red); font-size: 13px; font-family: var(--font-mono); text-align: center; min-height: 18px; }

  /* ---- Online game indicator ---- */
  .online-badge {
    font-family: var(--font-mono); font-size: 11px; color: var(--green-hi);
    background: rgba(29,158,117,0.1); border: 1px solid rgba(29,158,117,0.3);
    border-radius: 6px; padding: 3px 10px; display: flex; align-items: center; gap: 6px;
  }

  /* player name input */
  .name-input-row { display: flex; gap: 10px; width: 100%; }
  .name-input-row input { font-size: 14px; font-family: var(--font-main); letter-spacing: 0; font-weight: 600; }
</style>

  for (let i = 0; i < 4; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function getDb() { return window._db; }

async function createRoom() {
  if (!window._firebaseReady) { showError(s('errorGeneric')); return; }
  myName = document.getElementById('player-name-input').value.trim() || s('playerNames')[0];

  clearError();
  myPlayerId = generatePlayerId();
  myPlayerIndex = 0;
  isHost = true;
  roomId = generateRoomId();

  const db = getDb();
  const rRef = window._dbRef(db, `snake_rooms/${roomId}`);

  const roomData = {
    id: roomId,
    host: myPlayerId,
    state: 'lobby',
    players: {
      [myPlayerId]: { name: myName, index: 0, alive: true, connected: true }
    },
    food: null,
    snakeStates: {},
    gameStarted: false,
    tick: 0
  };

  try {
    await window._dbSet(rRef, roomData);
    // auto-remove on disconnect
    window._dbOnDisconnect(rRef).remove();
    enterLobby(roomId, rRef);
  } catch(e) {
    showError(s('errorGeneric'));
  }
}

async function joinRoom() {
  if (!window._firebaseReady) { showError(s('errorGeneric')); return; }
  myName = document.getElementById('player-name-input').value.trim() || s('playerNames')[0];

  const code = document.getElementById('join-code-input').value.trim();
  if (!code || code.length < 4) { showError(s('errorNoRoom')); return; }
  clearError();

  const db = getDb();
  const rRef = window._dbRef(db, `snake_rooms/${code}`);

  try {
    const snap = await window._dbGet(rRef);
    if (!snap.exists()) { showError(s('errorNoRoom')); return; }
    const data = snap.val();
    const players = data.players || {};
    const pCount = Object.keys(players).length;
    if (pCount >= 4) { showError(s('errorRoomFull')); return; }
    if (data.state !== 'lobby') { showError(s('errorGeneric')); return; }

    // Find next available index
    const usedIndices = Object.values(players).map(p => p.index);
    let nextIdx = 0;
    while (usedIndices.includes(nextIdx)) nextIdx++;

    myPlayerId = generatePlayerId();
    myPlayerIndex = nextIdx;
    isHost = false;
    roomId = code;

    await window._dbUpdate(window._dbRef(db, `snake_rooms/${code}/players/${myPlayerId}`), {
      name: myName, index: nextIdx, alive: true, connected: true
    });

    enterLobby(code, rRef);
  } catch(e) {
    console.error(e);
    showError(s('errorGeneric'));
  }
}

function enterLobby(rid, rRef) {
  roomRef = rRef;
  hide('menu-screen');
  show('lobby-screen');
  document.getElementById('lobby-room-display').textContent = rid;

  // Listen to room changes
  roomListener = window._dbOnValue(rRef, (snap) => {
    if (!snap.exists()) { leaveRoom(); return; }
    currentRoomData = snap.val();
    renderLobby(currentRoomData);

    // If game started by host
    if (currentRoomData.state === 'playing' && currentRoomData.gameStarted) {
      startOnlineGame(currentRoomData);
    }
  });
}

function renderLobby(data) {
  const players = data.players || {};
  const entries = Object.entries(players).sort((a,b) => a[1].index - b[1].index);
  const isMe = (pid) => pid === myPlayerId;
  const isHostP = (pid) => pid === data.host;

  document.getElementById('lobby-players-list').innerHTML = entries.map(([pid, p]) => {
    const c = PLAYER_COLORS[p.index];
    const tags = [];
    if (isMe(pid)) tags.push(`<span class="lp-badge" style="color:var(--green-hi);border-color:var(--green)">${s('youTag')}</span>`);
    if (isHostP(pid)) tags.push(`<span class="lp-badge">${s('hostTag')}</span>`);
    return `<div class="lobby-player">
      <div class="dot" style="background:${c.color}"></div>
      <div class="lp-name" style="color:${c.headColor}">${p.name}</div>
      ${tags.join('')}
    </div>`;
  }).join('');

  // Empty slots
  const filled = entries.length;
  for (let i = filled; i < 2; i++) {
    document.getElementById('lobby-players-list').innerHTML += `<div class="lobby-player lp-slot">
      <div class="dot" style="background:#333"></div>
      <div class="lp-name" style="color:#444">${s('waiting')}...</div>
    </div>`;
  }

  const amHost = data.host === myPlayerId;
  document.getElementById('lobby-start-btn').style.display = amHost ? 'block' : 'none';
  document.getElementById('lobby-msg').textContent = amHost ? s('youAreHost') : s('waitingForHost');
}

async function hostStartGame() {
  if (!isHost || !roomRef) return;
  const data = currentRoomData;
  if (!data) return;

  const players = data.players || {};
  const pCount = Object.keys(players).length;
  if (pCount < 1) return;

  // Set up initial game state
  const initialSnakeStates = {};
  Object.entries(players).forEach(([pid, p]) => {
    const st = STARTS[p.index];
    initialSnakeStates[pid] = {
      body: [st.pos, {x:st.pos.x-st.dir.x,y:st.pos.y},{x:st.pos.x-st.dir.x*2,y:st.pos.y}],
      dir: st.dir,
      alive: true,
      score: 0
    };
  });

  const foodPos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};

  await window._dbUpdate(roomRef, {
    state: 'playing',
    gameStarted: true,
    snakeStates: initialSnakeStates,
    food: foodPos,
    speed: 100,
    tick: 0,
    playerCount: pCount,
    aliveCount: pCount
  });
}

function leaveRoom() {
  if (roomListener && roomRef) {
    window._dbOff(roomRef, 'value', roomListener);
    roomListener = null;
  }
  // Remove player from room
  if (roomId && myPlayerId) {
    const db = getDb();
    const playerRef = window._dbRef(db, `snake_rooms/${roomId}/players/${myPlayerId}`);
    window._dbRemove(playerRef).catch(()=>{});
    // If host, remove entire room
    if (isHost) {
      window._dbRemove(window._dbRef(db, `snake_rooms/${roomId}`)).catch(()=>{});
    }
  }
  roomId = null; myPlayerId = null; myPlayerIndex = -1; isHost = false; roomRef = null;
  hide('lobby-screen');
  show('menu-screen');
}

// ============================================================
// ========== ONLINE GAME ENGINE ==========
// ============================================================
/*
  Architecture:
  - Host runs the game loop locally and writes state to Firebase every tick
  - Clients read the state and render it
  - All players write their direction input to Firebase
  - Host reads direction inputs and uses them in the next tick
*/

let onlineGameRunning = false;
let onlineInterval = null;
let onlineGameRef = null;
let onlineStateListener = null;
let onlineDirBuffer = {}; // pid -> dir

function startOnlineGame(roomData) {
  if (onlineGameRunning) return;
  onlineGameRunning = true;

  // Stop listening to room for lobby updates
  if (roomListener && roomRef) {
    window._dbOff(roomRef, 'value', roomListener);
    roomListener = null;
  }

  hide('lobby-screen');
  show('game-screen');

  const canvas = document.getElementById('c');
  canvas.width = COLS * SZ;
  canvas.height = ROWS * SZ;

  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('msg').textContent = s('battle');
  document.getElementById('pauseBtn').textContent = s('pause');
  document.getElementById('backBtn').textContent = s('menuBack');

  buildOnlineScoreRow(roomData);

  if (isHost) {
    runOnlineHostLoop(roomData);
  } else {
    runOnlineClientLoop();
  }
}

function buildOnlineScoreRow(roomData) {
  const players = roomData.players || {};
  const entries = Object.entries(players).sort((a,b) => a[1].index - b[1].index);
  document.getElementById('score-row').innerHTML = entries.map(([pid, p]) => {
    const c = PLAYER_COLORS[p.index];
    return `<div class="stat">
      <div class="stat-label" style="color:${c.color}">${p.name}</div>
      <div class="stat-value" style="color:${c.headColor}" id="score-${p.index}">0</div>
    </div>`;
  }).join('');
}

// HOST: runs game loop, writes state
function runOnlineHostLoop(initialData) {
  const db = getDb();
  const players = initialData.players || {};
  const pids = Object.keys(players);

  // Build local snake state from Firebase initial
  const hostSnakes = {};
  pids.forEach(pid => {
    const p = players[pid];
    const st = STARTS[p.index];
    hostSnakes[pid] = {
      body: [{...st.pos},{x:st.pos.x-st.dir.x,y:st.pos.y},{x:st.pos.x-st.dir.x*2,y:st.pos.y}],
      dir: {...st.dir},
      next: {...st.dir},
      alive: true,
      score: 0,
      index: p.index,
      name: p.name,
    };
  });

  let hostFood = initialData.food || {x:10,y:10};
  let hostSpeed = 100;
  let hostAlive = pids.length;
  let totalScore = 0;

  // Listen for direction inputs from all players
  const dirRef = window._dbRef(db, `snake_rooms/${roomId}/inputs`);
  let inputsListener = window._dbOnValue(dirRef, snap => {
    if (!snap.exists()) return;
    const inputs = snap.val();
    Object.entries(inputs).forEach(([pid, dir]) => {
      if (hostSnakes[pid] && hostSnakes[pid].alive) {
        const move = dir;
        if (!(move.x === -hostSnakes[pid].dir.x && move.y === -hostSnakes[pid].dir.y)) {
          hostSnakes[pid].next = move;
        }
      }
    });
  });

  // My own key input
  document.addEventListener('keydown', hostKeyHandler);

  function hostKeyHandler(e) {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    const move = ONLINE_KEYS.keys[e.key];
    if (!move || !hostSnakes[myPlayerId] || !hostSnakes[myPlayerId].alive) return;
    const sn = hostSnakes[myPlayerId];
    if (move.x === -sn.dir.x && move.y === -sn.dir.y) return;
    sn.next = move;
    clearInterval(onlineInterval);
    hostStep();
    onlineInterval = setInterval(hostStep, hostSpeed);
  }

  function hostStep() {
    if (!onlineGameRunning) return;

    // Apply directions
    pids.forEach(pid => {
      if (!hostSnakes[pid].alive) return;
      hostSnakes[pid].dir = {...hostSnakes[pid].next};
    });

    // Calculate new heads
    const newHeads = {};
    pids.forEach(pid => {
      if (!hostSnakes[pid].alive) return;
      const sn = hostSnakes[pid];
      newHeads[pid] = {
        x: (sn.body[0].x + sn.dir.x + COLS) % COLS,
        y: (sn.body[0].y + sn.dir.y + ROWS) % ROWS
      };
    });

    // Self collision
    pids.forEach(pid => {
      if (!hostSnakes[pid].alive) return;
      const h = newHeads[pid];
      if (hostSnakes[pid].body.some(c => c.x===h.x && c.y===h.y)) {
        hostSnakes[pid].alive = false; hostAlive--;
      }
    });

    // Body collision with others
    pids.forEach(pid => {
      if (!hostSnakes[pid].alive) return;
      const h = newHeads[pid];
      pids.forEach(other => {
        if (other === pid || !hostSnakes[other].alive || !hostSnakes[pid].alive) return;
        if (hostSnakes[other].body.some(c => c.x===h.x && c.y===h.y)) {
          hostSnakes[pid].alive = false; hostAlive--;
        }
      });
    });

    // Head-to-head collision
    const alivePids = pids.filter(pid => hostSnakes[pid].alive);
    for (let i=0;i<alivePids.length;i++) for (let j=i+1;j<alivePids.length;j++) {
      const a=alivePids[i], b=alivePids[j];
      if (newHeads[a] && newHeads[b] && newHeads[a].x===newHeads[b].x && newHeads[a].y===newHeads[b].y) {
        hostSnakes[a].alive=false; hostSnakes[b].alive=false; hostAlive-=2;
      }
    }

    // Move & eat
    pids.forEach(pid => {
      if (!hostSnakes[pid].alive) return;
      const h = newHeads[pid];
      hostSnakes[pid].body.unshift(h);
      if (h.x===hostFood.x && h.y===hostFood.y) {
        hostSnakes[pid].score++;
        totalScore++;
        // Re-place food
        const occ = Object.values(hostSnakes).flatMap(sn => sn.body);
        do { hostFood = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
        while (occ.some(c=>c.x===hostFood.x&&c.y===hostFood.y));
        if (totalScore%5===0) {
          hostSpeed = Math.max(50, hostSpeed-10);
          clearInterval(onlineInterval);
          onlineInterval = setInterval(hostStep, hostSpeed);
        }
      } else {
        hostSnakes[pid].body.pop();
      }
    });

    // Serialize state
    const stateToWrite = {
      food: hostFood,
      aliveCount: hostAlive,
    };
    pids.forEach(pid => {
      stateToWrite[`snakeStates/${pid}`] = {
        body: hostSnakes[pid].body,
        alive: hostSnakes[pid].alive,
        score: hostSnakes[pid].score,
        dir: hostSnakes[pid].dir,
        index: hostSnakes[pid].index,
      };
    });

    window._dbUpdate(window._dbRef(db, `snake_rooms/${roomId}`), stateToWrite).catch(()=>{});

    // Render locally (host renders immediately)
    renderOnlineState({
      food: hostFood,
      snakeStates: Object.fromEntries(pids.map(pid => [pid, {
        body: hostSnakes[pid].body,
        alive: hostSnakes[pid].alive,
        score: hostSnakes[pid].score,
        index: hostSnakes[pid].index,
        name: hostSnakes[pid].name,
      }]))
    }, Object.fromEntries(Object.entries(initialData.players).map(([pid,p])=>[pid,p.name])));

    // End check
    const totalPlayers = pids.length;
    if (hostAlive <= (totalPlayers>1?1:0)) {
      clearInterval(onlineInterval); onlineGameRunning=false;
      document.removeEventListener('keydown', hostKeyHandler);
      window._dbOff(dirRef, 'value', inputsListener);

      // Write final state
      const winner = pids.find(pid => hostSnakes[pid].alive);
      window._dbUpdate(window._dbRef(db, `snake_rooms/${roomId}`), {
        state: 'ended',
        winner: winner || null,
        aliveCount: hostAlive,
      }).catch(()=>{});

      setTimeout(() => showOnlineResult(hostSnakes, initialData.players, winner), 400);
    }
  }

  onlineInterval = setInterval(hostStep, hostSpeed);
}

// CLIENT: listens to state, renders
function runOnlineClientLoop() {
  const db = getDb();
  const roomStateRef = window._dbRef(db, `snake_rooms/${roomId}`);

  document.addEventListener('keydown', clientKeyHandler);

  function clientKeyHandler(e) {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    const move = ONLINE_KEYS.keys[e.key];
    if (!move) return;
    // Write input to Firebase
    window._dbUpdate(window._dbRef(db, `snake_rooms/${roomId}/inputs/${myPlayerId}`), move).catch(()=>{});
  }

  onlineStateListener = window._dbOnValue(roomStateRef, snap => {
    if (!snap.exists()) return;
    const data = snap.val();

    if (!data.snakeStates || !data.food) return;

    const players = data.players || {};
    const nameMap = Object.fromEntries(Object.entries(players).map(([pid,p])=>[pid,p.name]));

    renderOnlineState(data, nameMap);

    // Update scores
    Object.entries(data.snakeStates).forEach(([pid, st]) => {
      const el = document.getElementById(`score-${st.index}`);
      if (el) el.textContent = st.score || 0;
    });

    if (data.state === 'ended') {
      window._dbOff(roomStateRef, 'value', onlineStateListener);
      document.removeEventListener('keydown', clientKeyHandler);
      onlineGameRunning = false;
      const snakeStates = data.snakeStates;
      const winner = data.winner;
      setTimeout(() => showOnlineResult(snakeStates, players, winner), 400);
    }
  });
}

function renderOnlineState(data, nameMap) {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  if (!data.snakeStates) return;

  ctx.fillStyle='#0b0c0e'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#1a1a18'; ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(COLS*SZ,r*SZ);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,ROWS*SZ);ctx.stroke();}

  Object.entries(data.snakeStates).forEach(([pid, st]) => {
    const c = PLAYER_COLORS[st.index];
    const body = st.body || [];
    body.forEach((seg, i) => {
      ctx.fillStyle = !st.alive ? '#222' : (i===0 ? c.headColor : c.color);
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(seg.x*SZ+2,seg.y*SZ+2,SZ-4,SZ-4,3);
      else ctx.rect(seg.x*SZ+2,seg.y*SZ+2,SZ-4,SZ-4);
      ctx.fill();
    });
    if (st.alive && body.length > 0) {
      const h = body[0];
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.beginPath();ctx.arc(h.x*SZ+6,h.y*SZ+6,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(h.x*SZ+SZ-6,h.y*SZ+6,2,0,Math.PI*2);ctx.fill();
    }
    // Update score
    const el = document.getElementById(`score-${st.index}`);
    if (el) el.textContent = st.score || 0;
  });

  if (data.food) {
    const f = data.food;
    ctx.fillStyle='#D85A30';
    ctx.beginPath(); ctx.arc(f.x*SZ+SZ/2,f.y*SZ+SZ/2,SZ/2-3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff9966';
    ctx.beginPath(); ctx.arc(f.x*SZ+SZ/2-3,f.y*SZ+SZ/2-3,3,0,Math.PI*2); ctx.fill();
  }
}

function showOnlineResult(snakeStates, players, winnerId) {
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');

  if (winnerId && snakeStates[winnerId]) {
    const wst = snakeStates[winnerId];
    const wp = players[winnerId];
    const c = PLAYER_COLORS[wst.index || 0];
    title.style.color = c.headColor;
    title.textContent = `🏆 ${wp ? wp.name : s('playerNames')[0]} ${s('wins')}`;
    sub.textContent = `${s('finalScore')}: ${wst.score || 0}`;
  } else {
    title.style.color = '#888';
    title.textContent = s('draw');
    sub.textContent = s('drawSub');
  }

  document.getElementById('playAgainBtn').textContent = s('playAgain');
  document.getElementById('result-overlay').classList.add('show');

  let timeLeft = 8;
  const countdown = document.getElementById('result-countdown');
  countdown.textContent = s('goingToLobby').replace('{n}', timeLeft);
  const timer = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      clearInterval(timer);
      document.getElementById('result-overlay').classList.remove('show');
      returnToLobbyAfterGame(players);
    } else {
      countdown.textContent = s('goingToLobby').replace('{n}', timeLeft);
    }
  }, 1000);

  document.getElementById('playAgainBtn').onclick = () => {
    clearInterval(timer);
    document.getElementById('result-overlay').classList.remove('show');
    returnToLobbyAfterGame(players);
  };
}

function returnToLobbyAfterGame(players) {
  onlineGameRunning = false;
  clearInterval(onlineInterval);
  if (onlineStateListener) {
    const db = getDb();
    window._dbOff(window._dbRef(db, `snake_rooms/${roomId}`), 'value', onlineStateListener);
    onlineStateListener = null;
  }

  hide('game-screen');

  if (isHost) {
    // Reset room state back to lobby
    const db = getDb();
    window._dbUpdate(roomRef, {
      state: 'lobby',
      gameStarted: false,
      snakeStates: null,
      food: null,
      winner: null,
      tick: 0,
      inputs: null,
    }).then(() => {
      show('lobby-screen');
      roomListener = window._dbOnValue(roomRef, (snap) => {
        if (!snap.exists()) { leaveRoom(); return; }
        currentRoomData = snap.val();
        renderLobby(currentRoomData);
        if (currentRoomData.state === 'playing' && currentRoomData.gameStarted) {
          startOnlineGame(currentRoomData);
        }
      });
    }).catch(() => { goMenu(); });
  } else {
    // Client: show lobby and re-attach listener
    show('lobby-screen');
    roomListener = window._dbOnValue(roomRef, (snap) => {
      if (!snap.exists()) { leaveRoom(); return; }
      currentRoomData = snap.val();
      renderLobby(currentRoomData);
      if (currentRoomData.state === 'playing' && currentRoomData.gameStarted) {
        startOnlineGame(currentRoomData);
      }
    });
  }
}

function cleanupOnlineGame() {
  onlineGameRunning = false;
  clearInterval(onlineInterval);
  if (onlineStateListener) {
    const db = getDb();
    window._dbOff(window._dbRef(db, `snake_rooms/${roomId}`), 'value', onlineStateListener);
    onlineStateListener = null;
  }
  // Remove room only when actually leaving (not play again)
  if (isHost && roomId) {
    const db = getDb();
    window._dbRemove(window._dbRef(db, `snake_rooms/${roomId}`)).catch(()=>{});
  }
}

// ============================================================
// ========== LOCAL GAME ENGINE ==========
// ============================================================
function startLocalGame() {
  hide('menu-screen');
  show('game-screen');
  document.getElementById('result-overlay').classList.remove('show');
  const canvas = document.getElementById('c');
  canvas.width = COLS * SZ; canvas.height = ROWS * SZ;

  snakes = Array.from({length: numPlayers}, (_, i) => {
    const st = STARTS[i], c = PLAYER_COLORS[i], k = LOCAL_KEYS[i];
    return {
      body: [{x:st.pos.x,y:st.pos.y},{x:st.pos.x-st.dir.x,y:st.pos.y},{x:st.pos.x-st.dir.x*2,y:st.pos.y}],
      dir: {...st.dir}, next: {...st.dir},
      color: c.color, headColor: c.headColor, keys: k.keys,
      name: s('playerNames')[i], alive: true, idx: i,
    };
  });

  scores = Array(numPlayers).fill(0);
  aliveCount = numPlayers; speed = 100; running = true; paused = false;
  placeFood(); buildLocalScoreRow();
  document.getElementById('msg').textContent = numPlayers > 1 ? s('battle') : s('goodLuck');
  document.getElementById('pauseBtn').textContent = s('pause');
  document.getElementById('backBtn').textContent = s('menuBack');
  clearInterval(interval); interval = setInterval(localStep, speed);
  localDraw();
}

function buildLocalScoreRow() {
  document.getElementById('score-row').innerHTML = snakes.map((sn,i) =>
    `<div class="stat">
      <div class="stat-label" style="color:${sn.color}">${s('playerNames')[i]}</div>
      <div class="stat-value" style="color:${sn.headColor}" id="score-${i}">0</div>
    </div>`
  ).join('');
}

function placeFood() {
  const occ = snakes.flatMap(sn => sn.body);
  do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (occ.some(c => c.x===food.x && c.y===food.y));
}

function localStep() {
  const newHeads = snakes.map(sn => {
    if (!sn.alive) return null;
    sn.dir = {...sn.next};
    return { x:(sn.body[0].x+sn.dir.x+COLS)%COLS, y:(sn.body[0].y+sn.dir.y+ROWS)%ROWS };
  });

  snakes.forEach((sn, i) => {
    if (!sn.alive) return;
    const h = newHeads[i];
    if (sn.body.some(c=>c.x===h.x&&c.y===h.y)){sn.alive=false;aliveCount--;return;}
    snakes.forEach((other,j)=>{
      if(i===j||!other.alive||!sn.alive)return;
      if(other.body.some(c=>c.x===h.x&&c.y===h.y)){sn.alive=false;aliveCount--;}
    });
  });

  for(let i=0;i<snakes.length;i++) for(let j=i+1;j<snakes.length;j++){
    if(!snakes[i].alive||!snakes[j].alive)continue;
    if(newHeads[i]&&newHeads[j]&&newHeads[i].x===newHeads[j].x&&newHeads[i].y===newHeads[j].y){
      snakes[i].alive=false;snakes[j].alive=false;aliveCount-=2;
    }
  }

  snakes.forEach((sn,i)=>{
    if(!sn.alive)return;
    const h=newHeads[i];
    sn.body.unshift(h);
    if(h.x===food.x&&h.y===food.y){
      scores[i]++;document.getElementById(`score-${i}`).textContent=scores[i];
      placeFood();
      const total=scores.reduce((a,b)=>a+b,0);
      if(total%5===0){speed=Math.max(50,speed-10);clearInterval(interval);interval=setInterval(localStep,speed);}
    }else{sn.body.pop();}
  });

  localDraw();
  if(aliveCount<=(numPlayers>1?1:0)){clearInterval(interval);running=false;setTimeout(showLocalResult,400);}
}

function localDraw() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle='#0b0c0e'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#1a1a18'; ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(COLS*SZ,r*SZ);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,ROWS*SZ);ctx.stroke();}
  snakes.forEach(sn=>{
    sn.body.forEach((seg,i)=>{
      ctx.fillStyle=!sn.alive?'#222':(i===0?sn.headColor:sn.color);
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(seg.x*SZ+2,seg.y*SZ+2,SZ-4,SZ-4,3);
      else ctx.rect(seg.x*SZ+2,seg.y*SZ+2,SZ-4,SZ-4);
      ctx.fill();
    });
    if(sn.alive){
      const h=sn.body[0];ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.beginPath();ctx.arc(h.x*SZ+6,h.y*SZ+6,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(h.x*SZ+SZ-6,h.y*SZ+6,2,0,Math.PI*2);ctx.fill();
    }
  });
  ctx.fillStyle='#D85A30';
  ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff9966';
  ctx.beginPath();ctx.arc(food.x*SZ+SZ/2-3,food.y*SZ+SZ/2-3,3,0,Math.PI*2);ctx.fill();
}

function showLocalResult() {
  const title=document.getElementById('result-title');
  const sub=document.getElementById('result-sub');
  if(numPlayers===1){
    title.style.color='#E24B4A';title.textContent=s('gameOver');
    sub.textContent=`${s('finalScore')}: ${scores[0]}`;
  } else {
    const winner=snakes.find(sn=>sn.alive);
    if(winner){
      title.style.color=winner.headColor;
      title.textContent=`🏆 ${s('playerNames')[winner.idx]} ${s('wins')}`;
      sub.textContent=`${s('finalScore')}: ${scores[winner.idx]}`;
    } else {
      title.style.color='#888';title.textContent=s('draw');sub.textContent=s('drawSub');
    }
  }
  document.getElementById('playAgainBtn').textContent=s('playAgain');
  document.getElementById('result-overlay').classList.add('show');
  let timeLeft=5;
  const countdown=document.getElementById('result-countdown');
  countdown.textContent=s('goingToMenu').replace('{n}',timeLeft);
  const timer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){clearInterval(timer);document.getElementById('result-overlay').classList.remove('show');goMenu();}
    else countdown.textContent=s('goingToMenu').replace('{n}',timeLeft);
  },1000);
  document.getElementById('playAgainBtn').onclick=()=>{clearInterval(timer);startLocalGame();};
}

// ============================================================
// Common controls
// ============================================================
function togglePause() {
  if (gameMode === 'online') return; // no pause in online
  if (!running) return;
  if (paused) {
    interval = setInterval(localStep, speed); paused = false;
    document.getElementById('pauseBtn').textContent = s('pause');
    document.getElementById('msg').textContent = '';
  } else {
    clearInterval(interval); paused = true;
    document.getElementById('pauseBtn').textContent = s('resume');
    document.getElementById('msg').textContent = s('paused');
  }
}

function goMenu() {
  clearInterval(interval); running = false;
  cleanupOnlineGame();
  hide('game-screen');
  hide('lobby-screen');
  show('menu-screen');
  document.getElementById('result-overlay').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (gameMode !== 'local' || !running || paused) return;
  let changed = false;
  snakes.forEach(sn => {
    if (!sn.alive) return;
    const move = sn.keys[e.key];
    if (!move || (move.x===-sn.dir.x && move.y===-sn.dir.y)) return;
    sn.next = move;
    changed = true;
  });
  if (changed) {
    clearInterval(interval);
    localStep();
    interval = setInterval(localStep, speed);
  }
});

// ============================================================
// Init
// ============================================================
selectMode('local');
applyLang();
</script>
