<!DOCTYPE html>
<html lang="he" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק זיכרון</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a0533; --surface:#2d1055; --card-back:#6c2eb9;
    --accent:#ff6bff; --accent2:#ffe44d; --accent3:#4dffc3;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); font-family:'Varela Round',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:16px 14px 40px;
    background-image:
      radial-gradient(ellipse at 20% 10%,#4a0080 0%,transparent 50%),
      radial-gradient(ellipse at 80% 80%,#001a4d 0%,transparent 50%);
  }

  /* ── Util bar ── */
  .util-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:480px;margin-bottom:14px;gap:8px;flex-wrap:wrap;}
  .home-btn{font-family:'Fredoka One',cursive;font-size:.8rem;color:#fff;background:#2d1055;border:2px solid #6c2eb9;border-radius:50px;padding:6px 13px;cursor:pointer;text-decoration:none;transition:transform .13s;white-space:nowrap;}
  .home-btn:hover{transform:scale(1.06);}
  .lang-toggle{display:flex;background:#2d1055;border:2px solid #6c2eb9;border-radius:50px;overflow:hidden;}
  .lang-btn{font-family:'Fredoka One',cursive;font-size:.8rem;color:#aaa;background:transparent;border:none;padding:6px 13px;cursor:pointer;transition:background .15s,color .15s;}
  .lang-btn.active{background:var(--accent);color:var(--bg);}

  /* ── Screens ── */
  .screen{display:none;flex-direction:column;align-items:center;width:100%;}
  .screen.active{display:flex;}

  /* ── Setup ── */
  .logo{font-size:3.4rem;margin-bottom:8px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  h1{font-family:'Fredoka One',cursive;color:var(--accent);font-size:clamp(2rem,6vw,3.5rem);letter-spacing:3px;text-shadow:0 0 22px rgba(255,107,255,.7),0 4px 0 #7a007a;margin-bottom:5px;}
  .tagline{color:var(--accent3);font-size:.95rem;margin-bottom:26px;opacity:.85;}
  .card-box{background:var(--surface);border:2px solid #4a1a80;border-radius:24px;padding:22px 24px;width:100%;max-width:420px;box-shadow:0 12px 48px rgba(108,46,185,.4);display:flex;flex-direction:column;gap:16px;}
  .section-label{font-size:.65rem;color:var(--accent3);text-transform:uppercase;letter-spacing:2px;margin-bottom:7px;}
  .pill-group{display:flex;gap:7px;flex-wrap:wrap;}
  .pill{font-family:'Fredoka One',cursive;font-size:.88rem;border:2.5px solid transparent;border-radius:50px;padding:7px 14px;cursor:pointer;transition:transform .13s,box-shadow .13s;outline:none;display:flex;flex-direction:column;align-items:center;flex:1;}
  .pill .badge{font-family:'Varela Round',sans-serif;font-size:.5rem;opacity:.75;margin-top:2px;}
  .pill.easy{background:#1a4d2e;color:#4dffc3;border-color:#4dffc3;}
  .pill.medium{background:#4d3a00;color:var(--accent2);border-color:var(--accent2);}
  .pill.hard{background:#4d001a;color:#ff6b8a;border-color:#ff6b8a;}
  .pill.easy.active{background:#4dffc3;color:#0a2e1a;box-shadow:0 0 12px rgba(77,255,195,.5);}
  .pill.medium.active{background:var(--accent2);color:#2e2400;box-shadow:0 0 12px rgba(255,228,77,.5);}
  .pill.hard.active{background:#ff6b8a;color:#2e0010;box-shadow:0 0 12px rgba(255,107,138,.5);}
  .pill.num{background:#2d1055;color:#fff;border-color:#6c2eb9;}
  .pill.num.active{background:var(--accent);color:var(--bg);border-color:var(--accent);box-shadow:0 0 12px rgba(255,107,255,.5);}
  .pill:hover{transform:scale(1.07);}
  .pill:active{transform:scale(.95);}
  .names-section{display:flex;flex-direction:column;gap:8px;}
  .name-row{display:flex;align-items:center;gap:8px;}
  .name-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .name-input{flex:1;background:#1a0533;border:2px solid #4a1a80;border-radius:12px;color:#fff;font-family:'Varela Round',sans-serif;font-size:.88rem;padding:6px 12px;outline:none;transition:border-color .2s;}
  .name-input:focus{border-color:var(--accent);}
  .start-btn{font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50px;padding:13px;cursor:pointer;width:100%;box-shadow:0 6px 22px rgba(255,107,255,.45);transition:transform .13s,box-shadow .13s;letter-spacing:1px;}
  .start-btn:hover{transform:scale(1.04);box-shadow:0 10px 28px rgba(255,107,255,.65);}
  .start-btn:active{transform:scale(.97);}

  /* ── Online section ── */
  .divider{display:flex;align-items:center;gap:10px;color:#6c2eb9;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#4a1a80;}
  .online-box{display:flex;flex-direction:column;gap:10px;}
  .online-row{display:flex;gap:8px;}
  .room-input{flex:1;background:#1a0533;border:2px solid #4a1a80;border-radius:12px;color:#fff;font-family:'Fredoka One',cursive;font-size:1rem;padding:8px 14px;outline:none;transition:border-color .2s;letter-spacing:3px;text-transform:uppercase;text-align:center;}
  .room-input::placeholder{color:#5a3a7a;letter-spacing:1px;font-size:.85rem;font-family:'Varela Round',sans-serif;text-transform:none;}
  .room-input:focus{border-color:var(--accent3);}
  .online-btn{font-family:'Fredoka One',cursive;font-size:.9rem;border:none;border-radius:50px;padding:9px 18px;cursor:pointer;transition:transform .13s,box-shadow .13s;white-space:nowrap;}
  .online-btn.create{background:linear-gradient(135deg,var(--accent3),#00c890);color:#0a2e1a;}
  .online-btn.join{background:linear-gradient(135deg,#6bbaff,#4488ff);color:#001a4d;}
  .online-btn:hover{transform:scale(1.05);}
  .online-btn:active{transform:scale(.96);}

  /* ── Lobby screen ── */
  .lobby-box{background:var(--surface);border:2px solid #4a1a80;border-radius:24px;padding:28px 24px;width:100%;max-width:400px;text-align:center;display:flex;flex-direction:column;gap:14px;align-items:center;}
  .room-code-display{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--accent2);letter-spacing:10px;text-shadow:0 0 16px rgba(255,228,77,.5);}
  .room-share{font-size:.82rem;color:var(--accent3);opacity:.8;}
  .lobby-players{display:flex;flex-direction:column;gap:8px;width:100%;}
  .lobby-player{background:#1a0533;border:2px solid #4a1a80;border-radius:14px;padding:8px 16px;display:flex;align-items:center;gap:10px;font-family:'Fredoka One',cursive;font-size:.95rem;}
  .lobby-player .dot{width:10px;height:10px;border-radius:50%;}
  .lobby-player.you{border-color:var(--accent);}
  .lobby-status{font-size:.82rem;color:#aaa;}
  .lobby-btn{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50px;padding:12px 36px;cursor:pointer;box-shadow:0 5px 18px rgba(255,107,255,.4);transition:transform .13s;letter-spacing:1px;}
  .lobby-btn:hover{transform:scale(1.05);}
  .lobby-btn:disabled{opacity:.4;cursor:default;transform:none;}
  .cancel-btn{font-family:'Fredoka One',cursive;font-size:.85rem;color:#aaa;background:transparent;border:2px solid #4a1a80;border-radius:50px;padding:7px 20px;cursor:pointer;transition:transform .13s;}
  .cancel-btn:hover{transform:scale(1.05);}

  /* ── Game screen ── */
  .top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:520px;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .back-btn{font-family:'Fredoka One',cursive;font-size:.82rem;color:var(--accent3);background:var(--surface);border:2px solid #4a1a80;border-radius:50px;padding:6px 13px;cursor:pointer;transition:transform .13s;}
  .back-btn:hover{transform:scale(1.06);}
  .diff-badge{font-family:'Fredoka One',cursive;font-size:.8rem;padding:5px 13px;border-radius:50px;border:2px solid;}
  .diff-badge.easy{color:#4dffc3;border-color:#4dffc3;background:#1a4d2e;}
  .diff-badge.medium{color:var(--accent2);border-color:var(--accent2);background:#4d3a00;}
  .diff-badge.hard{color:#ff6b8a;border-color:#ff6b8a;background:#4d001a;}
  .online-indicator{font-family:'Fredoka One',cursive;font-size:.78rem;color:var(--accent3);background:#0a2e1a;border:1px solid var(--accent3);border-radius:50px;padding:4px 12px;display:flex;align-items:center;gap:5px;}
  .online-dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Scoreboard */
  .scoreboard{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-bottom:11px;width:100%;max-width:520px;}
  .player-card{background:var(--surface);border:3px solid #6c2eb9;border-radius:16px;padding:6px 12px;text-align:center;flex:1;min-width:68px;max-width:108px;transition:border-color .2s,box-shadow .2s,transform .2s;position:relative;}
  .player-card.active-player{border-color:var(--accent2);box-shadow:0 0 16px rgba(255,228,77,.45);transform:translateY(-4px);}
  .player-card .p-name{font-family:'Fredoka One',cursive;font-size:.78rem;color:#aaa;}
  .player-card.active-player .p-name{color:var(--accent2);}
  .player-card .p-score{font-family:'Fredoka One',cursive;font-size:1.65rem;}
  .p-turn-arrow{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:.95rem;opacity:0;transition:opacity .2s;}
  .player-card.active-player .p-turn-arrow{opacity:1;}
  .hud{display:flex;gap:12px;margin-bottom:11px;flex-wrap:wrap;justify-content:center;}
  .stat{background:var(--surface);border:2px solid var(--card-back);border-radius:13px;padding:6px 14px;text-align:center;min-width:84px;}
  .stat-label{font-size:.63rem;color:var(--accent3);text-transform:uppercase;letter-spacing:1px;}
  .stat-value{font-family:'Fredoka One',cursive;font-size:1.45rem;color:var(--accent2);}
  .turn-banner{font-family:'Fredoka One',cursive;font-size:.95rem;margin-bottom:10px;color:var(--accent2);min-height:1.3em;text-align:center;}

  /* Board */
  .board{display:grid;gap:9px;width:100%;}
  .card{aspect-ratio:1;cursor:pointer;perspective:600px;}
  .card.disabled{pointer-events:none;}
  .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,2,.6,1);border-radius:13px;}
  .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
  .card-face{position:absolute;width:100%;height:100%;border-radius:13px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;user-select:none;}
  .card-back{background:linear-gradient(135deg,var(--card-back),#9b3dff);border:3px solid rgba(255,107,255,.35);box-shadow:0 5px 13px rgba(108,46,185,.45);}
  .card-back::after{content:'✦';opacity:.3;font-size:1.4em;}
  .card-front{background:#f7f0ff;transform:rotateY(180deg);border:3px solid var(--accent2);box-shadow:0 5px 16px rgba(108,46,185,.3);}
  .card.matched .card-front{animation:pop .35s ease;}
  .card.matched.p0 .card-front{background:linear-gradient(135deg,#ffe8f7,#ffb3f0);border-color:#ff6bff;}
  .card.matched.p1 .card-front{background:linear-gradient(135deg,#e8f0ff,#b3c8ff);border-color:#6bbaff;}
  .card.matched.p2 .card-front{background:linear-gradient(135deg,#e8fff8,#b3ffe8);border-color:#4dffc3;}
  .card.matched.p3 .card-front{background:linear-gradient(135deg,#fffbe8,#ffedb3);border-color:#ffe44d;}
  .card:not(.flipped):not(.matched):not(.disabled):hover .card-inner{transform:rotateY(10deg) scale(1.06);}
  @keyframes pop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.18)}100%{transform:rotateY(180deg) scale(1)}}
  .btn{margin-top:16px;font-family:'Fredoka One',cursive;font-size:1rem;color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50px;padding:11px 30px;cursor:pointer;box-shadow:0 5px 18px rgba(255,107,255,.4);transition:transform .13s;letter-spacing:1px;}
  .btn:hover{transform:scale(1.06);}
  .btn:active{transform:scale(.97);}

  /* Win overlay */
  .win-banner{display:none;position:fixed;inset:0;background:rgba(10,0,25,.93);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px;animation:fadeIn .3s ease;padding:22px;text-align:center;}
  .win-banner.show{display:flex;}
  .win-title{font-family:'Fredoka One',cursive;font-size:clamp(1.9rem,6vw,3.8rem);color:var(--accent2);text-shadow:0 0 26px rgba(255,228,77,.8);}
  .win-winner{font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,3.5vw,1.9rem);}
  .win-scores{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:3px;}
  .win-score-item{background:var(--surface);border-radius:13px;padding:6px 14px;font-size:.9rem;border:2px solid transparent;}
  .stars{font-size:2.1rem;letter-spacing:6px;animation:spin .9s ease;}
  .win-btns{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;}
  .replay-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-top:16px;}
  .replay-btn{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50px;padding:11px 32px;cursor:pointer;letter-spacing:1px;position:relative;z-index:1;transition:transform .13s;}
  .replay-btn:hover{transform:scale(1.06);}
  .countdown-ring{position:absolute;inset:-5px;border-radius:50px;background:conic-gradient(var(--accent3) var(--pct,100%),transparent 0%);z-index:0;}
  .btn-outline{margin-top:16px;font-family:'Fredoka One',cursive;font-size:.92rem;color:var(--accent3);background:var(--surface);border:2px solid var(--accent3);border-radius:50px;padding:10px 22px;cursor:pointer;transition:transform .13s;letter-spacing:1px;text-decoration:none;display:inline-block;}
  .btn-outline:hover{transform:scale(1.05);}
  .btn-home-win{margin-top:16px;font-family:'Fredoka One',cursive;font-size:.92rem;color:#fff;background:var(--surface);border:2px solid #6c2eb9;border-radius:50px;padding:10px 22px;cursor:pointer;transition:transform .13s;letter-spacing:1px;text-decoration:none;display:inline-block;}
  .btn-home-win:hover{transform:scale(1.05);}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d1055;color:#fff;font-family:'Fredoka One',cursive;font-size:.9rem;padding:10px 22px;border-radius:50px;border:2px solid var(--accent3);box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .3s;z-index:200;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{0%{transform:scale(0) rotate(-180deg)}100%{transform:scale(1) rotate(0)}}
</style>
</head>
<body>

<!-- Util bar -->
<div class="util-bar">
  <a class="home-btn" href="https://arnonmaya.github.io/games/">🏠 <span data-t="home">חזרה לדף הבית</span></a>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnHe" onclick="setLang('he')">עב</button>
    <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- ══ SETUP SCREEN ══ -->
<div class="screen active" id="setupScreen">
  <div class="logo">🧠</div>
  <h1 data-t="title">משחק זיכרון</h1>
  <p class="tagline" data-t="tagline">מצא את כל הזוגות!</p>

  <div class="card-box">
    <!-- Difficulty -->
    <div>
      <p class="section-label" data-t="difficulty">רמת קושי</p>
      <div class="pill-group" id="diffGroup">
        <button class="pill easy active" onclick="setDiff('easy')"><span data-t="easy">😊 קל</span><span class="badge" data-t="easy_badge">6 זוגות</span></button>
        <button class="pill medium" onclick="setDiff('medium')"><span data-t="medium">🤔 בינוני</span><span class="badge" data-t="medium_badge">8 זוגות</span></button>
        <button class="pill hard" onclick="setDiff('hard')"><span data-t="hard">🔥 קשה</span><span class="badge" data-t="hard_badge">10 זוגות</span></button>
      </div>
    </div>

    <!-- Local players -->
    <div>
      <p class="section-label" data-t="num_players">מספר שחקנים (מקומי)</p>
      <div class="pill-group" id="playerGroup">
        <button class="pill num active" onclick="setPlayers(1)">1 🧑</button>
        <button class="pill num" onclick="setPlayers(2)">2 🧑🧑</button>
        <button class="pill num" onclick="setPlayers(3)">3 👨‍👩‍👦</button>
        <button class="pill num" onclick="setPlayers(4)">4 👨‍👩‍👧‍👦</button>
      </div>
    </div>
    <div class="names-section" id="namesSection"></div>
    <button class="start-btn" onclick="startLocalGame()" data-t="start">🚀 התחל משחק</button>

    <!-- Online divider -->
    <div class="divider" data-t="or_online">— או שחק אונליין —</div>

    <!-- Online section -->
    <div class="online-box">
      <p class="section-label" data-t="online_label">שחק עם חברים ממחשבים אחרים</p>
      <div style="display:flex;gap:8px;">
        <input class="name-input" id="myOnlineName" maxlength="14" style="flex:1;" data-placeholder-t="your_name">
      </div>
      <div class="online-row">
        <button class="online-btn create" onclick="createRoom()" data-t="create_room">🎮 צור חדר</button>
        <input class="room-input" id="joinRoomInput" maxlength="4" data-placeholder-t="room_code">
        <button class="online-btn join" onclick="joinRoom()" data-t="join_room">🚪 הצטרף</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ LOBBY SCREEN ══ -->
<div class="screen" id="lobbyScreen">
  <div class="lobby-box">
    <div class="logo" style="font-size:2.5rem;margin-bottom:0;">🎮</div>
    <h1 style="font-size:1.6rem;" data-t="waiting_room">חדר המתנה</h1>
    <div>
      <p class="room-share" data-t="share_code">שתפו את הקוד עם חבריכם:</p>
      <div class="room-code-display" id="lobbyRoomCode">----</div>
    </div>
    <div class="lobby-players" id="lobbyPlayers"></div>
    <p class="lobby-status" id="lobbyStatus"></p>
    <button class="lobby-btn" id="startOnlineBtn" onclick="startOnlineGame()" disabled data-t="start_game">▶ התחל משחק</button>
    <button class="cancel-btn" onclick="leaveRoom()" data-t="leave_room">← עזוב חדר</button>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div class="screen" id="gameScreen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()" data-t="settings">← הגדרות</button>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="diff-badge" id="diffBadge"></div>
      <div class="online-indicator" id="onlineIndicator" style="display:none;"><div class="online-dot"></div><span data-t="online_live">אונליין</span></div>
    </div>
  </div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="hud" id="hud">
    <div class="stat"><div class="stat-label" data-t="tries">ניסיונות</div><div class="stat-value" id="moves">0</div></div>
    <div class="stat"><div class="stat-label" data-t="pairs_label">זוגות</div><div class="stat-value" id="pairs">0/0</div></div>
    <div class="stat"><div class="stat-label" data-t="time">זמן</div><div class="stat-value" id="timer">0:00</div></div>
  </div>
  <div class="turn-banner" id="turnBanner"></div>
  <div class="board" id="board"></div>
  <button class="btn" onclick="requestNewGame()" data-t="new_game">🔄 משחק חדש</button>
</div>

<!-- ══ WIN OVERLAY ══ -->
<div class="win-banner" id="winBanner">
  <div class="stars" id="winStars">🎉</div>
  <div class="win-title" id="winTitle"></div>
  <div class="win-winner" id="winWinner"></div>
  <div class="win-scores" id="winScores"></div>
  <div class="win-btns">
    <div class="replay-wrap" id="replayWrap">
      <div class="countdown-ring" id="countdownRing"></div>
      <button class="replay-btn" id="replayBtn" onclick="onReplayClick()">🔄 <span id="replayLabel">שחק שוב</span> (<span id="countdownNum">5</span>)</button>
    </div>
    <button class="btn-outline" onclick="cancelCountdownAndBack()" data-t="settings_btn">⚙️ הגדרות</button>
    <a class="btn-home-win" href="https://arnonmaya.github.io/games/" data-t="home_win">🏠 דף הבית</a>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">

let lang='he';
function t(key,vars){
  let s=T[lang][key]||key;
  if(vars) Object.keys(vars).forEach(k=>s=s.replace('{'+k+'}',vars[k]));
  return s;
}
function setLang(l){
  lang=l;
  document.getElementById('htmlRoot').lang=l;
  document.getElementById('htmlRoot').dir=l==='he'?'rtl':'ltr';
  document.getElementById('btnHe').classList.toggle('active',l==='he');
  document.getElementById('btnEn').classList.toggle('active',l==='en');
  document.querySelectorAll('[data-t]').forEach(el=>{const k=el.getAttribute('data-t');if(T[l][k])el.textContent=T[l][k];});
  document.querySelectorAll('[data-placeholder-t]').forEach(el=>{const k=el.getAttribute('data-placeholder-t');if(T[l][k])el.placeholder=T[l][k];});
  renderNameInputs(); renderScoreboard(); updateTurnBanner();
  const rl=document.getElementById('replayLabel'); if(rl) rl.textContent=t('play_again_short');
}

/* ══════════════════════════════════════
   GAME CONFIG
══════════════════════════════════════ */
const ALL_EMOJIS=['🦊','🐙','🦄','🌈','🍕','🎸','🚀','🌸','🦋','🍦'];
const PLAYER_COLORS=['#ff6bff','#6bbaff','#4dffc3','#ffe44d'];
const LEVELS={
  easy:{pairs:6,cols:3,star3:10,star2:14},
  medium:{pairs:8,cols:4,star3:14,star2:20},
  hard:{pairs:10,cols:4,star3:18,star2:26},
};

let difficulty='easy', numPlayers=1, playerNames=[];
let flipped=[], matched=0, moves=0, lock=false;
let currentPlayer=0, scores=[];
let timerInterval, seconds=0, started=false;
let countdownInterval=null;
const COUNTDOWN_SEC=5;

// Online state
let isOnline=false, myPlayerId=null, myRoomCode=null, amHost=false;
let roomRef=null, roomListener=null;
let onlinePlayers=[], myOnlineIndex=0;

function playerName(i){return playerNames[i]||(t('player')+' '+(i+1));}

/* ══════════════════════════════════════
   SETUP
══════════════════════════════════════ */
function setDiff(d){
  difficulty=d;
  document.querySelectorAll('#diffGroup .pill').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#diffGroup .pill')[['easy','medium','hard'].indexOf(d)].classList.add('active');
}
function setPlayers(n){
  numPlayers=n;
  document.querySelectorAll('#playerGroup .pill').forEach((b,i)=>b.classList.toggle('active',i===n-1));
  renderNameInputs();
}
function renderNameInputs(){
  const sec=document.getElementById('namesSection');
  if(numPlayers===1){sec.innerHTML='';return;}
  sec.innerHTML='<p class="section-label">'+t('num_players')+'</p>'+
    Array.from({length:numPlayers},(_,i)=>`
      <div class="name-row">
        <div class="name-dot" style="background:${PLAYER_COLORS[i]}"></div>
        <input class="name-input" id="nameIn${i}" maxlength="14"
               placeholder="${t('player')} ${i+1}" value="${playerNames[i]||t('player')+' '+(i+1)}">
      </div>`).join('');
}
function startLocalGame(){
  playerNames=Array.from({length:numPlayers},(_,i)=>{
    const el=document.getElementById('nameIn'+i);
    return el?el.value.trim()||(t('player')+' '+(i+1)):(t('player')+' '+(i+1));
  });
  isOnline=false;
  showScreen('gameScreen');
  initGame();
}
function goBack(){
  clearInterval(timerInterval);
  if(isOnline) leaveRoom();
  document.getElementById('winBanner').classList.remove('show');
  showScreen('setupScreen');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════════════════════════════
   ONLINE – ROOM MANAGEMENT
══════════════════════════════════════ */
function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}
function genPlayerId(){return Math.random().toString(36).substr(2,8);}

async function createRoom(){
  if(!window._firebaseReady){showToast('Firebase loading…');return;}
  const name=document.getElementById('myOnlineName').value.trim()||t('player')+' 1';
  myPlayerId=genPlayerId();
  myRoomCode=genCode();
  amHost=true;
  const rRef=window._ref(window._db,'rooms/'+myRoomCode);
  await window._set(rRef,{
    host:myPlayerId,
    difficulty,
    status:'lobby',
    players:{[myPlayerId]:{name,index:0,score:0,connected:true}},
  });
  roomRef=rRef;
  listenToRoom();
  document.getElementById('lobbyRoomCode').textContent=myRoomCode;
  showScreen('lobbyScreen');
  showToast(t('room_created')+' '+myRoomCode);
}

async function joinRoom(){
  if(!window._firebaseReady){showToast('Firebase loading…');return;}
  const code=document.getElementById('joinRoomInput').value.trim().toUpperCase();
  if(!code||code.length<2){showToast(t('room_not_found'));return;}
  const name=document.getElementById('myOnlineName').value.trim()||t('player')+' 1';
  const rRef=window._ref(window._db,'rooms/'+code);
  const snap=await window._get(rRef);
  if(!snap.exists()){showToast(t('room_not_found'));return;}
  const data=snap.val();
  const playerCount=Object.keys(data.players||{}).length;
  if(playerCount>=4){showToast(t('room_full'));return;}
  myPlayerId=genPlayerId();
  myRoomCode=code;
  amHost=false;
  await window._update(window._ref(window._db,'rooms/'+code+'/players/'+myPlayerId),
    {name,index:playerCount,score:0,connected:true});
  roomRef=rRef;
  listenToRoom();
  document.getElementById('lobbyRoomCode').textContent=code;
  showScreen('lobbyScreen');
}

function listenToRoom(){
  if(roomListener){window._off(roomRef,roomListener);}
  roomListener=window._onValue(roomRef,snap=>{
    if(!snap.exists()){handleRoomDeleted();return;}
    const data=snap.val();
    handleRoomUpdate(data);
  });
}

function handleRoomUpdate(data){
  if(!data) return;
  const players=data.players||{};
  onlinePlayers=Object.entries(players).sort((a,b)=>a[1].index-b[1].index).map(([id,p])=>({id,...p}));
  myOnlineIndex=onlinePlayers.findIndex(p=>p.id===myPlayerId);

  // Lobby screen
  if(data.status==='lobby'){
    renderLobbyPlayers(onlinePlayers);
    const n=onlinePlayers.length;
    const statusEl=document.getElementById('lobbyStatus');
    if(n<2) statusEl.textContent=t('waiting_for',{n});
    else statusEl.textContent=t('enough_players',{n});
    const startBtn=document.getElementById('startOnlineBtn');
    if(amHost && n>=2) startBtn.disabled=false;
    else startBtn.disabled=true;
  }

  // Game started
  if(data.status==='playing' && document.getElementById('lobbyScreen').classList.contains('active')){
    launchOnlineGame(data);
  }

  // Game state sync (for non-host)
  if(data.status==='playing' && document.getElementById('gameScreen').classList.contains('active')){
    syncGameState(data);
  }

  // New game requested
  if(data.status==='lobby' && document.getElementById('gameScreen').classList.contains('active')){
    // Host restarted game
    document.getElementById('winBanner').classList.remove('show');
    launchOnlineGame(data);
  }
}

function handleRoomDeleted(){
  showToast(t('player_left'));
  leaveRoom();
}

function renderLobbyPlayers(players){
  const el=document.getElementById('lobbyPlayers');
  el.innerHTML=players.map((p,i)=>`
    <div class="lobby-player${p.id===myPlayerId?' you':''}">
      <div class="dot" style="background:${PLAYER_COLORS[i]}"></div>
      <span style="color:${PLAYER_COLORS[i]};font-family:'Fredoka One',cursive">${p.name}</span>
      ${p.id===myPlayerId?'<span style="margin-right:auto;font-size:.7rem;color:var(--accent3);">👈 אתה</span>':''}
    </div>`).join('');
}

async function startOnlineGame(){
  if(!amHost) return;
  // Generate shuffled cards
  const lvl=LEVELS[difficulty];
  const emojis=ALL_EMOJIS.slice(0,lvl.pairs);
  const cards=[...emojis,...emojis].sort(()=>Math.random()-.5);
  await window._update(roomRef,{
    status:'playing',
    difficulty,
    cards:cards.join(','),
    currentPlayer:0,
    moves:0,
    matched:0,
    scores:Object.fromEntries(onlinePlayers.map(p=>[p.id,0])),
    flipped:'',
    matchedCards:'',
  });
}

function launchOnlineGame(data){
  isOnline=true;
  difficulty=data.difficulty||difficulty;
  playerNames=onlinePlayers.map(p=>p.name);
  numPlayers=onlinePlayers.length;
  scores=onlinePlayers.map(p=>(data.scores&&data.scores[p.id])||0);
  showScreen('gameScreen');
  document.getElementById('onlineIndicator').style.display='flex';
  document.getElementById('hud').style.display='none';
  buildBoardFromData(data);
}

function syncGameState(data){
  if(!data.cards) return;
  const players=data.players||{};
  onlinePlayers=Object.entries(players).sort((a,b)=>a[1].index-b[1].index).map(([id,p])=>({id,...p}));
  playerNames=onlinePlayers.map(p=>p.name);
  numPlayers=onlinePlayers.length;
  scores=onlinePlayers.map(p=>(data.scores&&data.scores[p.id])||0);
  currentPlayer=data.currentPlayer||0;
  matched=data.matched||0;
  moves=data.moves||0;

  // Sync flipped and matched cards
  const flippedIndices=(data.flipped||'').split(',').filter(x=>x!=='').map(Number);
  const matchedIndices=(data.matchedCards||'').split(',').filter(x=>x!=='').map(Number);
  const matchedPlayer=(data.matchedPlayer||'').split(',').filter(x=>x!=='');

  const cards=document.querySelectorAll('.card');
  cards.forEach((card,i)=>{
    card.classList.remove('flipped');
    card.classList.remove('matched','p0','p1','p2','p3');
    if(flippedIndices.includes(i)) card.classList.add('flipped');
    if(matchedIndices.includes(i)){
      const pIdx=parseInt(matchedPlayer[matchedIndices.indexOf(i)])||0;
      card.classList.add('matched','p'+pIdx);
    }
  });

  renderScoreboard();
  updateTurnBanner();
  updateOnlineHUD();

  // Check if my turn
  const isMyTurn=(currentPlayer===myOnlineIndex);
  cards.forEach(card=>{
    card.classList.toggle('disabled',!isMyTurn||card.classList.contains('matched'));
  });

  if(matched>=LEVELS[difficulty].pairs){
    setTimeout(()=>showWin(),400);
  }
}

function buildBoardFromData(data){
  if(!data.cards) return;
  const cardEmojis=data.cards.split(',');
  currentPlayer=data.currentPlayer||0;
  matched=0; moves=0; scores=onlinePlayers.map(()=>0);

  const badge=document.getElementById('diffBadge');
  badge.textContent=t('diff_'+difficulty);
  badge.className='diff-badge '+difficulty;
  renderScoreboard(); updateTurnBanner(); updateOnlineHUD();

  const lvl=LEVELS[difficulty];
  const board=document.getElementById('board');
  board.style.gridTemplateColumns='repeat('+lvl.cols+',1fr)';
  board.style.maxWidth=(lvl.cols===3?360:480)+'px';
  const emojiSize=lvl.cols===3?'clamp(1.9rem,6vw,2.6rem)':'clamp(1.5rem,4.5vw,2.2rem)';
  board.innerHTML='';
  const isMyTurn=(currentPlayer===myOnlineIndex);
  cardEmojis.forEach((emoji,i)=>{
    const card=document.createElement('div');
    card.className='card'+(isMyTurn?'':' disabled');
    card.dataset.emoji=emoji;
    card.dataset.index=i;
    card.innerHTML='<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front" style="font-size:'+emojiSize+'">'+emoji+'</div></div>';
    card.addEventListener('click',()=>onlineFlipCard(card,i));
    board.appendChild(card);
  });
}

function updateOnlineHUD(){
  document.getElementById('pairs').textContent=matched+'/'+LEVELS[difficulty].pairs;
  document.getElementById('moves').textContent=moves;
}

/* ══════════════════════════════════════
   ONLINE GAMEPLAY
══════════════════════════════════════ */
let onlineFlipped=[];

async function onlineFlipCard(card,index){
  if(!isOnline) return;
  if(currentPlayer!==myOnlineIndex) return;
  if(card.classList.contains('flipped')||card.classList.contains('matched')) return;
  if(onlineFlipped.length>=2) return;

  onlineFlipped.push({card,index});
  card.classList.add('flipped');

  if(onlineFlipped.length===2){
    // Disable all cards while evaluating
    document.querySelectorAll('.card').forEach(c=>c.classList.add('disabled'));
    const [a,b]=onlineFlipped;
    const newMoves=moves+1;

    if(a.card.dataset.emoji===b.card.dataset.emoji){
      // Match!
      const newMatched=matched+1;
      const newScores={...Object.fromEntries(onlinePlayers.map((p,i)=>[p.id,scores[i]]))};
      newScores[myPlayerId]=(newScores[myPlayerId]||0)+1;

      // Compute matched cards array from DOM
      const existingMatchedEls=[...document.querySelectorAll('.card.matched')];
      const existingIndices=existingMatchedEls.map(el=>parseInt(el.dataset.index));
      const existingPlayer=existingMatchedEls.map(el=>{
        for(let p=0;p<4;p++) if(el.classList.contains('p'+p)) return p;
        return 0;
      });
      const newMatchedIndices=[...existingIndices,a.index,b.index];
      const newMatchedPlayer=[...existingPlayer,myOnlineIndex,myOnlineIndex];

      await window._update(roomRef,{
        moves:newMoves,
        matched:newMatched,
        scores:newScores,
        currentPlayer:myOnlineIndex, // same player continues
        flipped:'',
        matchedCards:newMatchedIndices.join(','),
        matchedPlayer:newMatchedPlayer.join(','),
      });
    } else {
      // No match – next player
      const nextPlayer=(myOnlineIndex+1)%numPlayers;
      await window._update(roomRef,{
        moves:newMoves,
        currentPlayer:nextPlayer,
        flipped:'',
      });
      setTimeout(()=>{
        a.card.classList.remove('flipped');
        b.card.classList.remove('flipped');
      },900);
    }
    onlineFlipped=[];
  } else {
    // First card flipped — write to firebase so others see it
    await window._update(roomRef,{flipped:String(index)});
  }
}

async function requestNewGame(){
  if(isOnline && amHost){
    await startOnlineGame();
  } else if(isOnline && !amHost){
    showToast('רק המארח יכול להתחיל משחק חדש');
  } else {
    initGame();
  }
}

async function leaveRoom(){
  if(roomRef){
    window._off(roomRef);
    if(amHost){
      await window._remove(roomRef);
    } else if(myPlayerId){
      await window._remove(window._ref(window._db,'rooms/'+myRoomCode+'/players/'+myPlayerId));
    }
  }
  roomRef=null; roomListener=null; myRoomCode=null; myPlayerId=null; amHost=false; isOnline=false;
  onlinePlayers=[]; onlineFlipped=[];
  document.getElementById('onlineIndicator').style.display='none';
  showScreen('setupScreen');
}

/* ══════════════════════════════════════
   LOCAL GAME
══════════════════════════════════════ */
function initGame(){
  flipped=[]; matched=0; moves=0; lock=false; currentPlayer=0;
  scores=Array(numPlayers).fill(0); seconds=0; started=false;
  clearInterval(timerInterval); clearInterval(countdownInterval);
  document.getElementById('winBanner').classList.remove('show');
  document.getElementById('timer').textContent='0:00';
  document.getElementById('onlineIndicator').style.display='none';

  const badge=document.getElementById('diffBadge');
  badge.textContent=t('diff_'+difficulty);
  badge.className='diff-badge '+difficulty;
  document.getElementById('hud').style.display=numPlayers===1?'flex':'none';
  updateHUD(); renderScoreboard(); updateTurnBanner();

  const lvl=LEVELS[difficulty];
  const board=document.getElementById('board');
  board.style.gridTemplateColumns='repeat('+lvl.cols+',1fr)';
  board.style.maxWidth=(lvl.cols===3?360:480)+'px';
  const emojiSize=lvl.cols===3?'clamp(1.9rem,6vw,2.6rem)':'clamp(1.5rem,4.5vw,2.2rem)';
  const cards=[...ALL_EMOJIS.slice(0,lvl.pairs),...ALL_EMOJIS.slice(0,lvl.pairs)].sort(()=>Math.random()-.5);
  board.innerHTML='';
  cards.forEach(emoji=>{
    const card=document.createElement('div');
    card.className='card'; card.dataset.emoji=emoji;
    card.innerHTML='<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front" style="font-size:'+emojiSize+'">'+emoji+'</div></div>';
    card.addEventListener('click',()=>flipCard(card));
    board.appendChild(card);
  });
}

function renderScoreboard(){
  const sb=document.getElementById('scoreboard');
  if(!isOnline && numPlayers===1){sb.innerHTML='';return;}
  const n=isOnline?onlinePlayers.length:numPlayers;
  const cp=currentPlayer;
  sb.innerHTML=Array.from({length:n},(_,i)=>`
    <div class="player-card${i===cp?' active-player':''}">
      <div class="p-turn-arrow">▼</div>
      <div class="p-name" style="color:${i===cp?PLAYER_COLORS[i]:'#aaa'}">${playerName(i)}${isOnline&&onlinePlayers[i]&&onlinePlayers[i].id===myPlayerId?' 👈':''}</div>
      <div class="p-score" style="color:${PLAYER_COLORS[i]}">${scores[i]||0}</div>
    </div>`).join('');
}

function updateHUD(){
  document.getElementById('moves').textContent=moves;
  document.getElementById('pairs').textContent=matched+'/'+LEVELS[difficulty].pairs;
}

function updateTurnBanner(){
  const el=document.getElementById('turnBanner');
  if(!isOnline && numPlayers===1){el.textContent='';return;}
  if(isOnline){
    if(currentPlayer===myOnlineIndex){
      el.textContent=t('your_turn');
      el.style.color=PLAYER_COLORS[myOnlineIndex];
    } else {
      el.textContent=t('not_your_turn')+playerName(currentPlayer);
      el.style.color=PLAYER_COLORS[currentPlayer];
    }
  } else {
    el.textContent=t('turn')+' '+playerName(currentPlayer);
    el.style.color=PLAYER_COLORS[currentPlayer];
  }
}

function flipCard(card){
  if(isOnline||lock||card.classList.contains('flipped')||card.classList.contains('matched')) return;
  if(numPlayers===1&&!started){
    started=true;
    timerInterval=setInterval(()=>{
      seconds++;
      const m=Math.floor(seconds/60),s=seconds%60;
      document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');
    },1000);
  }
  card.classList.add('flipped'); flipped.push(card);
  if(flipped.length===2){
    lock=true; moves++; updateHUD();
    const[a,b]=flipped;
    if(a.dataset.emoji===b.dataset.emoji){
      a.classList.add('matched','p'+currentPlayer);
      b.classList.add('matched','p'+currentPlayer);
      matched++; scores[currentPlayer]++;
      flipped=[]; lock=false;
      updateHUD(); renderScoreboard();
      if(matched===LEVELS[difficulty].pairs){showWin();return;}
      updateTurnBanner();
    } else {
      setTimeout(()=>{
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped=[]; lock=false;
        if(numPlayers>1){currentPlayer=(currentPlayer+1)%numPlayers;renderScoreboard();updateTurnBanner();}
      },900);
    }
  }
}

/* ══════════════════════════════════════
   WIN
══════════════════════════════════════ */
function showWin(){
  clearInterval(timerInterval);
  const lvl=LEVELS[difficulty];
  let title,winner,color;
  const n=isOnline?onlinePlayers.length:numPlayers;
  if(n===1){
    const stars=moves<=lvl.star3?'⭐⭐⭐':moves<=lvl.star2?'⭐⭐':'⭐';
    document.getElementById('winStars').textContent=stars;
    title=t('bravo');
    const m=Math.floor(seconds/60),s=seconds%60;
    winner=moves+' '+t('tries_label')+' · '+m+':'+String(s).padStart(2,'0')+' '+t('min');
    color='var(--accent3)';
    document.getElementById('winScores').innerHTML='';
  } else {
    document.getElementById('winStars').textContent='🏆';
    const maxScore=Math.max(...scores);
    const winners=scores.map((s,i)=>s===maxScore?i:-1).filter(i=>i>=0);
    if(winners.length>1){
      title=t('tie'); winner=winners.map(i=>playerName(i)).join(' & ')+' – '+maxScore+' '+t('points');
      color='var(--accent)';
    } else {
      title=t('winner');
      winner=playerName(winners[0])+' '+maxScore+' '+t('points')+'! 🎊';
      color=PLAYER_COLORS[winners[0]];
    }
    document.getElementById('winScores').innerHTML=
      scores.map((s,i)=>`<div class="win-score-item" style="border-color:${PLAYER_COLORS[i]};color:${PLAYER_COLORS[i]}">${playerName(i)}: ${s}</div>`).join('');
  }
  document.getElementById('winTitle').textContent=title;
  document.getElementById('winWinner').textContent=winner;
  document.getElementById('winWinner').style.color=color;
  document.getElementById('winBanner').classList.add('show');
  startCountdown();
}

let remaining=COUNTDOWN_SEC;
function startCountdown(){
  clearInterval(countdownInterval);
  remaining=COUNTDOWN_SEC;
  updateCountdownUI(remaining);
  countdownInterval=setInterval(()=>{
    remaining--;
    updateCountdownUI(remaining);
    if(remaining<=0){
      clearInterval(countdownInterval);
      document.getElementById('winBanner').classList.remove('show');
      if(isOnline) leaveRoom(); else goBack();
    }
  },1000);
}
function updateCountdownUI(n){
  document.getElementById('countdownNum').textContent=n;
  document.getElementById('countdownRing').style.setProperty('--pct',(n/COUNTDOWN_SEC*100).toFixed(1)+'%');
  document.getElementById('replayLabel').textContent=t('play_again_short');
}
function onReplayClick(){
  clearInterval(countdownInterval);
  document.getElementById('winBanner').classList.remove('show');
  requestNewGame();
}
function cancelCountdownAndBack(){
  clearInterval(countdownInterval);
  document.getElementById('winBanner').classList.remove('show');
  if(isOnline) leaveRoom(); else goBack();
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ══════════════════════════════════════
   COPY ROOM CODE
══════════════════════════════════════ */
document.getElementById('lobbyRoomCode').addEventListener('click',()=>{
  const code=document.getElementById('lobbyRoomCode').textContent;
  navigator.clipboard.writeText(code).then(()=>showToast(t('copy_code')+' '+code));
});

// Init lang
setLang('he');
